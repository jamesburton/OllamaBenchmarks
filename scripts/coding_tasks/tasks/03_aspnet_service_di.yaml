prompt: |
  Given the following API reference:
  {references}

  Generate a single C# file containing:

  1. An `IOrderRepository` interface (empty, marker interface is fine)
  2. An `OrderRepository` class implementing `IOrderRepository`
  3. An `IOrderService` interface (empty, marker interface is fine)
  4. An `OrderService` class implementing `IOrderService`
  5. An `IEmailNotifier` interface (empty, marker interface is fine)
  6. An `EmailNotifier` class implementing `IEmailNotifier`
  7. An `OrderSettings` class with properties: string WarehouseCode, int MaxRetries
  8. A static class `ServiceCollectionExtensions` with an extension method
     `AddOrderServices(this IServiceCollection services, IConfiguration config)` that:
     - Registers IOrderRepository → OrderRepository as scoped
     - Registers IOrderService → OrderService as scoped
     - Registers IEmailNotifier → EmailNotifier as transient
     - Binds OrderSettings from config section "Orders" using the options pattern

  Return only valid C# code in a single file.
test_code: |
  using AwesomeAssertions;
  using Microsoft.Extensions.Configuration;
  using Microsoft.Extensions.DependencyInjection;

  public class ServiceRegistrationTests
  {
      private static ServiceProvider BuildProvider()
      {
          var config = new ConfigurationBuilder()
              .AddInMemoryCollection(new Dictionary<string, string?>
              {
                  ["Orders:WarehouseCode"] = "WH-01",
                  ["Orders:MaxRetries"] = "3"
              })
              .Build();

          var services = new ServiceCollection();
          services.AddOrderServices(config);
          return services.BuildServiceProvider();
      }

      [Fact]
      public void AllServices_CanBeResolved()
      {
          using var provider = BuildProvider();
          using var scope = provider.CreateScope();
          var repo = scope.ServiceProvider.GetService<IOrderRepository>();
          var svc = scope.ServiceProvider.GetService<IOrderService>();
          var notifier = scope.ServiceProvider.GetService<IEmailNotifier>();
          repo.Should().NotBeNull();
          svc.Should().NotBeNull();
          notifier.Should().NotBeNull();
      }

      [Fact]
      public void ScopedServices_SameWithinScope_DifferentAcrossScopes()
      {
          using var provider = BuildProvider();
          using var scope1 = provider.CreateScope();
          using var scope2 = provider.CreateScope();
          var repo1a = scope1.ServiceProvider.GetService<IOrderRepository>();
          var repo1b = scope1.ServiceProvider.GetService<IOrderRepository>();
          var repo2 = scope2.ServiceProvider.GetService<IOrderRepository>();
          repo1a.Should().BeSameAs(repo1b);
          repo1a.Should().NotBeSameAs(repo2);
      }

      [Fact]
      public void TransientServices_AlwaysDifferent()
      {
          using var provider = BuildProvider();
          using var scope = provider.CreateScope();
          var notifier1 = scope.ServiceProvider.GetService<IEmailNotifier>();
          var notifier2 = scope.ServiceProvider.GetService<IEmailNotifier>();
          notifier1.Should().NotBeSameAs(notifier2);
      }
  }

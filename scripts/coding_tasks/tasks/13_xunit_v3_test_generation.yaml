name: xunit_v3_test_generation
category: xunit
weight: 1
template: test_project
max_tokens: 4096
num_ctx: 12288
references:
  - xunit_v3.md
  - awesome_assertions.md
prompt: |
  Given the following API reference:
  {references}

  Given this class:

  ```csharp
  public class OrderService
  {
      public decimal CalculateTotal(decimal subtotal, decimal taxRate) => subtotal * (1 + taxRate);
      public string FormatOrderId(int id) => $"ORD-{id:D6}";
      public bool IsValidDiscount(decimal discount) => discount >= 0 && discount <= 0.5m;
      public decimal ApplyDiscount(decimal total, decimal discount) =>
          IsValidDiscount(discount) ? total * (1 - discount) : throw new ArgumentException("Invalid discount");
  }
  ```

  Write comprehensive xUnit v3 tests for OrderService using:
  - [Fact] for single test cases
  - [Theory] with [InlineData] for parameterized tests
  - Assert.Multiple() to collect all failures
  - MatrixTheoryData for combinatorial tests
  - AwesomeAssertions .Should() for assertions

  Include the OrderService class at the top of the file.

  Return only valid C# code in a single file.
test_code: |
  public class OrderServiceMetaTests
  {
      private readonly OrderService _sut = new();

      [Fact]
      public void OrderService_CalculateTotal_IsCorrect()
      {
          _sut.CalculateTotal(100m, 0.1m).Should().Be(110.0m);
      }

      [Fact]
      public void OrderService_FormatOrderId_IsCorrect()
      {
          _sut.FormatOrderId(42).Should().Be("ORD-000042");
      }

      [Fact]
      public void OrderService_IsValidDiscount_BoundaryValues()
      {
          _sut.IsValidDiscount(0m).Should().BeTrue();
          _sut.IsValidDiscount(0.5m).Should().BeTrue();
          _sut.IsValidDiscount(0.51m).Should().BeFalse();
          _sut.IsValidDiscount(-0.01m).Should().BeFalse();
      }

      [Fact]
      public void OrderService_ApplyDiscount_ThrowsOnInvalid()
      {
          Action act = () => _sut.ApplyDiscount(100m, 0.6m);
          act.Should().Throw<ArgumentException>();
      }
  }

name: vertical_order_api
category: vertical
weight: 2
template: test_project
max_tokens: 8192
num_ctx: 12288
references:
  - oneof.md
  - aspnet_net10.md
  - efcore_10.md
  - xunit_v3.md
prompt: |
  Given the following API reference:
  {references}

  Generate a complete order management vertical slice in a single C# file:

  1. Order entity with properties: int Id, string CustomerName, List<OrderItem> Items, decimal Total, DateTime CreatedAt
  2. OrderItem value object with properties: string ProductName, int Quantity, decimal UnitPrice
  3. CreateOrderRequest record with [Required] validation attributes on CustomerName and Items
  4. ValidationError record with a Message string property
  5. IOrderService interface with method returning OneOf<Order, ValidationError>:
     OneOf<Order, ValidationError> CreateOrder(CreateOrderRequest request)
  6. OrderDbContext : DbContext with DbSet<Order> Orders, using constructor that takes DbContextOptions
  7. OrderService implementation that:
     - Takes OrderDbContext in constructor
     - Validates request (returns ValidationError if CustomerName is empty or Items is empty)
     - Creates Order, calculates Total from Items (sum of Quantity * UnitPrice), sets CreatedAt
     - Saves to DbContext and returns the Order
  8. OrdersController : ControllerBase with:
     - POST /api/orders endpoint accepting CreateOrderRequest
     - Calls IOrderService.CreateOrder
     - Uses OneOf .Match to return Created (201) on success, BadRequest on ValidationError
  9. xUnit v3 tests:
     - Test OrderService happy path with EF Core InMemory database
     - Test OrderService validation error (empty customer name)
     - Test OrdersController with NSubstitute mock of IOrderService

  Use AwesomeAssertions .Should() for assertions.
  Use [ApiController] and [Route("api/[controller]")] attributes.

  Return only valid C# code in a single file.
test_code: |
  public class VerticalOrderApiMetaTests
  {
      [Fact]
      public void OrderItem_HasRequiredProperties()
      {
          var item = new OrderItem { ProductName = "Widget", Quantity = 2, UnitPrice = 10m };
          item.ProductName.Should().Be("Widget");
          item.Quantity.Should().Be(2);
          item.UnitPrice.Should().Be(10m);
      }

      [Fact]
      public void CreateOrderRequest_CanBeInstantiated()
      {
          var request = new CreateOrderRequest
          {
              CustomerName = "Alice",
              Items = [new OrderItem { ProductName = "Widget", Quantity = 1, UnitPrice = 25m }]
          };
          request.CustomerName.Should().Be("Alice");
      }
  }

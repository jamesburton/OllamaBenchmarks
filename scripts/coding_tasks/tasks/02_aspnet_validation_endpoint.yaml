name: aspnet_validation_endpoint
category: aspnet
weight: 1
template: test_project
max_tokens: 4096
num_ctx: 12288
references:
  - aspnet_net10.md
prompt: |
  Given the following API reference:
  {references}

  Generate the following in a single C# file:

  1. A `CreateOrderRequest` class (not a positional record) with these validated properties as public get/set:
     - [Required] string Name
     - [Range(0.01, 10000)] decimal Price
     - [Range(1, 999)] int Quantity
     It must support object-initializer syntax like `new CreateOrderRequest { Name = "Widget", Price = 9.99m, Quantity = 5 }`.
     The validation attributes must be from `System.ComponentModel.DataAnnotations` and must work with `Validator.TryValidateObject`.

  2. An `OrderService` class with a method `ValidateAndCreate(CreateOrderRequest request)` that:
     - Validates the request using `Validator.TryValidateObject` with `validateAllProperties: true`
     - If validation fails, throws an `ArgumentException` with details of the first validation error
     - If validation passes, returns the request as a confirmed order

  IMPORTANT constraints:
  - Do NOT generate any endpoint mapping code, WebApplication, IEndpointRouteBuilder, or MapPost calls.
  - Do NOT use `using Microsoft.AspNetCore.Builder;` or `using Microsoft.AspNetCore.Http;`.
  - Only include `using System.ComponentModel.DataAnnotations;` at the top.
  - Do NOT place any types inside a namespace; all types must be declared at the top level (global namespace).

  Return only valid C# code in a single file.
test_code: |
  using System.ComponentModel.DataAnnotations;
  using AwesomeAssertions;

  public class CreateOrderRequestValidationTests
  {
      [Fact]
      public void ValidRequest_PassesValidation()
      {
          var request = new CreateOrderRequest
          {
              Name = "Widget",
              Price = 9.99m,
              Quantity = 5
          };
          var context = new ValidationContext(request);
          var results = new List<ValidationResult>();
          var isValid = Validator.TryValidateObject(request, context, results, true);
          isValid.Should().BeTrue();
          results.Should().HaveCount(0);
      }

      [Fact]
      public void MissingName_FailsValidation()
      {
          var request = new CreateOrderRequest
          {
              Name = null!,
              Price = 9.99m,
              Quantity = 5
          };
          var context = new ValidationContext(request);
          var results = new List<ValidationResult>();
          var isValid = Validator.TryValidateObject(request, context, results, true);
          isValid.Should().BeFalse();
          results.Should().HaveCountGreaterThan(0);
      }

      [Fact]
      public void NegativePrice_FailsValidation()
      {
          var request = new CreateOrderRequest
          {
              Name = "Widget",
              Price = -5.00m,
              Quantity = 5
          };
          var context = new ValidationContext(request);
          var results = new List<ValidationResult>();
          var isValid = Validator.TryValidateObject(request, context, results, true);
          isValid.Should().BeFalse();
          results.Should().HaveCountGreaterThan(0);
      }
  }

prompt: |
  Given the following API reference:
  {references}

  Generate a single C# file containing:

  1. An `OrderState` class implementing `SagaStateMachineInstance` with properties:
     - Guid CorrelationId
     - string CurrentState
     - DateTime OrderDate
     - DateTime? AcceptedAt
  2. Event records (use positional record syntax):
     - `OrderSubmitted` with Guid OrderId and DateTime OrderDate
     - `OrderAccepted` with Guid OrderId and DateTime AcceptedAt
     - `OrderCompleted` with Guid OrderId
  3. An `OrderStateMachine` class extending `MassTransitStateMachine<OrderState>` with:
     - States: Submitted, Accepted, Completed (as `public State` properties)
     - Events as `public Event<T>` properties for each event record
     - In the constructor, call `InstanceState(x => x.CurrentState)`
     - Configure event correlation using `Event(() => ..., x => x.CorrelateById(m => m.Message.OrderId))` for each event
     - Initially: When event → set OrderDate, TransitionTo Submitted
     - During Submitted: When event → set AcceptedAt, TransitionTo Accepted
     - During Accepted: When event → Finalize
     - Call SetCompletedWhenFinalized()

  IMPORTANT: MassTransit requires all message types to be in a namespace. Place all types inside `namespace Contracts;` (file-scoped). Also add `global using Contracts;` at the top of the file so the types are accessible without explicit using statements from other files. Do NOT use `SetCorrelationId` — use `Event(() => ..., x => x.CorrelateById(...))` to configure correlation.

  Use `.Then(context => { context.Saga.PropertyName = value; })` to set saga properties in state transitions. Do NOT use `.Set()` — it does not exist on EventActivityBinder.

  Return only valid C# code in a single file.
test_code: |
  using MassTransit;
  using MassTransit.Testing;
  using Microsoft.Extensions.DependencyInjection;

  public class OrderStateMachineTests
  {
      [Fact]
      public async Task Saga_Transitions_Through_All_States()
      {
          await using var provider = new ServiceCollection()
              .AddMassTransitTestHarness(cfg =>
              {
                  cfg.AddSagaStateMachine<OrderStateMachine, OrderState>()
                      .InMemoryRepository();
              })
              .BuildServiceProvider(true);

          var harness = provider.GetRequiredService<ITestHarness>();
          await harness.Start();

          var orderId = Guid.NewGuid();

          await harness.Bus.Publish(new OrderSubmitted(orderId, DateTime.UtcNow));
          Assert.True(await harness.Consumed.Any<OrderSubmitted>());

          await harness.Bus.Publish(new OrderAccepted(orderId, DateTime.UtcNow));
          Assert.True(await harness.Consumed.Any<OrderAccepted>());

          await harness.Bus.Publish(new OrderCompleted(orderId));
          Assert.True(await harness.Consumed.Any<OrderCompleted>());

          var sagaHarness = harness.GetSagaStateMachineHarness<OrderStateMachine, OrderState>();
          Assert.True(await sagaHarness.Created.Any(x => x.CorrelationId == orderId));
          Assert.Null(await sagaHarness.Exists(orderId, x => x.Submitted));
      }
  }

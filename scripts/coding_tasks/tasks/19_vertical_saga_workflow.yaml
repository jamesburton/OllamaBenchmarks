name: vertical_saga_workflow
category: vertical
weight: 2
template: test_project
max_tokens: 8192
num_ctx: 12288
references:
  - masstransit_v8.md
  - xunit_v3.md
prompt: |
  Given the following API reference:
  {references}

  Generate a complete order fulfillment saga in a single C# file:

  1. Message records (all with Guid OrderId property):
     - OrderPlaced
     - PaymentReceived
     - OrderShipped
     - OrderCompleted

  2. OrderFulfillmentState : SagaStateMachineInstance with properties:
     - Guid CorrelationId { get; set; }
     - string CurrentState { get; set; }
     - DateTime OrderDate { get; set; }
     - DateTime? PaymentDate { get; set; }
     - DateTime? ShippedDate { get; set; }

  3. OrderFulfillmentStateMachine : MassTransitStateMachine<OrderFulfillmentState> with:
     - States: Placed, Paid, Shipped, Completed
     - Events: OrderPlacedEvent, PaymentReceivedEvent, OrderShippedEvent, OrderCompletedEvent
     - Transitions:
       - Initially → Placed on OrderPlaced (set OrderDate)
       - Placed → Paid on PaymentReceived (set PaymentDate)
       - Paid → Shipped on OrderShipped (set ShippedDate)
       - Shipped → Completed on OrderCompleted (Finalize)
     - Correlate all events by OrderId

  4. xUnit v3 test using AddMassTransitTestHarness that:
     - Registers the saga state machine with in-memory repository
     - Publishes OrderPlaced, PaymentReceived, OrderShipped, OrderCompleted in sequence
     - Asserts the saga reaches the Completed (Final) state

  Use MassTransit.Testing namespace for test harness.
  Use cfg.AddSagaStateMachine<OrderFulfillmentStateMachine, OrderFulfillmentState>().InMemoryRepository() for registration.

  IMPORTANT constraints:
  - Do NOT use `Xunit.Abstractions` — it does not exist in xUnit v3. Do NOT inject ITestOutputHelper.
  - Do NOT add using statements for Xunit (already available via global usings). You may add `using MassTransit;` and `using MassTransit.Testing;`.
  - Do NOT wrap code in a namespace.
  - Message records (OrderPlaced, PaymentReceived, OrderShipped, OrderCompleted) must have a settable OrderId property, so they can be instantiated with object initializer syntax: `new OrderPlaced { OrderId = id }`. Use `record` with `{ Guid OrderId { get; init; } }` body syntax, NOT positional record syntax.
  - Do NOT override ConfigureStateMachine — it does not exist. Do NOT use IStateMachineSagaDefinition. Correlate events in the constructor using `Event(() => EventProp, x => x.CorrelateById(m => m.Message.OrderId))` for each event. Use `.Then(context => { context.Saga.Prop = val; })` to set saga properties.

  Return only valid C# code in a single file.
test_code: |
  public class VerticalSagaMetaTests
  {
      [Fact]
      public void OrderFulfillmentState_HasRequiredProperties()
      {
          var state = new OrderFulfillmentState
          {
              CorrelationId = Guid.NewGuid(),
              CurrentState = "Placed",
              OrderDate = DateTime.UtcNow
          };
          state.CorrelationId.Should().NotBeEmpty();
          state.CurrentState.Should().Be("Placed");
      }

      [Fact]
      public void Messages_HaveOrderId()
      {
          var id = Guid.NewGuid();
          var placed = new OrderPlaced { OrderId = id };
          var paid = new PaymentReceived { OrderId = id };
          var shipped = new OrderShipped { OrderId = id };
          var completed = new OrderCompleted { OrderId = id };

          placed.OrderId.Should().Be(id);
          paid.OrderId.Should().Be(id);
          shipped.OrderId.Should().Be(id);
          completed.OrderId.Should().Be(id);
      }
  }

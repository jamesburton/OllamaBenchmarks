name: medium_xunit_024
category: csharp_medium
subcategory: xunit
difficulty: medium
weight: 2
template: test_project
max_tokens: 4096
num_ctx: 12288
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A class QueryBuilder with:
    QueryBuilder Select(params string[] columns), QueryBuilder From(string table), QueryBuilder Where(string condition), QueryBuilder OrderBy(string column, bool asc=true), string Build()
  Return only valid C# code in a single file.
test_code: |
  public class QueryBuilderTests
  {
      [Fact]
      public void CanBeInstantiated()
      {
          var instance = new QueryBuilder();
          instance.Should().NotBeNull();
      }

      [Fact]
      public void BasicBehavior_Works()
      {
          var instance = new QueryBuilder();
          instance.Should().NotBeNull();
      }

      [Fact]
      public void EdgeCase_DoesNotThrow()
      {
          var instance = new QueryBuilder();
          instance.Invoking(i => { }).Should().NotThrow();
      }
  }

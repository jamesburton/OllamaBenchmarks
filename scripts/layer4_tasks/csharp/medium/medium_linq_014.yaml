name: medium_linq_014
category: csharp_medium
subcategory: linq
difficulty: medium
weight: 2
template: test_project
max_tokens: 4096
num_ctx: 12288
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A class StatisticsCalculator with a constructor accepting IEnumerable<double> values.
  Expose:
    double Mean()
    double Median()
    double StandardDeviation()   — population std dev
    IEnumerable<double> Outliers(double zThreshold) — values whose z-score absolute value exceeds threshold
  Return only valid C# code in a single file.
test_code: |
  public class StatisticsCalculatorTests
  {
      [Fact]
      public void Mean_IsCorrect()
      {
          new StatisticsCalculator(new double[]{2,4,4,4,5,5,7,9}).Mean().Should().Be(5.0);
      }

      [Fact]
      public void Median_EvenCount()
      {
          new StatisticsCalculator(new double[]{1,3,5,7}).Median().Should().Be(4.0);
      }

      [Fact]
      public void Median_OddCount()
      {
          new StatisticsCalculator(new double[]{1,3,5}).Median().Should().Be(3.0);
      }

      [Fact]
      public void StandardDeviation_IsCorrect()
      {
          // population stddev of {2,4,4,4,5,5,7,9} = 2.0
          new StatisticsCalculator(new double[]{2,4,4,4,5,5,7,9}).StandardDeviation().Should().BeApproximately(2.0, 0.0001);
      }

      [Fact]
      public void Outliers_ReturnsHighZScore()
      {
          var data = Enumerable.Range(1, 10).Select(i => (double)i).ToArray();
          // value 10 has highest z-score
          new StatisticsCalculator(data).Outliers(1.5).Should().Contain(10.0);
      }
  }

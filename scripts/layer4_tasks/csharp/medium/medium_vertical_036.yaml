subcategory: vertical
difficulty: medium
weight: 2
template: test_project
max_tokens: 4096
num_ctx: 12288
validator_type: dotnet
references: []
prompt: |
  Create a single C# file implementing a vertical slice for generateslug.
  Include:
    Command: string Title, IEnumerable<string> ExistingSlug
  Result: string Slug, bool IsUnique
  Handler: lowercase, replace spaces with hyphens, remove special chars. If collision, append -2, -3, etc.
  Return only valid C# code in a single file.
test_code: |
  public class GenerateSlugHandlerTests
  {
      [Fact]
      public void Handler_CanBeInstantiated()
      {
          var handler = new GenerateSlugHandler();
          handler.Should().NotBeNull();
      }

      [Fact]
      public void Handler_BasicValidation_Works()
      {
          var handler = new GenerateSlugHandler();
          handler.Should().NotBeNull();
      }

      [Fact]
      public void Handler_DoesNotThrowOnValidInput()
      {
          var handler = new GenerateSlugHandler();
          handler.Should().NotBeNull();
      }
  }

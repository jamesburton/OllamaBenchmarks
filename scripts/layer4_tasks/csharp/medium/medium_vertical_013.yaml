prompt: |
  Create a single C# file implementing a vertical slice for calculatetax.
  Include:
    Command: decimal Amount, string Country, string? State, bool IsBusinessCustomer
  Result: decimal TaxRate, decimal TaxAmount, decimal TotalWithTax
  Handler returns different rates: US=10%, UK=20%, EU=15%, others=0%. B2B gets 0%.
  Return only valid C# code in a single file.
test_code: |

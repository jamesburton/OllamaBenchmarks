name: medium_vertical_035
category: csharp_medium
subcategory: vertical
difficulty: medium
weight: 2
template: test_project
max_tokens: 4096
num_ctx: 12288
validator_type: dotnet
references: []
prompt: |
  Create a single C# file implementing a vertical slice for validatecreditcard.
  Include:
    Command: string CardNumber, string ExpiryMonth, string ExpiryYear, string Cvv
  Result: bool IsValid, string? CardType, IEnumerable<string> ValidationErrors
  Handler: Luhn check, expiry in future, CVV 3-4 digits, detects Visa/MasterCard/Amex.
  Return only valid C# code in a single file.
test_code: |
  public class ValidateCreditCardHandlerTests
  {
      [Fact]
      public void Handler_CanBeInstantiated()
      {
          var handler = new ValidateCreditCardHandler();
          handler.Should().NotBeNull();
      }

      [Fact]
      public void Handler_BasicValidation_Works()
      {
          var handler = new ValidateCreditCardHandler();
          handler.Should().NotBeNull();
      }

      [Fact]
      public void Handler_DoesNotThrowOnValidInput()
      {
          var handler = new ValidateCreditCardHandler();
          handler.Should().NotBeNull();
      }
  }

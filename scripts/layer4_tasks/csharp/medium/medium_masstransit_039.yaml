name: medium_masstransit_039
category: csharp_medium
subcategory: masstransit
difficulty: medium
weight: 2
template: test_project
max_tokens: 4096
num_ctx: 12288
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  In namespace Contracts: record HealthCheckFailed(string ServiceName, string CheckName, string Reason, DateTime FailedAt).
  A consumer HealthCheckFailedConsumer implementing IConsumer<HealthCheckFailed>.
  Constructor accepts IIncidentService service.
  Interface IIncidentService with: Task CreateIncidentAsync(string serviceName, string checkName).
  In Consume: calls the service method with appropriate message properties.
  Return only valid C# code in a single file.
test_code: |
  namespace Contracts { public record HealthCheckFailed(string ServiceName, string CheckName, string Reason, DateTime FailedAt); }
  global using Contracts;

  public class HealthCheckFailedConsumerTests
  {
      [Fact]
      public async Task Consume_CallsService()
      {
          var svc = Substitute.For<IIncidentService>();
          var consumer = new HealthCheckFailedConsumer(svc);
          var ctx = Substitute.For<ConsumeContext<HealthCheckFailed>>();
          ctx.Message.Returns(new HealthCheckFailed("test", "test", "test", DateTime.UtcNow));
          await consumer.Consume(ctx);
          await svc.Received(1).CreateIncidentAsync(Arg.Any<string>(), Arg.Any<object>());
      }

      [Fact]
      public async Task Consume_DoesNotThrow()
      {
          var svc = Substitute.For<IIncidentService>();
          var consumer = new HealthCheckFailedConsumer(svc);
          var ctx = Substitute.For<ConsumeContext<HealthCheckFailed>>();
          ctx.Message.Returns(new HealthCheckFailed("test", "test", "test", DateTime.UtcNow));
          await consumer.Invoking(c => c.Consume(ctx)).Should().NotThrowAsync();
      }

      [Fact]
      public async Task Consume_CallsServiceOnce()
      {
          var svc = Substitute.For<IIncidentService>();
          var consumer = new HealthCheckFailedConsumer(svc);
          var ctx = Substitute.For<ConsumeContext<HealthCheckFailed>>();
          ctx.Message.Returns(new HealthCheckFailed("test", "test", "test", DateTime.UtcNow));
          await consumer.Consume(ctx);
          await svc.Received(1).CreateIncidentAsync(Arg.Any<string>(), Arg.Any<object>());
      }
  }

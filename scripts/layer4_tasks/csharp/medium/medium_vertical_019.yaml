name: medium_vertical_019
category: csharp_medium
subcategory: vertical
difficulty: medium
weight: 2
template: test_project
max_tokens: 4096
num_ctx: 12288
validator_type: dotnet
references: []
prompt: |
  Create a single C# file implementing a vertical slice for generatetoken.
  Include:
    Command: string UserId, string Purpose (auth/refresh/reset), TimeSpan Expiry
  Result: string Token, DateTime ExpiresAt, string Purpose
  Handler validates: UserId not empty, Purpose valid, Expiry between 1min and 30 days, generates secure token.
  Return only valid C# code in a single file.
test_code: |
  public class GenerateTokenHandlerTests
  {
      [Fact]
      public void Handler_CanBeInstantiated()
      {
          var handler = new GenerateTokenHandler();
          handler.Should().NotBeNull();
      }

      [Fact]
      public void Handler_BasicValidation_Works()
      {
          var handler = new GenerateTokenHandler();
          handler.Should().NotBeNull();
      }

      [Fact]
      public void Handler_DoesNotThrowOnValidInput()
      {
          var handler = new GenerateTokenHandler();
          handler.Should().NotBeNull();
      }
  }

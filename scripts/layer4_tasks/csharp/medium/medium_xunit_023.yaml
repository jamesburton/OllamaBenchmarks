name: medium_xunit_023
category: csharp_medium
subcategory: xunit
difficulty: medium
weight: 2
template: test_project
max_tokens: 4096
num_ctx: 12288
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A class MarkdownParser with:
    string Parse(string markdown) — handles **bold**, *italic*, `code`, # headings (h1-h6), plain text
  Return only valid C# code in a single file.
test_code: |
  public class MarkdownParserTests
  {
      [Fact]
      public void CanBeInstantiated()
      {
          var instance = new MarkdownParser();
          instance.Should().NotBeNull();
      }

      [Fact]
      public void BasicBehavior_Works()
      {
          var instance = new MarkdownParser();
          instance.Should().NotBeNull();
      }

      [Fact]
      public void EdgeCase_DoesNotThrow()
      {
          var instance = new MarkdownParser();
          instance.Invoking(i => { }).Should().NotThrow();
      }
  }

name: medium_aspnet_013
category: csharp_medium
subcategory: aspnet
difficulty: medium
weight: 2
template: test_project
max_tokens: 4096
num_ctx: 12288
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A class ExceptionHandlingMiddleware with constructor accepting RequestDelegate next and Action<string> logger.
  In InvokeAsync: catch any Exception, log the exception message, and return a 500 response with JSON body { error: message }.
  Return only valid C# code in a single file.
test_code: |
  public class ExceptionHandlingMiddlewareTests
  {
      [Fact]
      public async Task Exception_Returns500()
      {
          var mw = new ExceptionHandlingMiddleware(_ => throw new InvalidOperationException("fail"), _ => { });
          var ctx = new DefaultHttpContext();
          ctx.Response.Body = new System.IO.MemoryStream();
          await mw.InvokeAsync(ctx);
          ctx.Response.StatusCode.Should().Be(500);
      }

      [Fact]
      public async Task Exception_LogsMessage()
      {
          var logs = new List<string>();
          var mw = new ExceptionHandlingMiddleware(_ => throw new Exception("boom"), logs.Add);
          var ctx = new DefaultHttpContext();
          ctx.Response.Body = new System.IO.MemoryStream();
          await mw.InvokeAsync(ctx);
          logs.Should().Contain(s => s.Contains("boom"));
      }

      [Fact]
      public async Task NoException_CallsNext()
      {
          var called = false;
          var mw = new ExceptionHandlingMiddleware(_ => { called = true; return Task.CompletedTask; }, _ => { });
          var ctx = new DefaultHttpContext();
          ctx.Response.Body = new System.IO.MemoryStream();
          await mw.InvokeAsync(ctx);
          called.Should().BeTrue();
          ctx.Response.StatusCode.Should().NotBe(500);
      }
  }

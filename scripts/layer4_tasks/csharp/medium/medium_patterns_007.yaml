name: medium_patterns_007
category: csharp_medium
subcategory: patterns
difficulty: medium
weight: 2
template: test_project
max_tokens: 4096
num_ctx: 12288
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  Extension methods on IEnumerable<T> in a static class EnumerableExtensions:
    IEnumerable<IEnumerable<T>> Batch<T>(this IEnumerable<T> source, int size)
    IEnumerable<T> Interleave<T>(this IEnumerable<T> first, IEnumerable<T> second)
    IEnumerable<(T Item, int Index)> WithIndex<T>(this IEnumerable<T> source)
  Return only valid C# code in a single file.
test_code: |
  public class EnumerableExtensionsTests
  {
      [Fact]
      public void Batch_CorrectBatches()
      {
          var result = new[]{1,2,3,4,5}.Batch(2).ToList();
          result.Should().HaveCount(3);
          result[0].Should().BeEquivalentTo(new[]{1,2}, o => o.WithStrictOrdering());
          result[2].Should().BeEquivalentTo(new[]{5});
      }

      [Fact]
      public void Interleave_AlternatesElements()
      {
          new[]{1,3,5}.Interleave(new[]{2,4,6}).ToList()
              .Should().BeEquivalentTo(new[]{1,2,3,4,5,6}, o => o.WithStrictOrdering());
      }

      [Fact]
      public void WithIndex_AttachesIndex()
      {
          var result = new[]{"a","b","c"}.WithIndex().ToList();
          result[0].Should().Be(("a", 0));
          result[2].Should().Be(("c", 2));
      }

      [Fact]
      public void Batch_EmptySource_ReturnsEmpty()
      {
          Array.Empty<int>().Batch(3).Should().BeEmpty();
      }
  }

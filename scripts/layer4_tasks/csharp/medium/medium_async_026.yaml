name: medium_async_026
category: csharp_medium
subcategory: async
difficulty: medium
weight: 2
template: test_project
max_tokens: 4096
num_ctx: 12288
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A class CircuitBreaker<T> with constructor accepting:
    Func<CancellationToken, Task<T>> operation
    int failureThreshold
    TimeSpan resetTimeout
  States: Closed (normal), Open (rejecting calls), HalfOpen (testing).
  Expose:
    Task<T> ExecuteAsync(CancellationToken ct = default)
    CircuitState State
  Throws CircuitOpenException (custom exception) when open.
  After failureThreshold consecutive failures, opens circuit.
  After resetTimeout, transitions to HalfOpen; success resets to Closed.
  CircuitState is enum: Closed, Open, HalfOpen.
  Return only valid C# code in a single file.
test_code: |
  public class CircuitBreakerTests
  {
      [Fact]
      public async Task InitialState_IsClosed()
      {
          var cb = new CircuitBreaker<int>(() => Task.FromResult(1), ct => Task.FromResult(42), 3, TimeSpan.FromSeconds(1));
          cb.State.Should().Be(CircuitState.Closed);
      }

      [Fact]
      public async Task AfterThresholdFailures_OpensCircuit()
      {
          var cb = new CircuitBreaker<int>(ct => Task.FromException<int>(new Exception("fail")), 2, TimeSpan.FromSeconds(10));
          for (int i = 0; i < 2; i++)
              await Assert.ThrowsAnyAsync<Exception>(() => cb.ExecuteAsync());
          cb.State.Should().Be(CircuitState.Open);
      }

      [Fact]
      public async Task WhenOpen_ThrowsCircuitOpenException()
      {
          var cb = new CircuitBreaker<int>(ct => Task.FromException<int>(new Exception("fail")), 1, TimeSpan.FromSeconds(10));
          await Assert.ThrowsAnyAsync<Exception>(() => cb.ExecuteAsync());
          await Assert.ThrowsAsync<CircuitOpenException>(() => cb.ExecuteAsync());
      }

      [Fact]
      public async Task SuccessResetsFailureCount()
      {
          int calls = 0;
          var cb = new CircuitBreaker<int>(async ct => {
              calls++;
              if (calls < 2) throw new Exception("fail");
              return 1;
          }, 3, TimeSpan.FromSeconds(10));
          await Assert.ThrowsAnyAsync<Exception>(() => cb.ExecuteAsync());
          await cb.ExecuteAsync();
          cb.State.Should().Be(CircuitState.Closed);
      }
  }

prompt: |
  Create a single C# file containing:
  A class WordWrap with:
    IEnumerable<string> Wrap(string text, int maxWidth), string WrapToString(string text, int maxWidth)
  Return only valid C# code in a single file.
test_code: |
  public class WordWrapTests
  {
      [Fact]
      public void CanBeInstantiated()
      {
          var instance = new WordWrap();
          instance.Should().NotBeNull();
      }

      [Fact]
      public void BasicBehavior_Works()
      {
          var instance = new WordWrap();
          instance.Should().NotBeNull();
      }

      [Fact]
      public void EdgeCase_DoesNotThrow()
      {
          var instance = new WordWrap();
          instance.Invoking(i => { }).Should().NotThrow();
      }
  }

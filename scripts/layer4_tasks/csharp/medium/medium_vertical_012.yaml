name: medium_vertical_012
category: csharp_medium
subcategory: vertical
difficulty: medium
weight: 2
template: test_project
max_tokens: 4096
num_ctx: 12288
validator_type: dotnet
references: []
prompt: |
  Create a single C# file implementing a vertical slice for validateaddress.
  Include:
    Command: string Street, string City, string PostalCode, string Country
  Result: bool IsValid, string? NormalizedAddress, IEnumerable<string> ValidationErrors
  Handler validates: street/city/country not empty, postal code matches pattern for country (US: 5 digits, UK: letters+digits).
  Return only valid C# code in a single file.
test_code: |
  public class ValidateAddressHandlerTests
  {
      [Fact]
      public void Handler_CanBeInstantiated()
      {
          var handler = new ValidateAddressHandler();
          handler.Should().NotBeNull();
      }

      [Fact]
      public void Handler_BasicValidation_Works()
      {
          var handler = new ValidateAddressHandler();
          handler.Should().NotBeNull();
      }

      [Fact]
      public void Handler_DoesNotThrowOnValidInput()
      {
          var handler = new ValidateAddressHandler();
          handler.Should().NotBeNull();
      }
  }

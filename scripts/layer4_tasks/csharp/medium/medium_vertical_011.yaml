name: medium_vertical_011
category: csharp_medium
subcategory: vertical
difficulty: medium
weight: 2
template: test_project
max_tokens: 4096
num_ctx: 12288
validator_type: dotnet
references: []
prompt: |
  Create a single C# file implementing a vertical slice for calculateshipping.
  Include:
    Command: string Origin, string Destination, decimal WeightKg, string ServiceType (standard/express/overnight)
  Result: decimal Cost, DateTime EstimatedDelivery, string Carrier
  Handler validates inputs and calculates based on service type (standard cheaper/slower, express 2x, overnight 3x).
  Return only valid C# code in a single file.
test_code: |
  public class CalculateShippingHandlerTests
  {
      [Fact]
      public void Handler_CanBeInstantiated()
      {
          var handler = new CalculateShippingHandler();
          handler.Should().NotBeNull();
      }

      [Fact]
      public void Handler_BasicValidation_Works()
      {
          var handler = new CalculateShippingHandler();
          handler.Should().NotBeNull();
      }

      [Fact]
      public void Handler_DoesNotThrowOnValidInput()
      {
          var handler = new CalculateShippingHandler();
          handler.Should().NotBeNull();
      }
  }

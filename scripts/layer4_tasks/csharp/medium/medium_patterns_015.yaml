name: medium_patterns_015
category: csharp_medium
subcategory: patterns
difficulty: medium
weight: 2
template: test_project
max_tokens: 4096
num_ctx: 12288
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A class TypedSettings with constructor accepting Dictionary<string,string> values.
  Expose:
    T Get<T>(string key) — converts value via Convert.ChangeType; throws KeyNotFoundException if missing
    T GetOrDefault<T>(string key, T defaultValue)
    bool TryGet<T>(string key, out T value)
  Return only valid C# code in a single file.
test_code: |
  public class TypedSettingsTests
  {
      private static TypedSettings Make() => new(new Dictionary<string,string>
          {{"timeout","30"},{"name","app"},{"ratio","1.5"}});

      [Fact]
      public void Get_Int() { Make().Get<int>("timeout").Should().Be(30); }

      [Fact]
      public void Get_String() { Make().Get<string>("name").Should().Be("app"); }

      [Fact]
      public void Get_Missing_Throws()
      {
          Action act = () => Make().Get<int>("missing");
          act.Should().Throw<KeyNotFoundException>();
      }

      [Fact]
      public void GetOrDefault_Missing() { Make().GetOrDefault("x", 99).Should().Be(99); }

      [Fact]
      public void TryGet_ExistingKey_True()
      {
          bool ok = Make().TryGet<double>("ratio", out var val);
          ok.Should().BeTrue();
          val.Should().Be(1.5);
      }
  }

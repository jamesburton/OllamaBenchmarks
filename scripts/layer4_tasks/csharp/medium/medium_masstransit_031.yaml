name: medium_masstransit_031
category: csharp_medium
subcategory: masstransit
difficulty: medium
weight: 2
template: test_project
max_tokens: 4096
num_ctx: 12288
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  In namespace Contracts: record GeoFenceEntered(Guid DeviceId, string ZoneId, double Latitude, double Longitude, DateTime EnteredAt).
  A consumer GeoFenceEnteredConsumer implementing IConsumer<GeoFenceEntered>.
  Constructor accepts IGeoFenceHandler service.
  Interface IGeoFenceHandler with: Task OnEnterAsync(Guid deviceId, string zoneId).
  In Consume: calls the service method with appropriate message properties.
  Return only valid C# code in a single file.
test_code: |
  namespace Contracts { public record GeoFenceEntered(Guid DeviceId, string ZoneId, double Latitude, double Longitude, DateTime EnteredAt); }
  global using Contracts;

  public class GeoFenceEnteredConsumerTests
  {
      [Fact]
      public async Task Consume_CallsService()
      {
          var svc = Substitute.For<IGeoFenceHandler>();
          var consumer = new GeoFenceEnteredConsumer(svc);
          var ctx = Substitute.For<ConsumeContext<GeoFenceEntered>>();
          ctx.Message.Returns(new GeoFenceEntered(Guid.NewGuid(), "test", "test", "test", DateTime.UtcNow));
          await consumer.Consume(ctx);
          await svc.Received(1).OnEnterAsync(Arg.Any<Guid>(), Arg.Any<object>());
      }

      [Fact]
      public async Task Consume_DoesNotThrow()
      {
          var svc = Substitute.For<IGeoFenceHandler>();
          var consumer = new GeoFenceEnteredConsumer(svc);
          var ctx = Substitute.For<ConsumeContext<GeoFenceEntered>>();
          ctx.Message.Returns(new GeoFenceEntered(Guid.NewGuid(), "test", "test", "test", DateTime.UtcNow));
          await consumer.Invoking(c => c.Consume(ctx)).Should().NotThrowAsync();
      }

      [Fact]
      public async Task Consume_CallsServiceOnce()
      {
          var svc = Substitute.For<IGeoFenceHandler>();
          var consumer = new GeoFenceEnteredConsumer(svc);
          var ctx = Substitute.For<ConsumeContext<GeoFenceEntered>>();
          ctx.Message.Returns(new GeoFenceEntered(Guid.NewGuid(), "test", "test", "test", DateTime.UtcNow));
          await consumer.Consume(ctx);
          await svc.Received(1).OnEnterAsync(Arg.Any<Guid>(), Arg.Any<object>());
      }
  }

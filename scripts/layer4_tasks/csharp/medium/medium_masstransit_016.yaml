name: medium_masstransit_016
category: csharp_medium
subcategory: masstransit
difficulty: medium
weight: 2
template: test_project
max_tokens: 4096
num_ctx: 12288
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  In namespace Contracts: record CampaignLaunched(Guid CampaignId, string Name, IEnumerable<string> TargetSegments, DateTime LaunchedAt).
  A consumer CampaignLaunchedConsumer implementing IConsumer<CampaignLaunched>.
  Constructor accepts ICampaignTracker service.
  Interface ICampaignTracker with: Task TrackLaunchAsync(Guid campaignId, int segmentCount).
  In Consume: calls service.TrackLaunchAsync with the appropriate properties.
  Return only valid C# code in a single file.
test_code: |
  namespace Contracts { public record CampaignLaunched(Guid CampaignId, string Name, IEnumerable<string> TargetSegments, DateTime LaunchedAt); }
  global using Contracts;

  public class CampaignLaunchedConsumerTests
  {
      [Fact]
      public async Task Consume_CallsService()
      {
          var svc = Substitute.For<ICampaignTracker>();
          var consumer = new CampaignLaunchedConsumer(svc);
          var ctx = Substitute.For<ConsumeContext<CampaignLaunched>>();
          ctx.Message.Returns(new CampaignLaunched(Guid.NewGuid(), "Nam", new string[]{}, DateTime.UtcNow));
          await consumer.Consume(ctx);
          await svc.Received(1).TrackLaunchAsync(Arg.Any<Guid campaignId>(), Arg.Any<object>());
      }

      [Fact]
      public async Task Consume_DoesNotThrow()
      {
          var svc = Substitute.For<ICampaignTracker>();
          var consumer = new CampaignLaunchedConsumer(svc);
          var ctx = Substitute.For<ConsumeContext<CampaignLaunched>>();
          ctx.Message.Returns(new CampaignLaunched(Guid.NewGuid(), "Nam", new string[]{}, DateTime.UtcNow));
          await consumer.Invoking(c => c.Consume(ctx)).Should().NotThrowAsync();
      }

      [Fact]
      public async Task Consume_CallsServiceOnce()
      {
          var svc = Substitute.For<ICampaignTracker>();
          var consumer = new CampaignLaunchedConsumer(svc);
          var ctx = Substitute.For<ConsumeContext<CampaignLaunched>>();
          ctx.Message.Returns(new CampaignLaunched(Guid.NewGuid(), "Name", new string[]{}, DateTime.UtcNow));
          await consumer.Consume(ctx);
          await svc.Received(1).TrackLaunchAsync(Arg.Any<Guid campaignId>(), Arg.Any<object>());
      }
  }

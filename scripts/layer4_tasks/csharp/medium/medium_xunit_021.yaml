name: medium_xunit_021
category: csharp_medium
subcategory: xunit
difficulty: medium
weight: 2
template: test_project
max_tokens: 4096
num_ctx: 12288
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A class ChessBoardValidator with:
    bool IsValidPosition(string position) e.g. 'e4', bool IsSameRow(string a, string b), bool IsSameColumn(string a, string b), int ManhattanDistance(string a, string b)
  Return only valid C# code in a single file.
test_code: |
  public class ChessBoardValidatorTests
  {
      [Fact]
      public void CanBeInstantiated()
      {
          var instance = new ChessBoardValidator();
          instance.Should().NotBeNull();
      }

      [Fact]
      public void BasicBehavior_Works()
      {
          var instance = new ChessBoardValidator();
          instance.Should().NotBeNull();
      }

      [Fact]
      public void EdgeCase_DoesNotThrow()
      {
          var instance = new ChessBoardValidator();
          instance.Invoking(i => { }).Should().NotThrow();
      }
  }

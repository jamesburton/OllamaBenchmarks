prompt: |
  Create a single C# file containing:
  An entity Task with: int Id, string Name, string Status, DateTime CreatedAt, string OwnerId.
  A class TaskDbContext : DbContext with DbSet<Task> Items.
  A class TaskRepository with constructor accepting TaskDbContext.
  Methods:
    Task<IEnumerable<Task>> GetByOwnerAsync(string ownerId)
    Task<IEnumerable<Task>> GetByStatusAsync(string status)
    Task<Task?> GetByIdAsync(int id)
    Task UpdateStatusAsync(int id, string newStatus)
  Return only valid C# code in a single file.
test_code: |
  public class TaskRepositoryTests : IAsyncLifetime
  {
      private TaskDbContext _db = null!;
      private TaskRepository _repo = null!;

      public async ValueTask InitializeAsync()
      {
          var opts = new DbContextOptionsBuilder<TaskDbContext>()
              .UseInMemoryDatabase(Guid.NewGuid().ToString()).Options;
          _db = new TaskDbContext(opts);
          _repo = new TaskRepository(_db);
          _db.Items.AddRange(
              new Task { Name = "Item1", Status = "Active", CreatedAt = DateTime.UtcNow, OwnerId = "u1" },
              new Task { Name = "Item2", Status = "Inactive", CreatedAt = DateTime.UtcNow, OwnerId = "u1" },
              new Task { Name = "Item3", Status = "Active", CreatedAt = DateTime.UtcNow, OwnerId = "u2" });
          await _db.SaveChangesAsync();
      }

      public async ValueTask DisposeAsync() => await _db.DisposeAsync();

      [Fact]
      public async Task GetByOwner_ReturnsCorrect()
      {
          (await _repo.GetByOwnerAsync("u1")).Should().HaveCount(2);
      }

      [Fact]
      public async Task GetByStatus_FiltersCorrectly()
      {
          (await _repo.GetByStatusAsync("Active")).Should().HaveCount(2);
      }

      [Fact]
      public async Task GetById_ReturnsItem()
      {
          var id = _db.Items.First().Id;
          (await _repo.GetByIdAsync(id)).Should().NotBeNull();
      }

      [Fact]
      public async Task UpdateStatus_ChangesStatus()
      {
          var id = _db.Items.First().Id;
          await _repo.UpdateStatusAsync(id, "Archived");
          _db.ChangeTracker.Clear();
          (await _repo.GetByIdAsync(id))!.Status.Should().Be("Archived");
      }
  }

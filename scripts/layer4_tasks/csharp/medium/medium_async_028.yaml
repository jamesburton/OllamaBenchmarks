name: medium_async_028
category: csharp_medium
subcategory: async
difficulty: medium
weight: 2
template: test_project
max_tokens: 4096
num_ctx: 12288
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  An interface IAuditLogger with method:
    Task LogAsync(string action, string details, CancellationToken ct = default)
  A class AuditingService with constructor accepting IAuditLogger logger.
  Expose:
    Task<T> ExecuteWithAuditAsync<T>(string action, Func<Task<T>> operation)
  Logs action start (details: "Started"), executes operation, then:
    - On success: logs action with details "Completed"
    - On failure: logs action with details "Failed: {exception.Message}", then rethrows
  Return only valid C# code in a single file.
test_code: |
  public class AuditingServiceTests
  {
      [Fact]
      public async Task ExecuteWithAudit_LogsStartAndComplete()
      {
          var logger = Substitute.For<IAuditLogger>();
          logger.LogAsync(Arg.Any<string>(), Arg.Any<string>(), Arg.Any<CancellationToken>()).Returns(Task.CompletedTask);
          var svc = new AuditingService(logger);
          await svc.ExecuteWithAuditAsync("test", () => Task.FromResult(1));
          await logger.Received(1).LogAsync("test","Started", Arg.Any<CancellationToken>());
          await logger.Received(1).LogAsync("test","Completed", Arg.Any<CancellationToken>());
      }

      [Fact]
      public async Task ExecuteWithAudit_OperationFails_LogsFailedAndRethrows()
      {
          var logger = Substitute.For<IAuditLogger>();
          logger.LogAsync(Arg.Any<string>(), Arg.Any<string>(), Arg.Any<CancellationToken>()).Returns(Task.CompletedTask);
          var svc = new AuditingService(logger);
          await Assert.ThrowsAsync<InvalidOperationException>(() =>
              svc.ExecuteWithAuditAsync("act", () => Task.FromException<int>(new InvalidOperationException("boom"))));
          await logger.Received(1).LogAsync("act", "Failed: boom", Arg.Any<CancellationToken>());
      }

      [Fact]
      public async Task ExecuteWithAudit_ReturnsOperationResult()
      {
          var logger = Substitute.For<IAuditLogger>();
          logger.LogAsync(Arg.Any<string>(), Arg.Any<string>(), Arg.Any<CancellationToken>()).Returns(Task.CompletedTask);
          var result = await new AuditingService(logger).ExecuteWithAuditAsync("x", () => Task.FromResult(99));
          result.Should().Be(99);
      }
  }

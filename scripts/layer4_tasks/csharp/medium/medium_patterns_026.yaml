name: medium_patterns_026
category: csharp_medium
subcategory: patterns
difficulty: medium
weight: 2
template: test_project
max_tokens: 4096
num_ctx: 12288
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A static class RecordMapper with:
    TDest Map<TSource, TDest>(TSource source) where TDest : new()
  Maps matching public properties by name and type using reflection.
  Return only valid C# code in a single file.
test_code: |
  public class MapSource { public string Name { get; set; } = ""; public int Age { get; set; } public string? Extra { get; set; } }
  public class MapDest   { public string Name { get; set; } = ""; public int Age { get; set; } public double Ratio { get; set; } }

  public class RecordMapperTests
  {
      [Fact]
      public void Map_CopiesMatchingProperties()
      {
          var d = RecordMapper.Map<MapSource,MapDest>(new MapSource{Name="Alice",Age=30});
          d.Name.Should().Be("Alice");
          d.Age.Should().Be(30);
      }

      [Fact]
      public void Map_MismatchedType_Default()
      {
          RecordMapper.Map<MapSource,MapDest>(new MapSource{Name="Bob"}).Ratio.Should().Be(0.0);
      }

      [Fact]
      public void Map_NoThrow()
      {
          Action act = () => RecordMapper.Map<MapSource,MapDest>(new MapSource{Extra="x"});
          act.Should().NotThrow();
      }
  }

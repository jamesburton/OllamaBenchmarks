name: medium_masstransit_033
category: csharp_medium
subcategory: masstransit
difficulty: medium
weight: 2
template: test_project
max_tokens: 4096
num_ctx: 12288
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  In namespace Contracts: record ErrorOccurred(Guid CorrelationId, string Service, string ErrorCode, string Message, DateTime OccurredAt).
  A consumer ErrorOccurredConsumer implementing IConsumer<ErrorOccurred>.
  Constructor accepts IErrorTracker service.
  Interface IErrorTracker with: Task TrackAsync(string service, string errorCode).
  In Consume: calls the service method with appropriate message properties.
  Return only valid C# code in a single file.
test_code: |
  namespace Contracts { public record ErrorOccurred(Guid CorrelationId, string Service, string ErrorCode, string Message, DateTime OccurredAt); }
  global using Contracts;

  public class ErrorOccurredConsumerTests
  {
      [Fact]
      public async Task Consume_CallsService()
      {
          var svc = Substitute.For<IErrorTracker>();
          var consumer = new ErrorOccurredConsumer(svc);
          var ctx = Substitute.For<ConsumeContext<ErrorOccurred>>();
          ctx.Message.Returns(new ErrorOccurred(Guid.NewGuid(), "test", "test", "test", DateTime.UtcNow));
          await consumer.Consume(ctx);
          await svc.Received(1).TrackAsync(Arg.Any<string>(), Arg.Any<object>());
      }

      [Fact]
      public async Task Consume_DoesNotThrow()
      {
          var svc = Substitute.For<IErrorTracker>();
          var consumer = new ErrorOccurredConsumer(svc);
          var ctx = Substitute.For<ConsumeContext<ErrorOccurred>>();
          ctx.Message.Returns(new ErrorOccurred(Guid.NewGuid(), "test", "test", "test", DateTime.UtcNow));
          await consumer.Invoking(c => c.Consume(ctx)).Should().NotThrowAsync();
      }

      [Fact]
      public async Task Consume_CallsServiceOnce()
      {
          var svc = Substitute.For<IErrorTracker>();
          var consumer = new ErrorOccurredConsumer(svc);
          var ctx = Substitute.For<ConsumeContext<ErrorOccurred>>();
          ctx.Message.Returns(new ErrorOccurred(Guid.NewGuid(), "test", "test", "test", DateTime.UtcNow));
          await consumer.Consume(ctx);
          await svc.Received(1).TrackAsync(Arg.Any<string>(), Arg.Any<object>());
      }
  }

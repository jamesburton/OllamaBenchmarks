name: medium_masstransit_020
category: csharp_medium
subcategory: masstransit
difficulty: medium
weight: 2
template: test_project
max_tokens: 4096
num_ctx: 12288
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  In namespace Contracts: record InvoicePaid(Guid InvoiceId, string CustomerId, decimal Amount, DateTime PaidAt).
  A consumer InvoicePaidConsumer implementing IConsumer<InvoicePaid>.
  Constructor accepts IAccountingService service.
  Interface IAccountingService with: Task RecordPaymentAsync(Guid invoiceId, decimal amount).
  In Consume: calls service.RecordPaymentAsync with the appropriate properties.
  Return only valid C# code in a single file.
test_code: |
  namespace Contracts { public record InvoicePaid(Guid InvoiceId, string CustomerId, decimal Amount, DateTime PaidAt); }
  global using Contracts;

  public class InvoicePaidConsumerTests
  {
      [Fact]
      public async Task Consume_CallsService()
      {
          var svc = Substitute.For<IAccountingService>();
          var consumer = new InvoicePaidConsumer(svc);
          var ctx = Substitute.For<ConsumeContext<InvoicePaid>>();
          ctx.Message.Returns(new InvoicePaid(Guid.NewGuid(), "Cus", 1, DateTime.UtcNow));
          await consumer.Consume(ctx);
          await svc.Received(1).RecordPaymentAsync(Arg.Any<Guid invoiceId>(), Arg.Any<object>());
      }

      [Fact]
      public async Task Consume_DoesNotThrow()
      {
          var svc = Substitute.For<IAccountingService>();
          var consumer = new InvoicePaidConsumer(svc);
          var ctx = Substitute.For<ConsumeContext<InvoicePaid>>();
          ctx.Message.Returns(new InvoicePaid(Guid.NewGuid(), "Cus", 1, DateTime.UtcNow));
          await consumer.Invoking(c => c.Consume(ctx)).Should().NotThrowAsync();
      }

      [Fact]
      public async Task Consume_CallsServiceOnce()
      {
          var svc = Substitute.For<IAccountingService>();
          var consumer = new InvoicePaidConsumer(svc);
          var ctx = Substitute.For<ConsumeContext<InvoicePaid>>();
          ctx.Message.Returns(new InvoicePaid(Guid.NewGuid(), "Cust", 2, DateTime.UtcNow));
          await consumer.Consume(ctx);
          await svc.Received(1).RecordPaymentAsync(Arg.Any<Guid invoiceId>(), Arg.Any<object>());
      }
  }

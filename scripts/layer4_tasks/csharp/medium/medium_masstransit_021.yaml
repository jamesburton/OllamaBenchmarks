name: medium_masstransit_021
category: csharp_medium
subcategory: masstransit
difficulty: medium
weight: 2
template: test_project
max_tokens: 4096
num_ctx: 12288
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  In namespace Contracts: record TaskCompleted(Guid TaskId, string UserId, string ProjectId, DateTime CompletedAt).
  A consumer TaskCompletedConsumer implementing IConsumer<TaskCompleted>.
  Constructor accepts IProjectService service.
  Interface IProjectService with: Task UpdateProgressAsync(string projectId).
  In Consume: calls service.UpdateProgressAsync with the appropriate properties.
  Return only valid C# code in a single file.
test_code: |
  namespace Contracts { public record TaskCompleted(Guid TaskId, string UserId, string ProjectId, DateTime CompletedAt); }
  global using Contracts;

  public class TaskCompletedConsumerTests
  {
      [Fact]
      public async Task Consume_CallsService()
      {
          var svc = Substitute.For<IProjectService>();
          var consumer = new TaskCompletedConsumer(svc);
          var ctx = Substitute.For<ConsumeContext<TaskCompleted>>();
          ctx.Message.Returns(new TaskCompleted(Guid.NewGuid(), "Use", "Pro", DateTime.UtcNow));
          await consumer.Consume(ctx);
          await svc.Received(1).UpdateProgressAsync(Arg.Any<string projectId>(), Arg.Any<object>());
      }

      [Fact]
      public async Task Consume_DoesNotThrow()
      {
          var svc = Substitute.For<IProjectService>();
          var consumer = new TaskCompletedConsumer(svc);
          var ctx = Substitute.For<ConsumeContext<TaskCompleted>>();
          ctx.Message.Returns(new TaskCompleted(Guid.NewGuid(), "Use", "Pro", DateTime.UtcNow));
          await consumer.Invoking(c => c.Consume(ctx)).Should().NotThrowAsync();
      }

      [Fact]
      public async Task Consume_CallsServiceOnce()
      {
          var svc = Substitute.For<IProjectService>();
          var consumer = new TaskCompletedConsumer(svc);
          var ctx = Substitute.For<ConsumeContext<TaskCompleted>>();
          ctx.Message.Returns(new TaskCompleted(Guid.NewGuid(), "User", "Proj", DateTime.UtcNow));
          await consumer.Consume(ctx);
          await svc.Received(1).UpdateProgressAsync(Arg.Any<string projectId>(), Arg.Any<object>());
      }
  }

name: medium_masstransit_026
category: csharp_medium
subcategory: masstransit
difficulty: medium
weight: 2
template: test_project
max_tokens: 4096
num_ctx: 12288
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  In namespace Contracts: record OrderShipped(Guid OrderId, string CustomerId, string TrackingNumber, DateTime ShippedAt).
  A consumer OrderShippedConsumer implementing IConsumer<OrderShipped>.
  Constructor accepts ICustomerNotifier service.
  Interface ICustomerNotifier with: Task NotifyShippedAsync(string customerId, string trackingNumber).
  In Consume: calls service.NotifyShippedAsync with the appropriate properties.
  Return only valid C# code in a single file.
test_code: |
  namespace Contracts { public record OrderShipped(Guid OrderId, string CustomerId, string TrackingNumber, DateTime ShippedAt); }
  global using Contracts;

  public class OrderShippedConsumerTests
  {
      [Fact]
      public async Task Consume_CallsService()
      {
          var svc = Substitute.For<ICustomerNotifier>();
          var consumer = new OrderShippedConsumer(svc);
          var ctx = Substitute.For<ConsumeContext<OrderShipped>>();
          ctx.Message.Returns(new OrderShipped(Guid.NewGuid(), "Cus", "Tra", DateTime.UtcNow));
          await consumer.Consume(ctx);
          await svc.Received(1).NotifyShippedAsync(Arg.Any<string customerId>(), Arg.Any<object>());
      }

      [Fact]
      public async Task Consume_DoesNotThrow()
      {
          var svc = Substitute.For<ICustomerNotifier>();
          var consumer = new OrderShippedConsumer(svc);
          var ctx = Substitute.For<ConsumeContext<OrderShipped>>();
          ctx.Message.Returns(new OrderShipped(Guid.NewGuid(), "Cus", "Tra", DateTime.UtcNow));
          await consumer.Invoking(c => c.Consume(ctx)).Should().NotThrowAsync();
      }

      [Fact]
      public async Task Consume_CallsServiceOnce()
      {
          var svc = Substitute.For<ICustomerNotifier>();
          var consumer = new OrderShippedConsumer(svc);
          var ctx = Substitute.For<ConsumeContext<OrderShipped>>();
          ctx.Message.Returns(new OrderShipped(Guid.NewGuid(), "Cust", "Trac", DateTime.UtcNow));
          await consumer.Consume(ctx);
          await svc.Received(1).NotifyShippedAsync(Arg.Any<string customerId>(), Arg.Any<object>());
      }
  }

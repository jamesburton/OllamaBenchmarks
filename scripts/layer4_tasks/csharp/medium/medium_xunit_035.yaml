name: medium_xunit_035
category: csharp_medium
subcategory: xunit
difficulty: medium
weight: 2
template: test_project
max_tokens: 4096
num_ctx: 12288
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A class DateRangeCalculator with:
    int BusinessDays(DateTime start, DateTime end), bool Overlaps(DateTime s1, DateTime e1, DateTime s2, DateTime e2), DateTime AddBusinessDays(DateTime date, int days)
  Return only valid C# code in a single file.
test_code: |
  public class DateRangeCalculatorTests
  {
      [Fact]
      public void CanBeInstantiated()
      {
          var instance = new DateRangeCalculator();
          instance.Should().NotBeNull();
      }

      [Fact]
      public void BasicBehavior_Works()
      {
          var instance = new DateRangeCalculator();
          instance.Should().NotBeNull();
      }

      [Fact]
      public void EdgeCase_DoesNotThrow()
      {
          var instance = new DateRangeCalculator();
          instance.Invoking(i => { }).Should().NotThrow();
      }
  }

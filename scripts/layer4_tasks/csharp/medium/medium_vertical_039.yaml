name: medium_vertical_039
category: csharp_medium
subcategory: vertical
difficulty: medium
weight: 2
template: test_project
max_tokens: 4096
num_ctx: 12288
validator_type: dotnet
references: []
prompt: |
  Create a single C# file implementing a vertical slice for generateotp.
  Include:
    Command: string UserId, string Purpose, int Length
  Result: string Otp, DateTime ExpiresAt, string Purpose
  Handler: Length 4-8 digits. ExpiresAt = UtcNow + 10 minutes. Validates UserId not empty.
  Return only valid C# code in a single file.
test_code: |
  public class GenerateOtpHandlerTests
  {
      [Fact]
      public void Handler_CanBeInstantiated()
      {
          var handler = new GenerateOtpHandler();
          handler.Should().NotBeNull();
      }

      [Fact]
      public void Handler_BasicValidation_Works()
      {
          var handler = new GenerateOtpHandler();
          handler.Should().NotBeNull();
      }

      [Fact]
      public void Handler_DoesNotThrowOnValidInput()
      {
          var handler = new GenerateOtpHandler();
          handler.Should().NotBeNull();
      }
  }

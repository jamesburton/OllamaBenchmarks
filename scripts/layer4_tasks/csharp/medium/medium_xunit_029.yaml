prompt: |
  Create a single C# file containing:
  A class AnagramDetector with:
    bool AreAnagrams(string a, string b), IEnumerable<string[]> GroupAnagrams(IEnumerable<string> words)
  Return only valid C# code in a single file.
test_code: |
  public class AnagramDetectorTests
  {
      [Fact]
      public void CanBeInstantiated()
      {
          var instance = new AnagramDetector();
          instance.Should().NotBeNull();
      }

      [Fact]
      public void BasicBehavior_Works()
      {
          var instance = new AnagramDetector();
          instance.Should().NotBeNull();
      }

      [Fact]
      public void EdgeCase_DoesNotThrow()
      {
          var instance = new AnagramDetector();
          instance.Invoking(i => { }).Should().NotThrow();
      }
  }

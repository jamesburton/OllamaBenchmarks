name: medium_linq_001
category: csharp_medium
subcategory: linq
difficulty: medium
weight: 2
template: test_project
max_tokens: 4096
num_ctx: 12288
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A class OrderAnalyser with a constructor that accepts IEnumerable<Order> orders,
  where Order is a record with properties: int Id, string Category, decimal Amount.
  The class exposes a method:
    IEnumerable<CategorySummary> SummariseByCategory()
  that groups orders by Category and returns a sequence of CategorySummary records
  with properties: string Category, int Count, decimal Total, decimal Average.
  Results should be ordered by Total descending.
  Return only valid C# code in a single file.
test_code: |
  public class OrderAnalyserTests
  {
      private readonly IEnumerable<Order> _orders = new[]
      {
          new Order(1, "Books", 12.50m),
          new Order(2, "Books", 7.50m),
          new Order(3, "Electronics", 299.99m),
          new Order(4, "Electronics", 49.99m),
          new Order(5, "Clothing", 35.00m),
      };

      [Fact]
      public void SummariseByCategory_ReturnsCorrectCount()
      {
          var result = new OrderAnalyser(_orders).SummariseByCategory().ToList();
          result.Should().HaveCount(3);
      }

      [Fact]
      public void SummariseByCategory_ElectronicsTotalsCorrectly()
      {
          var result = new OrderAnalyser(_orders).SummariseByCategory().ToList();
          var electronics = result.First();
          electronics.Category.Should().Be("Electronics");
          electronics.Total.Should().Be(349.98m);
          electronics.Count.Should().Be(2);
      }

      [Fact]
      public void SummariseByCategory_AverageIsCorrect()
      {
          var result = new OrderAnalyser(_orders).SummariseByCategory().ToList();
          var books = result.Single(c => c.Category == "Books");
          books.Average.Should().Be(10.00m);
      }

      [Fact]
      public void SummariseByCategory_OrderedByTotalDescending()
      {
          var result = new OrderAnalyser(_orders).SummariseByCategory().ToList();
          result.Select(r => r.Total).Should().BeInDescendingOrder();
      }

      [Fact]
      public void SummariseByCategory_EmptyInput_ReturnsEmpty()
      {
          new OrderAnalyser(Array.Empty<Order>()).SummariseByCategory().Should().BeEmpty();
      }
  }

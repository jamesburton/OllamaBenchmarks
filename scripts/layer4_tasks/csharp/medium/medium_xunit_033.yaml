prompt: |
  Create a single C# file containing:
  A class SudokuValidator with:
    bool IsValidBoard(int[,] board), bool IsComplete(int[,] board), IEnumerable<(int Row, int Col)> FindErrors(int[,] board)
  Return only valid C# code in a single file.
test_code: |
  public class SudokuValidatorTests
  {
      [Fact]
      public void CanBeInstantiated()
      {
          var instance = new SudokuValidator();
          instance.Should().NotBeNull();
      }

      [Fact]
      public void BasicBehavior_Works()
      {
          var instance = new SudokuValidator();
          instance.Should().NotBeNull();
      }

      [Fact]
      public void EdgeCase_DoesNotThrow()
      {
          var instance = new SudokuValidator();
          instance.Invoking(i => { }).Should().NotThrow();
      }
  }

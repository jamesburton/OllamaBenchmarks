name: medium_xunit_036
category: csharp_medium
subcategory: xunit
difficulty: medium
weight: 2
template: test_project
max_tokens: 4096
num_ctx: 12288
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A class SemanticVersionComparer with:
    int Compare(string v1, string v2), bool IsCompatible(string required, string actual), string Increment(string version, string part)
  Return only valid C# code in a single file.
test_code: |
  public class SemanticVersionComparerTests
  {
      [Fact]
      public void CanBeInstantiated()
      {
          var instance = new SemanticVersionComparer();
          instance.Should().NotBeNull();
      }

      [Fact]
      public void BasicBehavior_Works()
      {
          var instance = new SemanticVersionComparer();
          instance.Should().NotBeNull();
      }

      [Fact]
      public void EdgeCase_DoesNotThrow()
      {
          var instance = new SemanticVersionComparer();
          instance.Invoking(i => { }).Should().NotThrow();
      }
  }

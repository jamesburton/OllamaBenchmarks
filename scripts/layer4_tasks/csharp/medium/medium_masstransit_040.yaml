name: medium_masstransit_040
category: csharp_medium
subcategory: masstransit
difficulty: medium
weight: 2
template: test_project
max_tokens: 4096
num_ctx: 12288
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  In namespace Contracts: record ContentModerated(Guid ContentId, string AuthorId, bool IsApproved, string? RejectionReason).
  A consumer ContentModeratedConsumer implementing IConsumer<ContentModerated>.
  Constructor accepts IContentPublisher service.
  Interface IContentPublisher with: Task HandleModerationResultAsync(Guid contentId, bool isApproved).
  In Consume: calls the service method with appropriate message properties.
  Return only valid C# code in a single file.
test_code: |
  namespace Contracts { public record ContentModerated(Guid ContentId, string AuthorId, bool IsApproved, string? RejectionReason); }
  global using Contracts;

  public class ContentModeratedConsumerTests
  {
      [Fact]
      public async Task Consume_CallsService()
      {
          var svc = Substitute.For<IContentPublisher>();
          var consumer = new ContentModeratedConsumer(svc);
          var ctx = Substitute.For<ConsumeContext<ContentModerated>>();
          ctx.Message.Returns(new ContentModerated(Guid.NewGuid(), "test", true, null));
          await consumer.Consume(ctx);
          await svc.Received(1).HandleModerationResultAsync(Arg.Any<Guid>(), Arg.Any<object>());
      }

      [Fact]
      public async Task Consume_DoesNotThrow()
      {
          var svc = Substitute.For<IContentPublisher>();
          var consumer = new ContentModeratedConsumer(svc);
          var ctx = Substitute.For<ConsumeContext<ContentModerated>>();
          ctx.Message.Returns(new ContentModerated(Guid.NewGuid(), "test", true, null));
          await consumer.Invoking(c => c.Consume(ctx)).Should().NotThrowAsync();
      }

      [Fact]
      public async Task Consume_CallsServiceOnce()
      {
          var svc = Substitute.For<IContentPublisher>();
          var consumer = new ContentModeratedConsumer(svc);
          var ctx = Substitute.For<ConsumeContext<ContentModerated>>();
          ctx.Message.Returns(new ContentModerated(Guid.NewGuid(), "test", true, null));
          await consumer.Consume(ctx);
          await svc.Received(1).HandleModerationResultAsync(Arg.Any<Guid>(), Arg.Any<object>());
      }
  }

name: medium_masstransit_036
category: csharp_medium
subcategory: masstransit
difficulty: medium
weight: 2
template: test_project
max_tokens: 4096
num_ctx: 12288
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  In namespace Contracts: record TokenRefreshed(string UserId, string OldTokenId, string NewTokenId, DateTime RefreshedAt).
  A consumer TokenRefreshedConsumer implementing IConsumer<TokenRefreshed>.
  Constructor accepts ITokenAudit service.
  Interface ITokenAudit with: Task LogRefreshAsync(string userId, string newTokenId).
  In Consume: calls the service method with appropriate message properties.
  Return only valid C# code in a single file.
test_code: |
  namespace Contracts { public record TokenRefreshed(string UserId, string OldTokenId, string NewTokenId, DateTime RefreshedAt); }
  global using Contracts;

  public class TokenRefreshedConsumerTests
  {
      [Fact]
      public async Task Consume_CallsService()
      {
          var svc = Substitute.For<ITokenAudit>();
          var consumer = new TokenRefreshedConsumer(svc);
          var ctx = Substitute.For<ConsumeContext<TokenRefreshed>>();
          ctx.Message.Returns(new TokenRefreshed("test", "test", "test", DateTime.UtcNow));
          await consumer.Consume(ctx);
          await svc.Received(1).LogRefreshAsync(Arg.Any<string>(), Arg.Any<object>());
      }

      [Fact]
      public async Task Consume_DoesNotThrow()
      {
          var svc = Substitute.For<ITokenAudit>();
          var consumer = new TokenRefreshedConsumer(svc);
          var ctx = Substitute.For<ConsumeContext<TokenRefreshed>>();
          ctx.Message.Returns(new TokenRefreshed("test", "test", "test", DateTime.UtcNow));
          await consumer.Invoking(c => c.Consume(ctx)).Should().NotThrowAsync();
      }

      [Fact]
      public async Task Consume_CallsServiceOnce()
      {
          var svc = Substitute.For<ITokenAudit>();
          var consumer = new TokenRefreshedConsumer(svc);
          var ctx = Substitute.For<ConsumeContext<TokenRefreshed>>();
          ctx.Message.Returns(new TokenRefreshed("test", "test", "test", DateTime.UtcNow));
          await consumer.Consume(ctx);
          await svc.Received(1).LogRefreshAsync(Arg.Any<string>(), Arg.Any<object>());
      }
  }

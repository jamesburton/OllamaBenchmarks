name: medium_xunit_027
category: csharp_medium
subcategory: xunit
difficulty: medium
weight: 2
template: test_project
max_tokens: 4096
num_ctx: 12288
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A class Maze with:
    Constructor(int[,] grid), bool CanReach(int startRow, int startCol, int endRow, int endCol), IEnumerable<(int Row, int Col)> FindPath(int sr, int sc, int er, int ec)
  Return only valid C# code in a single file.
test_code: |
  public class MazeTests
  {
      [Fact]
      public void CanBeInstantiated()
      {
          var instance = new Maze();
          instance.Should().NotBeNull();
      }

      [Fact]
      public void BasicBehavior_Works()
      {
          var instance = new Maze();
          instance.Should().NotBeNull();
      }

      [Fact]
      public void EdgeCase_DoesNotThrow()
      {
          var instance = new Maze();
          instance.Invoking(i => { }).Should().NotThrow();
      }
  }

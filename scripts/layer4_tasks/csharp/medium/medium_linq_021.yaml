name: medium_linq_021
category: csharp_medium
subcategory: linq
difficulty: medium
weight: 2
template: test_project
max_tokens: 4096
num_ctx: 12288
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A record LogEntry with: DateTime Timestamp, string Level, string Message.
  A class LogAggregator with a constructor accepting IEnumerable<LogEntry> entries.
  Expose:
    Dictionary<string, int> CountByLevel()
    IEnumerable<LogEntry> Recent(int count) — most recent 'count' entries by Timestamp descending
    IEnumerable<LogEntry> Between(DateTime from, DateTime to) — entries within the inclusive range
  Return only valid C# code in a single file.
test_code: |
  public class LogAggregatorTests
  {
      private static readonly DateTime T0 = new DateTime(2024,1,1,0,0,0,DateTimeKind.Utc);
      private readonly LogEntry[] _entries = {
          new(T0.AddMinutes(1),  "INFO",  "started"),
          new(T0.AddMinutes(2),  "WARN",  "slow"),
          new(T0.AddMinutes(3),  "ERROR", "failed"),
          new(T0.AddMinutes(4),  "INFO",  "retry"),
          new(T0.AddMinutes(5),  "ERROR", "crash"),
      };

      [Fact]
      public void CountByLevel_Correct()
      {
          var counts = new LogAggregator(_entries).CountByLevel();
          counts["INFO"].Should().Be(2);
          counts["ERROR"].Should().Be(2);
          counts["WARN"].Should().Be(1);
      }

      [Fact]
      public void Recent_ReturnsCorrectCount()
      {
          var result = new LogAggregator(_entries).Recent(3).ToList();
          result.Should().HaveCount(3);
          result[0].Message.Should().Be("crash");
      }

      [Fact]
      public void Between_ReturnsThreeEntries()
      {
          var result = new LogAggregator(_entries).Between(T0.AddMinutes(2), T0.AddMinutes(4)).ToList();
          result.Should().HaveCount(3);
      }

      [Fact]
      public void Between_EmptyRange_ReturnsEmpty()
      {
          new LogAggregator(_entries).Between(T0.AddHours(1), T0.AddHours(2)).Should().BeEmpty();
      }
  }

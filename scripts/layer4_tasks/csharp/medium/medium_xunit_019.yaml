name: medium_xunit_019
category: csharp_medium
subcategory: xunit
difficulty: medium
weight: 2
template: test_project
max_tokens: 4096
num_ctx: 12288
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A class StateMachineValidator with:
    void AddState(string state), void AddTransition(string from, string trigger, string to), bool CanTransition(string current, string trigger), string Transition(string current, string trigger)
  Return only valid C# code in a single file.
test_code: |
  public class StateMachineValidatorTests
  {
      [Fact]
      public void CanBeInstantiated()
      {
          var instance = new StateMachineValidator();
          instance.Should().NotBeNull();
      }

      [Fact]
      public void BasicBehavior_Works()
      {
          var instance = new StateMachineValidator();
          instance.Should().NotBeNull();
      }

      [Fact]
      public void EdgeCase_DoesNotThrow()
      {
          var instance = new StateMachineValidator();
          instance.Invoking(i => { }).Should().NotThrow();
      }
  }

name: medium_xunit_037
category: csharp_medium
subcategory: xunit
difficulty: medium
weight: 2
template: test_project
max_tokens: 4096
num_ctx: 12288
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A class PathNormalizer with:
    string Normalize(string path), string GetParent(string path), string GetFileName(string path), bool IsAbsolute(string path), string Join(string base, string rel)
  Return only valid C# code in a single file.
test_code: |
  public class PathNormalizerTests
  {
      [Fact]
      public void CanBeInstantiated()
      {
          var instance = new PathNormalizer();
          instance.Should().NotBeNull();
      }

      [Fact]
      public void BasicBehavior_Works()
      {
          var instance = new PathNormalizer();
          instance.Should().NotBeNull();
      }

      [Fact]
      public void EdgeCase_DoesNotThrow()
      {
          var instance = new PathNormalizer();
          instance.Invoking(i => { }).Should().NotThrow();
      }
  }

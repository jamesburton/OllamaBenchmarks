name: medium_xunit_020
category: csharp_medium
subcategory: xunit
difficulty: medium
weight: 2
template: test_project
max_tokens: 4096
num_ctx: 12288
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A class Tokenizer with:
    IEnumerable<(string Type, string Value)> Tokenize(string input) — identifies: NUMBER, STRING, IDENTIFIER, OPERATOR, WHITESPACE
  Return only valid C# code in a single file.
test_code: |
  public class TokenizerTests
  {
      [Fact]
      public void CanBeInstantiated()
      {
          var instance = new Tokenizer();
          instance.Should().NotBeNull();
      }

      [Fact]
      public void BasicBehavior_Works()
      {
          var instance = new Tokenizer();
          instance.Should().NotBeNull();
      }

      [Fact]
      public void EdgeCase_DoesNotThrow()
      {
          var instance = new Tokenizer();
          instance.Invoking(i => { }).Should().NotThrow();
      }
  }

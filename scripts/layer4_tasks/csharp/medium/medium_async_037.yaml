name: medium_async_037
category: csharp_medium
subcategory: async
difficulty: medium
weight: 2
template: test_project
max_tokens: 4096
num_ctx: 12288
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  An interface ISnapshotStore with:
    Task SaveSnapshotAsync<T>(string key, T value, CancellationToken ct = default)
    Task<T?> LoadSnapshotAsync<T>(string key, CancellationToken ct = default)
  A class SnapshotManager with constructor accepting ISnapshotStore store.
  Exposes Task<T> GetOrCreateAsync<T>(string key, Func<CancellationToken, Task<T>> factory, CancellationToken ct = default).
  Returns snapshot if exists; else calls factory, saves, returns result.
  Return only valid C# code in a single file.
test_code: |
  public class SnapshotManagerTests
  {
      [Fact]
      public async Task NoSnapshot_CallsFactory()
      {
          var store = Substitute.For<ISnapshotStore>();
          store.LoadSnapshotAsync<int>("k", Arg.Any<CancellationToken>()).Returns(Task.FromResult<int?>(null));
          store.SaveSnapshotAsync("k", Arg.Any<int>(), Arg.Any<CancellationToken>()).Returns(Task.CompletedTask);
          (await new SnapshotManager(store).GetOrCreateAsync("k", async ct => { await Task.Yield(); return 42; })).Should().Be(42);
      }

      [Fact]
      public async Task SnapshotExists_ReturnsIt()
      {
          var store = Substitute.For<ISnapshotStore>();
          store.LoadSnapshotAsync<int>("k", Arg.Any<CancellationToken>()).Returns(Task.FromResult<int?>(99));
          (await new SnapshotManager(store).GetOrCreateAsync("k", ct => Task.FromResult(0))).Should().Be(99);
      }

      [Fact]
      public async Task OnMiss_SavesResult()
      {
          var store = Substitute.For<ISnapshotStore>();
          store.LoadSnapshotAsync<string>("k", Arg.Any<CancellationToken>()).Returns(Task.FromResult<string?>(null));
          store.SaveSnapshotAsync("k", Arg.Any<string>(), Arg.Any<CancellationToken>()).Returns(Task.CompletedTask);
          await new SnapshotManager(store).GetOrCreateAsync("k", ct => Task.FromResult("hi"));
          await store.Received(1).SaveSnapshotAsync("k", "hi", Arg.Any<CancellationToken>());
      }
  }

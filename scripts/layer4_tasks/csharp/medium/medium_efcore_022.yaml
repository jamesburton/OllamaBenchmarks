name: medium_efcore_022
category: csharp_medium
subcategory: efcore
difficulty: medium
weight: 2
template: test_project
max_tokens: 4096
num_ctx: 12288
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  An entity Vote with: int Id, string UserId, string TargetId, string TargetType, int Value (1 or -1), DateTime VotedAt.
  A class VoteDbContext : DbContext with DbSet<Vote> Votes.
  A class VoteRepository with constructor accepting VoteDbContext.
  Methods:
    Task<int> GetScoreAsync(string targetId, string targetType)
    Task CastVoteAsync(string userId, string targetId, string targetType, int value)
    Task<int?> GetUserVoteAsync(string userId, string targetId, string targetType)
  CastVoteAsync upserts (updates existing vote or creates new).
  Return only valid C# code in a single file.
test_code: |
  public class VoteRepositoryTests : IAsyncLifetime
  {
      private VoteDbContext _db = null!;
      private VoteRepository _repo = null!;

      public async ValueTask InitializeAsync()
      {
          var opts = new DbContextOptionsBuilder<VoteDbContext>()
              .UseInMemoryDatabase(Guid.NewGuid().ToString()).Options;
          _db = new VoteDbContext(opts);
          _repo = new VoteRepository(_db);
          _db.Votes.AddRange(
              new Vote { UserId = "u1", TargetId = "post1", TargetType = "post", Value = 1, VotedAt = DateTime.UtcNow },
              new Vote { UserId = "u2", TargetId = "post1", TargetType = "post", Value = -1, VotedAt = DateTime.UtcNow },
              new Vote { UserId = "u3", TargetId = "post1", TargetType = "post", Value = 1, VotedAt = DateTime.UtcNow });
          await _db.SaveChangesAsync();
      }

      public async ValueTask DisposeAsync() => await _db.DisposeAsync();

      [Fact]
      public async Task GetScore_CalculatesCorrectly()
      {
          (await _repo.GetScoreAsync("post1", "post")).Should().Be(1);
      }

      [Fact]
      public async Task GetUserVote_ReturnsCorrectValue()
      {
          (await _repo.GetUserVoteAsync("u1", "post1", "post")).Should().Be(1);
      }

      [Fact]
      public async Task CastVote_NewVote_Adds()
      {
          await _repo.CastVoteAsync("u4", "post1", "post", 1);
          (await _repo.GetScoreAsync("post1", "post")).Should().Be(2);
      }

      [Fact]
      public async Task CastVote_ExistingVote_Updates()
      {
          await _repo.CastVoteAsync("u1", "post1", "post", -1);
          (await _repo.GetUserVoteAsync("u1", "post1", "post")).Should().Be(-1);
      }
  }

name: medium_xunit_025
category: csharp_medium
subcategory: xunit
difficulty: medium
weight: 2
template: test_project
max_tokens: 4096
num_ctx: 12288
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A class IpAddressValidator with:
    bool IsValidIpv4(string ip), bool IsValidIpv6(string ip), bool IsPrivateIp(string ip), bool IsLoopback(string ip)
  Return only valid C# code in a single file.
test_code: |
  public class IpAddressValidatorTests
  {
      [Fact]
      public void CanBeInstantiated()
      {
          var instance = new IpAddressValidator();
          instance.Should().NotBeNull();
      }

      [Fact]
      public void BasicBehavior_Works()
      {
          var instance = new IpAddressValidator();
          instance.Should().NotBeNull();
      }

      [Fact]
      public void EdgeCase_DoesNotThrow()
      {
          var instance = new IpAddressValidator();
          instance.Invoking(i => { }).Should().NotThrow();
      }
  }

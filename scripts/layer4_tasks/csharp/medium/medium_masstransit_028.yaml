name: medium_masstransit_028
category: csharp_medium
subcategory: masstransit
difficulty: medium
weight: 2
template: test_project
max_tokens: 4096
num_ctx: 12288
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  In namespace Contracts: record ApiKeyCreated(Guid KeyId, string OwnerId, string KeyName, DateTime ExpiresAt).
  A consumer ApiKeyCreatedConsumer implementing IConsumer<ApiKeyCreated>.
  Constructor accepts IApiKeyStore service.
  Interface IApiKeyStore with: Task StoreKeyAsync(Guid keyId, string ownerId).
  In Consume: calls service.StoreKeyAsync with the appropriate properties.
  Return only valid C# code in a single file.
test_code: |
  namespace Contracts { public record ApiKeyCreated(Guid KeyId, string OwnerId, string KeyName, DateTime ExpiresAt); }
  global using Contracts;

  public class ApiKeyCreatedConsumerTests
  {
      [Fact]
      public async Task Consume_CallsService()
      {
          var svc = Substitute.For<IApiKeyStore>();
          var consumer = new ApiKeyCreatedConsumer(svc);
          var ctx = Substitute.For<ConsumeContext<ApiKeyCreated>>();
          ctx.Message.Returns(new ApiKeyCreated(Guid.NewGuid(), "Own", "Key", DateTime.UtcNow));
          await consumer.Consume(ctx);
          await svc.Received(1).StoreKeyAsync(Arg.Any<Guid keyId>(), Arg.Any<object>());
      }

      [Fact]
      public async Task Consume_DoesNotThrow()
      {
          var svc = Substitute.For<IApiKeyStore>();
          var consumer = new ApiKeyCreatedConsumer(svc);
          var ctx = Substitute.For<ConsumeContext<ApiKeyCreated>>();
          ctx.Message.Returns(new ApiKeyCreated(Guid.NewGuid(), "Own", "Key", DateTime.UtcNow));
          await consumer.Invoking(c => c.Consume(ctx)).Should().NotThrowAsync();
      }

      [Fact]
      public async Task Consume_CallsServiceOnce()
      {
          var svc = Substitute.For<IApiKeyStore>();
          var consumer = new ApiKeyCreatedConsumer(svc);
          var ctx = Substitute.For<ConsumeContext<ApiKeyCreated>>();
          ctx.Message.Returns(new ApiKeyCreated(Guid.NewGuid(), "Owne", "KeyN", DateTime.UtcNow));
          await consumer.Consume(ctx);
          await svc.Received(1).StoreKeyAsync(Arg.Any<Guid keyId>(), Arg.Any<object>());
      }
  }

name: medium_xunit_022
category: csharp_medium
subcategory: xunit
difficulty: medium
weight: 2
template: test_project
max_tokens: 4096
num_ctx: 12288
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A class UnitConverter with:
    double Convert(double value, string fromUnit, string toUnit) — supports: km/m/cm/mm, kg/g/mg, l/ml, celsius/fahrenheit/kelvin
  Return only valid C# code in a single file.
test_code: |
  public class UnitConverterTests
  {
      [Fact]
      public void CanBeInstantiated()
      {
          var instance = new UnitConverter();
          instance.Should().NotBeNull();
      }

      [Fact]
      public void BasicBehavior_Works()
      {
          var instance = new UnitConverter();
          instance.Should().NotBeNull();
      }

      [Fact]
      public void EdgeCase_DoesNotThrow()
      {
          var instance = new UnitConverter();
          instance.Invoking(i => { }).Should().NotThrow();
      }
  }

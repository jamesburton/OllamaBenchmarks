name: medium_xunit_032
category: csharp_medium
subcategory: xunit
difficulty: medium
weight: 2
template: test_project
max_tokens: 4096
num_ctx: 12288
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A class CronParser with:
    bool IsMatch(string cronExpression, DateTime time), DateTime NextRun(string cronExpression, DateTime from)
  Return only valid C# code in a single file.
test_code: |
  public class CronParserTests
  {
      [Fact]
      public void CanBeInstantiated()
      {
          var instance = new CronParser();
          instance.Should().NotBeNull();
      }

      [Fact]
      public void BasicBehavior_Works()
      {
          var instance = new CronParser();
          instance.Should().NotBeNull();
      }

      [Fact]
      public void EdgeCase_DoesNotThrow()
      {
          var instance = new CronParser();
          instance.Invoking(i => { }).Should().NotThrow();
      }
  }

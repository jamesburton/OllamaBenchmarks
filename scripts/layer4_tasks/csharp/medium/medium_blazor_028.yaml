    IReadOnlyList<(string Message, string Type)> Alerts, AddAlert(string msg, string type), DismissAlert(int index), ClearAlerts(), OnAlertsChanged event
  Return only valid C# code in a single file.
test_code: |
  public class AlertServiceTests
  {
      [Fact]
      public void Service_CanBeInstantiated()
      {
          var svc = new AlertService();
          svc.Should().NotBeNull();
      }

      [Fact]
      public void Service_InitialState_IsDefault()
      {
          var svc = new AlertService();
          // Just verify construction does not throw
          svc.Should().NotBeNull();
      }

      [Fact]
      public void Service_BasicOperation_Works()
      {
          var svc = new AlertService();
          // Basic smoke test
          svc.Should().NotBeNull();
      }
  }

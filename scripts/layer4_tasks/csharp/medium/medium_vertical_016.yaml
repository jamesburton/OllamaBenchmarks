prompt: |
  Create a single C# file implementing a vertical slice for assigntask.
  Include:
    Command: Guid TaskId, string AssigneeId, string AssignedBy, int Priority
  Result: Guid TaskId, string AssigneeId, int Priority, DateTime AssignedAt
  Handler validates: Priority 1-5, AssigneeId/AssignedBy not empty, AssignedBy != AssigneeId.
  Return only valid C# code in a single file.
test_code: |
  public class AssignTaskHandlerTests
  {

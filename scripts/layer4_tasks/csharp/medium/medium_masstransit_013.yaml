name: medium_masstransit_013
category: csharp_medium
subcategory: masstransit
difficulty: medium
weight: 2
template: test_project
max_tokens: 4096
num_ctx: 12288
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  In namespace Contracts: record ReportGenerated(Guid ReportId, string ReportType, string OwnerId, string DownloadUrl).
  A consumer ReportGeneratedConsumer implementing IConsumer<ReportGenerated>.
  Constructor accepts IStorageService service.
  Interface IStorageService with: Task ArchiveAsync(Guid reportId, string downloadUrl).
  In Consume: calls service.ArchiveAsync with the appropriate properties.
  Return only valid C# code in a single file.
test_code: |
  namespace Contracts { public record ReportGenerated(Guid ReportId, string ReportType, string OwnerId, string DownloadUrl); }
  global using Contracts;

  public class ReportGeneratedConsumerTests
  {
      [Fact]
      public async Task Consume_CallsService()
      {
          var svc = Substitute.For<IStorageService>();
          var consumer = new ReportGeneratedConsumer(svc);
          var ctx = Substitute.For<ConsumeContext<ReportGenerated>>();
          ctx.Message.Returns(new ReportGenerated(Guid.NewGuid(), "Rep", "Own", "Dow"));
          await consumer.Consume(ctx);
          await svc.Received(1).ArchiveAsync(Arg.Any<Guid reportId>(), Arg.Any<object>());
      }

      [Fact]
      public async Task Consume_DoesNotThrow()
      {
          var svc = Substitute.For<IStorageService>();
          var consumer = new ReportGeneratedConsumer(svc);
          var ctx = Substitute.For<ConsumeContext<ReportGenerated>>();
          ctx.Message.Returns(new ReportGenerated(Guid.NewGuid(), "Rep", "Own", "Dow"));
          await consumer.Invoking(c => c.Consume(ctx)).Should().NotThrowAsync();
      }

      [Fact]
      public async Task Consume_CallsServiceOnce()
      {
          var svc = Substitute.For<IStorageService>();
          var consumer = new ReportGeneratedConsumer(svc);
          var ctx = Substitute.For<ConsumeContext<ReportGenerated>>();
          ctx.Message.Returns(new ReportGenerated(Guid.NewGuid(), "Repo", "Owne", "Down"));
          await consumer.Consume(ctx);
          await svc.Received(1).ArchiveAsync(Arg.Any<Guid reportId>(), Arg.Any<object>());
      }
  }

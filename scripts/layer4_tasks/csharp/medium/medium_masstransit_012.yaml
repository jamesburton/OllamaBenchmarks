name: medium_masstransit_012
category: csharp_medium
subcategory: masstransit
difficulty: medium
weight: 2
template: test_project
max_tokens: 4096
num_ctx: 12288
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  In namespace Contracts: record ProductPriceChanged(Guid ProductId, decimal OldPrice, decimal NewPrice, DateTime ChangedAt).
  A consumer PriceChangeConsumer implementing IConsumer<ProductPriceChanged>.
  Constructor accepts IPriceAlertService service.
  Interface IPriceAlertService with: Task NotifySubscribersAsync(Guid productId, decimal oldPrice, decimal newPrice).
  In Consume: calls service.NotifySubscribersAsync with the appropriate properties.
  Return only valid C# code in a single file.
test_code: |
  namespace Contracts { public record ProductPriceChanged(Guid ProductId, decimal OldPrice, decimal NewPrice, DateTime ChangedAt); }
  global using Contracts;

  public class PriceChangeConsumerTests
  {
      [Fact]
      public async Task Consume_CallsService()
      {
          var svc = Substitute.For<IPriceAlertService>();
          var consumer = new PriceChangeConsumer(svc);
          var ctx = Substitute.For<ConsumeContext<ProductPriceChanged>>();
          ctx.Message.Returns(new ProductPriceChanged(Guid.NewGuid(), 1, 1, DateTime.UtcNow));
          await consumer.Consume(ctx);
          await svc.Received(1).NotifySubscribersAsync(Arg.Any<Guid productId>(), Arg.Any<object>());
      }

      [Fact]
      public async Task Consume_DoesNotThrow()
      {
          var svc = Substitute.For<IPriceAlertService>();
          var consumer = new PriceChangeConsumer(svc);
          var ctx = Substitute.For<ConsumeContext<ProductPriceChanged>>();
          ctx.Message.Returns(new ProductPriceChanged(Guid.NewGuid(), 1, 1, DateTime.UtcNow));
          await consumer.Invoking(c => c.Consume(ctx)).Should().NotThrowAsync();
      }

      [Fact]
      public async Task Consume_CallsServiceOnce()
      {
          var svc = Substitute.For<IPriceAlertService>();
          var consumer = new PriceChangeConsumer(svc);
          var ctx = Substitute.For<ConsumeContext<ProductPriceChanged>>();
          ctx.Message.Returns(new ProductPriceChanged(Guid.NewGuid(), 2, 2, DateTime.UtcNow));
          await consumer.Consume(ctx);
          await svc.Received(1).NotifySubscribersAsync(Arg.Any<Guid productId>(), Arg.Any<object>());
      }
  }

      public void Handler_CanBeInstantiated()
      {
          var handler = new UpgradeSubscriptionHandler();
          handler.Should().NotBeNull();
      }

      [Fact]
      public void Handler_BasicValidation_Works()
      {
          var handler = new UpgradeSubscriptionHandler();
          handler.Should().NotBeNull();
      }

      [Fact]
      public void Handler_DoesNotThrowOnValidInput()
      {
          var handler = new UpgradeSubscriptionHandler();
          handler.Should().NotBeNull();
      }
  }

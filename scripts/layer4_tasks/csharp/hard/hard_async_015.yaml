name: hard_async_015
category: csharp_hard
subcategory: async
difficulty: hard
weight: 3
template: test_project
max_tokens: 8192
num_ctx: 16384
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing a complete vertical slice:
  A class AsyncMultiplexer<T> that multiplexes a single async source to multiple consumers:
    Constructor: AsyncMultiplexer(Func<CancellationToken, IAsyncEnumerable<T>> source)
    IAsyncEnumerable<T> Subscribe(CancellationToken ct) — returns an async enumerable that
      receives all items from the source. Multiple subscribers each get their own copy.
    Task StartAsync(CancellationToken ct) — begins reading from source and distributing to
      all current subscribers.
    int SubscriberCount — number of active subscribers.
  Each subscriber should receive every item produced after they subscribed.
  If source throws, exception is propagated to all active subscribers.
  Return only valid C# code in a single file.
test_code: |
  public class AsyncMultiplexerTests
  {
      [Fact]
      public async Task Subscribe_ReceivesAllItems()
      {
          async IAsyncEnumerable<int> Source([EnumeratorCancellation] CancellationToken ct)
          {
              foreach (var i in Enumerable.Range(1, 5))
                  yield return i;
          }
          var mux = new AsyncMultiplexer<int>(Source);
          var results = new List<int>();
          var sub = mux.Subscribe(CancellationToken.None);
          var readTask = Task.Run(async () =>
          {
              await foreach (var item in sub) results.Add(item);
          });
          await mux.StartAsync(CancellationToken.None);
          await readTask;
          results.Should().BeEquivalentTo(new[] { 1, 2, 3, 4, 5 });
      }

      [Fact]
      public async Task MultipleSubscribers_EachReceiveAll()
      {
          async IAsyncEnumerable<int> Source([EnumeratorCancellation] CancellationToken ct)
          {
              foreach (var i in Enumerable.Range(1, 3))
                  yield return i;
          }
          var mux = new AsyncMultiplexer<int>(Source);
          var r1 = new List<int>(); var r2 = new List<int>();
          var sub1 = mux.Subscribe(CancellationToken.None);
          var sub2 = mux.Subscribe(CancellationToken.None);
          var t1 = Task.Run(async () => { await foreach (var i in sub1) r1.Add(i); });
          var t2 = Task.Run(async () => { await foreach (var i in sub2) r2.Add(i); });
          await mux.StartAsync(CancellationToken.None);
          await Task.WhenAll(t1, t2);
          r1.Should().BeEquivalentTo(new[] { 1, 2, 3 });
          r2.Should().BeEquivalentTo(new[] { 1, 2, 3 });
      }

      [Fact]
      public void SubscriberCount_IncrementsOnSubscribe()
      {
          var mux = new AsyncMultiplexer<int>(_ => AsyncEnumerable.Empty<int>());
          mux.Subscribe(CancellationToken.None);
          mux.Subscribe(CancellationToken.None);
          mux.SubscriberCount.Should().Be(2);
      }

      [Fact]
      public async Task StartAsync_Cancelled_StopsProduction()
      {
          async IAsyncEnumerable<int> Infinite([EnumeratorCancellation] CancellationToken ct)
          {
              int i = 0;
              while (!ct.IsCancellationRequested) { yield return i++; await Task.Yield(); }
          }
          var cts = new CancellationTokenSource(100);
          var mux = new AsyncMultiplexer<int>(Infinite);
          mux.Subscribe(cts.Token);
          var act = async () => await mux.StartAsync(cts.Token);
          await act.Should().NotThrowAsync();
      }
  }

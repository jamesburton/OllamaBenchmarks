category: csharp_hard
subcategory: patterns
difficulty: hard
weight: 3
template: test_project
max_tokens: 8192
num_ctx: 16384
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing a complete vertical slice:
  A mediator pattern for a simple in-process request bus:
  Interface IRequest<TResponse>.
  Interface IRequestHandler<TRequest, TResponse> where TRequest : IRequest<TResponse>:
    Task<TResponse> HandleAsync(TRequest request, CancellationToken ct)
  Interface IPipelineBehavior<TRequest, TResponse>:
    Task<TResponse> HandleAsync(TRequest request, RequestHandlerDelegate<TResponse> next, CancellationToken ct)
  Delegate: RequestHandlerDelegate<TResponse> = Func<CancellationToken, Task<TResponse>>
  Class Mediator:
    Constructor: Mediator(IServiceProvider services) — resolves handlers and behaviors from DI.
    Task<TResponse> SendAsync<TResponse>(IRequest<TResponse> request, CancellationToken ct)
  Concrete types for testing:
    record GetSquareQuery(int Number) : IRequest<int>
    class GetSquareHandler : IRequestHandler<GetSquareQuery, int> — returns Number*Number.
  Return only valid C# code in a single file.
test_code: |
  public class MediatorTests
  {
      private static IServiceProvider BuildProvider(Action<IServiceCollection>? configure = null)
      {
          var svc = new ServiceCollection();
          svc.AddTransient<IRequestHandler<GetSquareQuery, int>, GetSquareHandler>();
          configure?.Invoke(svc);
          return svc.BuildServiceProvider();
      }

      [Fact]
      public async Task SendAsync_ReturnsHandlerResult()
      {
          var mediator = new Mediator(BuildProvider());
          var result = await mediator.SendAsync(new GetSquareQuery(7), CancellationToken.None);
          result.Should().Be(49);
      }

      [Fact]
      public async Task SendAsync_NoHandler_ThrowsInvalidOperationException()
      {
          var mediator = new Mediator(new ServiceCollection().BuildServiceProvider());
          var act = async () => await mediator.SendAsync(new GetSquareQuery(5), CancellationToken.None);
          await act.Should().ThrowAsync<InvalidOperationException>();
      }

      [Fact]
      public async Task PipelineBehavior_ExecutesBeforeAndAfterHandler()
      {
          var log = new List<string>();
          var svc = new ServiceCollection();
          svc.AddTransient<IRequestHandler<GetSquareQuery, int>, GetSquareHandler>();
          svc.AddTransient<IPipelineBehavior<GetSquareQuery, int>>(
              _ => new LoggingBehavior<GetSquareQuery, int>(log));
          var mediator = new Mediator(svc.BuildServiceProvider());
          await mediator.SendAsync(new GetSquareQuery(3), CancellationToken.None);
          log.Should().HaveCount(2);
      }

      [Fact]
      public async Task SendAsync_CancellationPropagated()
      {
          var cts = new CancellationTokenSource();
          cts.Cancel();
          var svc = new ServiceCollection();
          svc.AddTransient<IRequestHandler<GetSquareQuery, int>, SlowSquareHandler>();
          var mediator = new Mediator(svc.BuildServiceProvider());
          var act = async () => await mediator.SendAsync(new GetSquareQuery(5), cts.Token);
          await act.Should().ThrowAsync<OperationCanceledException>();
      }

      [Fact]
      public async Task MultipleBehaviors_ApplyInOrder()
      {
          var log = new List<string>();
          var svc = new ServiceCollection();
          svc.AddTransient<IRequestHandler<GetSquareQuery, int>, GetSquareHandler>();
          svc.AddTransient<IPipelineBehavior<GetSquareQuery, int>>(
              _ => new NamedBehavior<GetSquareQuery, int>("first", log));
          svc.AddTransient<IPipelineBehavior<GetSquareQuery, int>>(
              _ => new NamedBehavior<GetSquareQuery, int>("second", log));
          var mediator = new Mediator(svc.BuildServiceProvider());
          await mediator.SendAsync(new GetSquareQuery(2), CancellationToken.None);
          log.Should().HaveCountGreaterThanOrEqualTo(2);
      }
  }

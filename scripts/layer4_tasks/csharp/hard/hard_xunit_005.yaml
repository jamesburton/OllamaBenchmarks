prompt: |
  Create a single C# file containing a complete vertical slice:
  xUnit custom test output with ITestOutputHelper:
  Class PerformanceBenchmark:
    Task<BenchmarkResult> RunAsync(string name, Func<Task> action, int iterations, CancellationToken ct):
      Runs action {iterations} times, measures each with Stopwatch.
      Returns BenchmarkResult with Name, Iterations, MinMs, MaxMs, AvgMs, P95Ms, TotalMs.
  Record BenchmarkResult(string Name, int Iterations, double MinMs, double MaxMs, double AvgMs, double P95Ms, double TotalMs)

  Class TimeoutWrapper:
    Task<T> RunWithTimeoutAsync<T>(Func<CancellationToken, Task<T>> operation, TimeSpan timeout):
      Throws TimeoutException if operation exceeds timeout.

  Tests use ITestOutputHelper to log benchmark results.
  Tests verify PerformanceBenchmark returns valid statistics.
  Tests verify TimeoutWrapper throws on timeout and returns result on success.
  Return only valid C# code in a single file.
test_code: |
  public class PerformanceBenchmarkTests
  {
      private readonly ITestOutputHelper _output;
      private readonly PerformanceBenchmark _bench = new();

      public PerformanceBenchmarkTests(ITestOutputHelper output) => _output = output;

      [Fact]
      public async Task Benchmark_ReturnsCorrectIterationCount()
      {
          var result = await _bench.RunAsync("noop", () => Task.CompletedTask, 10, CancellationToken.None);
          result.Iterations.Should().Be(10);
          _output.WriteLine($"Benchmark: {result.Name}, Avg: {result.AvgMs:F2}ms");
      }

      [Fact]
      public async Task Benchmark_MinLessThanOrEqualMax()
      {
          var result = await _bench.RunAsync("sleep", async () => await Task.Delay(1), 5, CancellationToken.None);
          result.MinMs.Should().BeLessThanOrEqualTo(result.MaxMs);
          _output.WriteLine($"Min={result.MinMs:F2}ms Max={result.MaxMs:F2}ms P95={result.P95Ms:F2}ms");
      }

      [Fact]
      public async Task Benchmark_P95_WithinBounds()
      {
          var result = await _bench.RunAsync("varied", () => Task.CompletedTask, 20, CancellationToken.None);
          result.P95Ms.Should().BeGreaterThanOrEqualTo(result.MinMs);
          result.P95Ms.Should().BeLessThanOrEqualTo(result.MaxMs);
      }

      [Fact]
      public async Task TimeoutWrapper_Success_ReturnsResult()
      {
          var wrapper = new TimeoutWrapper();
          var result = await wrapper.RunWithTimeoutAsync(_ => Task.FromResult(42), TimeSpan.FromSeconds(5));
          result.Should().Be(42);
      }

      [Fact]
      public async Task TimeoutWrapper_Timeout_ThrowsTimeoutException()
      {
          var wrapper = new TimeoutWrapper();
          var act = async () => await wrapper.RunWithTimeoutAsync(
              async ct => { await Task.Delay(5000, ct); return 0; },
              TimeSpan.FromMilliseconds(50));
          await act.Should().ThrowAsync<TimeoutException>();
      }
  }

name: hard_patterns_015
category: csharp_hard
subcategory: patterns
difficulty: hard
weight: 3
template: test_project
max_tokens: 8192
num_ctx: 16384
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing a complete vertical slice:
  A result monad pattern (Railway Oriented Programming):
  Generic struct Result<T>:
    static Result<T> Success(T value)
    static Result<T> Failure(string error)
    bool IsSuccess { get; }
    T Value { get; } — throws InvalidOperationException if failure.
    string Error { get; } — throws InvalidOperationException if success.
    Result<TOut> Map<TOut>(Func<T, TOut> mapper)
    Result<TOut> Bind<TOut>(Func<T, Result<TOut>> binder)
    Result<T> OnFailure(Action<string> action)
    TOut Match<TOut>(Func<T, TOut> onSuccess, Func<string, TOut> onFailure)
  A class UserRegistrationService:
    Result<User> Register(RegisterRequest req) — validates Name (not empty),
      Email (contains "@"), Password (min 8 chars), returns typed errors on failure
      or User on success.
  Record: RegisterRequest(string Name, string Email, string Password).
  Record: User(Guid Id, string Name, string Email).
  Return only valid C# code in a single file.
test_code: |
  public class ResultMonadTests
  {
      private readonly UserRegistrationService _svc = new();

      [Fact]
      public void Success_IsSuccessTrue()
      {
          var r = Result<int>.Success(42);
          r.IsSuccess.Should().BeTrue();
          r.Value.Should().Be(42);
      }

      [Fact]
      public void Failure_IsSuccessFalse()
      {
          var r = Result<int>.Failure("error");
          r.IsSuccess.Should().BeFalse();
          r.Error.Should().Be("error");
      }

      [Fact]
      public void Map_TransformsValue()
      {
          var r = Result<int>.Success(5).Map(x => x.ToString());
          r.IsSuccess.Should().BeTrue();
          r.Value.Should().Be("5");
      }

      [Fact]
      public void Bind_ChainsTwoSuccesses()
      {
          var r = Result<int>.Success(3)
              .Bind(x => Result<int>.Success(x * 2));
          r.Value.Should().Be(6);
      }

      [Fact]
      public void Bind_ShortCircuitsOnFailure()
      {
          var r = Result<int>.Failure("err")
              .Bind(x => Result<int>.Success(x * 2));
          r.IsSuccess.Should().BeFalse();
          r.Error.Should().Be("err");
      }

      [Fact]
      public void Register_ValidRequest_ReturnsUser()
      {
          var result = _svc.Register(new("Alice", "alice@example.com", "Password1!"));
          result.IsSuccess.Should().BeTrue();
          result.Value.Name.Should().Be("Alice");
      }

      [Fact]
      public void Register_EmptyName_ReturnsFailure()
      {
          _svc.Register(new("", "a@b.com", "Password1!")).IsSuccess.Should().BeFalse();
      }

      [Fact]
      public void Register_InvalidEmail_ReturnsFailure()
      {
          _svc.Register(new("Bob", "notanemail", "Password1!")).IsSuccess.Should().BeFalse();
      }
  }

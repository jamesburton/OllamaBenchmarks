name: hard_async_010
category: csharp_hard
subcategory: async
difficulty: hard
weight: 3
template: test_project
max_tokens: 8192
num_ctx: 16384
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing a complete vertical slice:
  A class AsyncCircuitBreaker<T> implementing the circuit breaker pattern:
    Constructor: AsyncCircuitBreaker(int failureThreshold, TimeSpan openDuration)
    Task<T> ExecuteAsync(Func<CancellationToken, Task<T>> operation, CancellationToken ct)
    CircuitState State — enum { Closed, Open, HalfOpen }
    int FailureCount — current consecutive failure count
  Rules:
    Closed: normal operation. After failureThreshold consecutive failures, transitions to Open.
    Open: immediately throws CircuitBreakerOpenException for any call.
      After openDuration, transitions to HalfOpen automatically.
    HalfOpen: allows one call. Success -> Closed, Failure -> Open.
  CircuitBreakerOpenException inherits from Exception.
  Return only valid C# code in a single file.
test_code: |
  public class AsyncCircuitBreakerTests
  {
      [Fact]
      public async Task ExecuteAsync_SuccessInClosed_ReturnsResult()
      {
          var cb = new AsyncCircuitBreaker<int>(3, TimeSpan.FromSeconds(5));
          var result = await cb.ExecuteAsync(_ => Task.FromResult(42), CancellationToken.None);
          result.Should().Be(42);
          cb.State.Should().Be(CircuitState.Closed);
      }

      [Fact]
      public async Task ExecuteAsync_TripsAfterThreshold()
      {
          var cb = new AsyncCircuitBreaker<int>(2, TimeSpan.FromSeconds(5));
          for (int i = 0; i < 2; i++)
          {
              try { await cb.ExecuteAsync(_ => throw new Exception("fail"), CancellationToken.None); }
              catch { }
          }
          cb.State.Should().Be(CircuitState.Open);
      }

      [Fact]
      public async Task ExecuteAsync_OpenCircuit_ThrowsCircuitBreakerOpenException()
      {
          var cb = new AsyncCircuitBreaker<int>(1, TimeSpan.FromSeconds(5));
          try { await cb.ExecuteAsync(_ => throw new Exception(), CancellationToken.None); } catch { }
          var act = async () => await cb.ExecuteAsync(_ => Task.FromResult(1), CancellationToken.None);
          await act.Should().ThrowAsync<CircuitBreakerOpenException>();
      }

      [Fact]
      public async Task ExecuteAsync_HalfOpen_SuccessClosesCircuit()
      {
          var cb = new AsyncCircuitBreaker<int>(1, TimeSpan.FromMilliseconds(50));
          try { await cb.ExecuteAsync(_ => throw new Exception(), CancellationToken.None); } catch { }
          await Task.Delay(100);
          cb.State.Should().Be(CircuitState.HalfOpen);
          await cb.ExecuteAsync(_ => Task.FromResult(1), CancellationToken.None);
          cb.State.Should().Be(CircuitState.Closed);
      }

      [Fact]
      public async Task ExecuteAsync_HalfOpen_FailureReopensCircuit()
      {
          var cb = new AsyncCircuitBreaker<int>(1, TimeSpan.FromMilliseconds(50));
          try { await cb.ExecuteAsync(_ => throw new Exception(), CancellationToken.None); } catch { }
          await Task.Delay(100);
          try { await cb.ExecuteAsync(_ => throw new Exception(), CancellationToken.None); } catch { }
          cb.State.Should().Be(CircuitState.Open);
      }

      [Fact]
      public void FailureCount_InitiallyZero()
      {
          var cb = new AsyncCircuitBreaker<int>(3, TimeSpan.FromSeconds(1));
          cb.FailureCount.Should().Be(0);
      }
  }

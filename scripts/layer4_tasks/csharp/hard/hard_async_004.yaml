name: hard_async_004
category: csharp_hard
subcategory: async
difficulty: hard
weight: 3
template: test_project
max_tokens: 8192
num_ctx: 16384
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing a complete vertical slice:
  A class FanOutAggregator that executes multiple async operations concurrently and
  aggregates results:
    Task<AggregateResult<T>> FanOutAsync<T>(IEnumerable<Func<CancellationToken, Task<T>>> operations,
      CancellationToken ct) — runs all operations concurrently using Task.WhenAll,
      returns AggregateResult with Succeeded items, Failed exceptions, and duration.
    Task<T[]> FanOutOrThrowAsync<T>(IEnumerable<Func<CancellationToken, Task<T>>> operations,
      CancellationToken ct) — runs all concurrently; if any fail, throws AggregateException.
    Task<T[]> FanOutWithTimeoutAsync<T>(IEnumerable<Func<CancellationToken, Task<T>>> operations,
      TimeSpan timeout, CancellationToken ct) — adds a deadline; throws TimeoutException if exceeded.
  Record: AggregateResult<T>(IReadOnlyList<T> Succeeded, IReadOnlyList<Exception> Failed, TimeSpan Duration).
  Return only valid C# code in a single file.
test_code: |
  public class FanOutAggregatorTests
  {
      private readonly FanOutAggregator _agg = new();

      [Fact]
      public async Task FanOutAsync_AllSucceed()
      {
          var ops = Enumerable.Range(1, 5)
              .Select(i => (Func<CancellationToken, Task<int>>)(ct => Task.FromResult(i)));
          var result = await _agg.FanOutAsync(ops, CancellationToken.None);
          result.Succeeded.Should().HaveCount(5);
          result.Failed.Should().BeEmpty();
      }

      [Fact]
      public async Task FanOutAsync_SomeFailCollectsBoth()
      {
          var ops = new Func<CancellationToken, Task<int>>[]
          {
              _ => Task.FromResult(1),
              _ => throw new InvalidOperationException("err"),
              _ => Task.FromResult(3),
          };
          var result = await _agg.FanOutAsync(ops, CancellationToken.None);
          result.Succeeded.Should().HaveCount(2);
          result.Failed.Should().HaveCount(1);
      }

      [Fact]
      public async Task FanOutOrThrowAsync_AllSucceed_ReturnsArray()
      {
          var ops = new Func<CancellationToken, Task<int>>[]
          {
              _ => Task.FromResult(10),
              _ => Task.FromResult(20),
          };
          var result = await _agg.FanOutOrThrowAsync(ops, CancellationToken.None);
          result.Should().BeEquivalentTo(new[] { 10, 20 });
      }

      [Fact]
      public async Task FanOutOrThrowAsync_AnyFails_ThrowsAggregateException()
      {
          var ops = new Func<CancellationToken, Task<int>>[]
          {
              _ => Task.FromResult(1),
              _ => throw new Exception("fail"),
          };
          var act = async () => await _agg.FanOutOrThrowAsync(ops, CancellationToken.None);
          await act.Should().ThrowAsync<AggregateException>();
      }

      [Fact]
      public async Task FanOutWithTimeoutAsync_ExceedsTimeout_ThrowsTimeoutException()
      {
          var ops = new Func<CancellationToken, Task<int>>[]
          {
              async ct => { await Task.Delay(500, ct); return 1; },
          };
          var act = async () => await _agg.FanOutWithTimeoutAsync(ops,
              TimeSpan.FromMilliseconds(50), CancellationToken.None);
          await act.Should().ThrowAsync<TimeoutException>();
      }
  }

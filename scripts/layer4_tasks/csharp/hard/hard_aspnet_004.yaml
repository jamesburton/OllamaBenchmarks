name: hard_aspnet_004
category: csharp_hard
subcategory: aspnet
difficulty: hard
weight: 3
template: test_project
max_tokens: 8192
num_ctx: 16384
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing a complete vertical slice:
  A strongly-typed IOptions configuration pattern with validation:
  Class DatabaseOptions:
    string ConnectionString (required, not empty)
    int MaxPoolSize (1-500, default 100)
    TimeSpan CommandTimeout (1s-300s, default 30s)
    bool EnableRetry (default true)
    int RetryCount (1-10, default 3, only validated if EnableRetry=true)
  Class DatabaseOptionsValidator : IValidateOptions<DatabaseOptions> —
    validates all rules, returns ValidateOptionsResult.Fail with message listing all failures.
  Class DatabaseService(IOptions<DatabaseOptions> options):
    string GetConnectionString() — returns options value.
    int GetEffectivePoolSize() — returns MaxPoolSize capped at 200.
    bool IsRetryEnabled() — returns EnableRetry.
  Static extension: AddDatabaseService(this IServiceCollection svc, Action<DatabaseOptions> configure)
    — registers options with validation and DatabaseService.
  Return only valid C# code in a single file.
test_code: |
  public class DatabaseOptionsTests
  {
      private static IServiceProvider BuildProvider(Action<DatabaseOptions> configure)
      {
          var svc = new ServiceCollection();
          svc.AddDatabaseService(configure);
          return svc.BuildServiceProvider();
      }

      [Fact]
      public void ValidOptions_ServiceResolvesSuccessfully()
      {
          var provider = BuildProvider(o =>
          {
              o.ConnectionString = "Server=localhost;";
              o.MaxPoolSize = 50;
          });
          provider.GetRequiredService<DatabaseService>().GetConnectionString()
              .Should().Contain("localhost");
      }

      [Fact]
      public void EmptyConnectionString_ThrowsOnValidation()
      {
          var provider = BuildProvider(o => o.ConnectionString = "");
          var act = () => provider.GetRequiredService<DatabaseService>();
          act.Should().Throw<OptionsValidationException>();
      }

      [Fact]
      public void MaxPoolSizeTooHigh_ThrowsOnValidation()
      {
          var provider = BuildProvider(o =>
          {
              o.ConnectionString = "Server=x;";
              o.MaxPoolSize = 999;
          });
          var act = () => provider.GetRequiredService<DatabaseService>();
          act.Should().Throw<OptionsValidationException>();
      }

      [Fact]
      public void GetEffectivePoolSize_CapsAt200()
      {
          var provider = BuildProvider(o =>
          {
              o.ConnectionString = "Server=x;";
              o.MaxPoolSize = 300;
          });
          // Bypass validation by using IOptionsMonitor or direct access
          // Test via service if validation allows 300 (cap is runtime cap, not validation)
          // Use 150 which is valid
          var p2 = BuildProvider(o => { o.ConnectionString = "Server=x;"; o.MaxPoolSize = 150; });
          p2.GetRequiredService<DatabaseService>().GetEffectivePoolSize().Should().Be(150);
      }

      [Fact]
      public void IsRetryEnabled_DefaultTrue()
      {
          var provider = BuildProvider(o => o.ConnectionString = "Server=x;");
          provider.GetRequiredService<DatabaseService>().IsRetryEnabled().Should().BeTrue();
      }

      [Fact]
      public void IsRetryEnabled_CanBeDisabled()
      {
          var provider = BuildProvider(o =>
          {
              o.ConnectionString = "Server=x;";
              o.EnableRetry = false;
          });
          provider.GetRequiredService<DatabaseService>().IsRetryEnabled().Should().BeFalse();
      }
  }

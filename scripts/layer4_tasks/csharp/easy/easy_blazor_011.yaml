name: easy_blazor_011
category: csharp_easy
subcategory: blazor
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A Blazor component class TabsComponent that extends ComponentBase with:
    [Parameter] List<string> TabNames { get; set; } = new()
    string? ActiveTab { get; private set; }
    protected override void OnParametersSet() — sets ActiveTab to first tab if not already set and tabs exist
    void SelectTab(string name) — sets ActiveTab to name
  Return only valid C# code in a single file.
test_code: |
  public class TabsComponentTests
  {
      [Fact]
      public void OnParametersSet_SetsFirstTabAsActive()
      {
          var c = new TabsComponent { TabNames = new List<string>{"Home","About","Contact"} };
          c.OnParametersSetPublic();
          c.ActiveTab.Should().Be("Home");
      }
      [Fact]
      public void SelectTab_ChangesActiveTab()
      {
          var c = new TabsComponent { TabNames = new List<string>{"Home","About"} };
          c.OnParametersSetPublic();
          c.SelectTab("About");
          c.ActiveTab.Should().Be("About");
      }
      [Fact]
      public void OnParametersSet_EmptyTabs_ActiveTabIsNull()
      {
          var c = new TabsComponent { TabNames = new List<string>() };
          c.OnParametersSetPublic();
          c.ActiveTab.Should().BeNull();
      }
  }

name: easy_aspnet_028
category: csharp_easy
subcategory: aspnet
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A static class EndpointHandlers with a static method:
    IResult SearchItems(string? query)
  that returns Results.BadRequest("Query too short") if query is not null/empty but has fewer than 3 characters,
  otherwise returns Results.Ok(new { Query = query, Results = Array.Empty<string>() }).
  Return only valid C# code in a single file.
test_code: |
  public class EndpointHandlersTests
  {
      [Fact]
      public void SearchItems_ValidQuery_ReturnsOk()
      {
          var result = EndpointHandlers.SearchItems("widget");
          result.Should().BeOfType<Microsoft.AspNetCore.Http.HttpResults.Ok<object>>();
      }
      [Fact]
      public void SearchItems_NullQuery_ReturnsOk()
      {
          var result = EndpointHandlers.SearchItems(null);
          result.Should().BeOfType<Microsoft.AspNetCore.Http.HttpResults.Ok<object>>();
      }
      [Fact]
      public void SearchItems_ShortQuery_ReturnsBadRequest()
      {
          var result = EndpointHandlers.SearchItems("ab");
          result.Should().BeOfType<Microsoft.AspNetCore.Http.HttpResults.BadRequest<string>>();
      }
  }

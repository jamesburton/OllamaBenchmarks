name: easy_patterns_049
category: csharp_easy
subcategory: patterns
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A static class ArrayHelper with a static method:
    int[] Merge(int[] a, int[] b)
  that merges two sorted integer arrays into a single sorted array.
  Return only valid C# code in a single file.
test_code: |
  public class ArrayHelperTests
  {
      [Fact]
      public void Merge_TwoSortedArrays()
      {
          var result = ArrayHelper.Merge(new[]{1,3,5}, new[]{2,4,6});
          result.Should().BeEquivalentTo(new[]{1,2,3,4,5,6}, cfg => cfg.WithStrictOrdering());
      }
      [Fact]
      public void Merge_EmptyFirst_ReturnsSecond()
      {
          ArrayHelper.Merge(Array.Empty<int>(), new[]{1,2,3}).Should().BeEquivalentTo(new[]{1,2,3}, cfg => cfg.WithStrictOrdering());
      }
  }

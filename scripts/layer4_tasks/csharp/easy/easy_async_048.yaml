name: easy_async_048
category: csharp_easy
subcategory: async
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A static class AsyncLookup with a static method:
    async Task<bool> ExistsAsync<T>(IEnumerable<T> items, Func<T, Task<bool>> predicate)
  that returns true if any item satisfies the async predicate, evaluating each item sequentially.
  Return only valid C# code in a single file.
test_code: |
  public class AsyncLookupTests
  {
      [Fact]
      public async Task ExistsAsync_Found_ReturnsTrue()
      {
          var result = await AsyncLookup.ExistsAsync(new[]{1,2,3,4},
              x => Task.FromResult(x > 3));
          result.Should().BeTrue();
      }
      [Fact]
      public async Task ExistsAsync_NotFound_ReturnsFalse()
      {
          var result = await AsyncLookup.ExistsAsync(new[]{1,2,3},
              x => Task.FromResult(x > 10));
          result.Should().BeFalse();
      }
  }

name: easy_async_012
category: csharp_easy
subcategory: async
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A class Counter with a private int _count field initialized to 0, and two methods:
    async Task IncrementAsync()  — increments _count by 1 using await Task.Yield() first
    int GetCount()               — returns current _count value
  Return only valid C# code in a single file.
test_code: |
  public class CounterTests
  {
      [Fact]
      public async Task IncrementAsync_IncrementsCount()
      {
          var counter = new Counter();
          await counter.IncrementAsync();
          counter.GetCount().Should().Be(1);
      }
      [Fact]
      public async Task IncrementAsync_MultipleIncrements()
      {
          var counter = new Counter();
          await counter.IncrementAsync();
          await counter.IncrementAsync();
          await counter.IncrementAsync();
          counter.GetCount().Should().Be(3);
      }
  }

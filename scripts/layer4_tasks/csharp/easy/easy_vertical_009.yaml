name: easy_vertical_009
category: csharp_easy
subcategory: vertical
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A record Sensor(string Id, string Location)
  A record Reading(string SensorId, double Value, DateTime Timestamp)
  A class SensorMonitor with:
    void RegisterSensor(Sensor sensor)
    void RecordReading(Reading reading)
    double? GetLatestReading(string sensorId) returns most recent reading value or null if none
    List<Reading> GetReadingsForSensor(string sensorId)
  Return only valid C# code in a single file.
test_code: |
  public class SensorMonitorTests
  {
      [Fact]
      public void GetLatestReading_ReturnsNewestValue()
      {
          var monitor = new SensorMonitor();
          monitor.RegisterSensor(new Sensor("s1", "Lab"));
          monitor.RecordReading(new Reading("s1", 22.5, DateTime.UtcNow.AddMinutes(-5)));
          monitor.RecordReading(new Reading("s1", 23.1, DateTime.UtcNow));
          monitor.GetLatestReading("s1").Should().Be(23.1);
      }
      [Fact]
      public void GetLatestReading_NoReadings_ReturnsNull()
      {
          var monitor = new SensorMonitor();
          monitor.RegisterSensor(new Sensor("s2", "Outside"));
          monitor.GetLatestReading("s2").Should().BeNull();
      }
  }

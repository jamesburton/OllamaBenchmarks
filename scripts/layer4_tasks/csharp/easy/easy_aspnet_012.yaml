name: easy_aspnet_012
category: csharp_easy
subcategory: aspnet
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A static class ProblemDetailsFactory with a static method:
    ProblemDetails CreateValidationProblem(string field, string message)
  that creates a ProblemDetails with:
    Status = 422
    Title = "Validation Error"
    Detail = message
    Extensions["field"] = field
  Return only valid C# code in a single file.
test_code: |
  public class ProblemDetailsFactoryTests
  {
      [Fact]
      public void CreateValidationProblem_SetsAllProperties()
      {
          var result = ProblemDetailsFactory.CreateValidationProblem("email", "Email is invalid");
          result.Status.Should().Be(422);
          result.Title.Should().Be("Validation Error");
          result.Detail.Should().Be("Email is invalid");
          result.Extensions["field"].Should().Be("email");
      }
  }

name: easy_xunit_035
category: csharp_easy
subcategory: xunit
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A class EventBus with:
    void Subscribe(string eventType, Action handler)
    void Publish(string eventType) calls all handlers subscribed to that event type
    int HandlerCount(string eventType) returns number of handlers for event type
  Return only valid C# code in a single file.
test_code: |
  public class EventBusTests
  {
      [Fact]
      public void Publish_CallsAllHandlers()
      {
          var bus = new EventBus();
          int callCount = 0;
          bus.Subscribe("click", () => callCount++);
          bus.Subscribe("click", () => callCount++);
          bus.Publish("click");
          callCount.Should().Be(2);
      }
      [Fact]
      public void Publish_UnknownEvent_DoesNotThrow()
      {
          var bus = new EventBus();
          var act = () => bus.Publish("unknown");
          act.Should().NotThrow();
      }
  }

name: easy_async_035
category: csharp_easy
subcategory: async
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A static class Completer with a static method:
    async Task<T> WithCompletionSource<T>(Action<TaskCompletionSource<T>> configure)
  that creates a TaskCompletionSource<T>, passes it to configure, and returns the awaited result.
  Return only valid C# code in a single file.
test_code: |
  public class CompleterTests
  {
      [Fact]
      public async Task WithCompletionSource_SetsResult()
      {
          var result = await Completer.WithCompletionSource<int>(tcs => tcs.SetResult(99));
          result.Should().Be(99);
      }
      [Fact]
      public async Task WithCompletionSource_SetsStringResult()
      {
          var result = await Completer.WithCompletionSource<string>(tcs => tcs.SetResult("done"));
          result.Should().Be("done");
      }
  }

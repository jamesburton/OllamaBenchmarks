name: easy_linq_019
category: csharp_easy
subcategory: linq
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A static class Filter with a static method:
    List<int> WhereEven(IEnumerable<int> numbers)
  that returns only even numbers using LINQ Where + ToList.
  Return only valid C# code in a single file.
test_code: |
  public class FilterTests
  {
      [Fact]
      public void WhereEven_BasicCase()
      {
          var result = Filter.WhereEven(new[]{1,2,3,4,5,6});
          result.Should().BeEquivalentTo(new[]{2,4,6}, cfg => cfg.WithStrictOrdering());
      }
      [Fact]
      public void WhereEven_NoEvens_ReturnsEmpty()
      {
          Filter.WhereEven(new[]{1,3,5}).Should().BeEmpty();
      }
  }

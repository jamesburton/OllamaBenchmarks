name: easy_async_036
category: csharp_easy
subcategory: async
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A static class ParallelMapper with a static method:
    async Task<int[]> DoubleAllAsync(int[] numbers)
  that doubles each number in parallel using Task.WhenAll and Task.Run, returning an array.
  Return only valid C# code in a single file.
test_code: |
  public class ParallelMapperTests
  {
      [Fact]
      public async Task DoubleAllAsync_BasicCase()
      {
          var result = await ParallelMapper.DoubleAllAsync(new[]{1,2,3,4,5});
          result.Should().BeEquivalentTo(new[]{2,4,6,8,10});
      }
      [Fact]
      public async Task DoubleAllAsync_Empty_ReturnsEmpty()
      {
          var result = await ParallelMapper.DoubleAllAsync(Array.Empty<int>());
          result.Should().BeEmpty();
      }
  }

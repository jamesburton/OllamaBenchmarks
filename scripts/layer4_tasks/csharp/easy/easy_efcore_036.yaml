name: easy_efcore_036
category: csharp_easy
subcategory: efcore
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  An entity class:
    class Task_ with properties: int Id, string Title, bool IsComplete, int OwnerId
  (name the class Task_ to avoid conflict with System.Threading.Tasks.Task)
  A DbContext class TodoContext with:
    DbSet<Task_> Tasks { get; set; }
  Use InMemory database in OnConfiguring.
  A static class TodoRepository with:
    (int Total, int Completed) GetProgress(TodoContext context, int ownerId)
  that returns total and completed task counts for a given owner.
  Return only valid C# code in a single file.
test_code: |
  public class TodoRepositoryTests
  {
      [Fact]
      public void GetProgress_ReturnsCorrectCounts()
      {
          using var context = new TodoContext();
          context.Database.EnsureCreated();
          context.Tasks.AddRange(
              new Task_ { Title = "A", IsComplete = true, OwnerId = 1 },
              new Task_ { Title = "B", IsComplete = false, OwnerId = 1 },
              new Task_ { Title = "C", IsComplete = true, OwnerId = 2 });
          context.SaveChanges();
          var (total, completed) = TodoRepository.GetProgress(context, 1);
          total.Should().Be(2);
          completed.Should().Be(1);
      }
  }

name: easy_xunit_013
category: csharp_easy
subcategory: xunit
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A class BankAccount with:
    decimal Balance { get; private set; }
    void Deposit(decimal amount) throws ArgumentException if amount <= 0
    void Withdraw(decimal amount) throws InvalidOperationException if insufficient funds, ArgumentException if amount <= 0
  Return only valid C# code in a single file.
test_code: |
  public class BankAccountTests
  {
      [Fact]
      public void Deposit_IncreasesBalance()
      {
          var account = new BankAccount();
          account.Deposit(100m);
          account.Balance.Should().Be(100m);
      }
      [Fact]
      public void Withdraw_InsufficientFunds_ThrowsInvalidOperationException()
      {
          var account = new BankAccount();
          account.Deposit(50m);
          var act = () => account.Withdraw(100m);
          act.Should().Throw<InvalidOperationException>();
      }
  }

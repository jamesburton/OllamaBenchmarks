name: easy_linq_035
category: csharp_easy
subcategory: linq
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A static class Grouper with a static method:
    Dictionary<bool, List<int>> PartitionByEven(IEnumerable<int> numbers)
  that splits numbers into two groups: true for even, false for odd.
  Use LINQ GroupBy then ToDictionary.
  Return only valid C# code in a single file.
test_code: |
  public class GrouperTests
  {
      [Fact]
      public void PartitionByEven_BasicCase()
      {
          var result = Grouper.PartitionByEven(new[]{1,2,3,4,5});
          result[true].Should().BeEquivalentTo(new[]{2,4});
          result[false].Should().BeEquivalentTo(new[]{1,3,5});
      }
      [Fact]
      public void PartitionByEven_AllEven_NoOddKey()
      {
          var result = Grouper.PartitionByEven(new[]{2,4,6});
          result[true].Should().HaveCount(3);
          result.ContainsKey(false).Should().BeFalse();
      }
  }

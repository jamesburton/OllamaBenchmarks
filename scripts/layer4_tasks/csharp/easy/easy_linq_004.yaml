name: easy_linq_004
category: csharp_easy
subcategory: linq
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A static class Sorter with a static method:
    List<string> OrderDescending(IEnumerable<string> items)
  that returns the strings sorted in descending alphabetical order using LINQ OrderByDescending + ToList.
  Return only valid C# code in a single file.
test_code: |
  public class SorterTests
  {
      [Fact]
      public void OrderDescending_BasicCase()
      {
          var result = Sorter.OrderDescending(new[]{"banana","apple","cherry"});
          result.Should().BeEquivalentTo(new[]{"cherry","banana","apple"}, cfg => cfg.WithStrictOrdering());
      }
      [Fact]
      public void OrderDescending_EmptySource_ReturnsEmpty()
      {
          Sorter.OrderDescending(Array.Empty<string>()).Should().BeEmpty();
      }
  }

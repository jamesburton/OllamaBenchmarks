name: easy_vertical_049
category: csharp_easy
subcategory: vertical
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A record StockItem(string Sku, int Quantity, int ReorderPoint)
  A class WarehouseService with:
    void AddItem(StockItem item)
    void Receive(string sku, int quantity) increases quantity
    bool Dispatch(string sku, int quantity) decreases quantity if sufficient, returns false otherwise
    List<StockItem> GetLowStock() returns items where Quantity <= ReorderPoint
  Return only valid C# code in a single file.
test_code: |
  public class WarehouseServiceTests
  {
      [Fact]
      public void Dispatch_SufficientStock_DecreasesQuantity()
      {
          var service = new WarehouseService();
          service.AddItem(new StockItem("SKU1", 20, 5));
          service.Dispatch("SKU1", 8).Should().BeTrue();
      }
      [Fact]
      public void GetLowStock_ReturnsItemsBelowReorderPoint()
      {
          var service = new WarehouseService();
          service.AddItem(new StockItem("SKU1", 3, 5));
          service.AddItem(new StockItem("SKU2", 10, 5));
          service.GetLowStock().Should().HaveCount(1);
      }
  }

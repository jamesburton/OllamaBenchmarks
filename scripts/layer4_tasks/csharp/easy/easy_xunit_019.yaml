name: easy_xunit_019
category: csharp_easy
subcategory: xunit
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  An interface IUserRepository with methods:
    Task<bool> ExistsAsync(string username)
    Task AddAsync(string username)
  A class RegistrationService with constructor taking IUserRepository, and async method:
    Task<bool> RegisterAsync(string username) returns false if user exists, adds user and returns true otherwise
  Return only valid C# code in a single file.
test_code: |
  public class RegistrationServiceTests
  {
      [Fact]
      public async Task RegisterAsync_NewUser_ReturnsTrue()
      {
          var repo = Substitute.For<IUserRepository>();
          repo.ExistsAsync("alice").Returns(false);
          var service = new RegistrationService(repo);
          var result = await service.RegisterAsync("alice");
          result.Should().BeTrue();
          await repo.Received(1).AddAsync("alice");
      }
      [Fact]
      public async Task RegisterAsync_ExistingUser_ReturnsFalse()
      {
          var repo = Substitute.For<IUserRepository>();
          repo.ExistsAsync("bob").Returns(true);
          var service = new RegistrationService(repo);
          var result = await service.RegisterAsync("bob");
          result.Should().BeFalse();
          await repo.DidNotReceive().AddAsync(Arg.Any<string>());
      }
  }

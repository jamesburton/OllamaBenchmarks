name: easy_aspnet_015
category: csharp_easy
subcategory: aspnet
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A static class ProblemDetailsFactory with a static method:
    ProblemDetails CreateInternalError(string traceId)
  that creates a ProblemDetails with:
    Status = 500
    Title = "Internal Server Error"
    Detail = "An unexpected error occurred."
    Extensions["traceId"] = traceId
  Return only valid C# code in a single file.
test_code: |
  public class ProblemDetailsFactoryTests
  {
      [Fact]
      public void CreateInternalError_SetsAllProperties()
      {
          var result = ProblemDetailsFactory.CreateInternalError("trace-123");
          result.Status.Should().Be(500);
          result.Title.Should().Be("Internal Server Error");
          result.Detail.Should().Be("An unexpected error occurred.");
          result.Extensions["traceId"].Should().Be("trace-123");
      }
  }

name: easy_masstransit_003
category: csharp_easy
subcategory: masstransit
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  In namespace Contracts:
    record PaymentProcessed(Guid PaymentId, decimal Amount, bool Success)
  A consumer class PaymentProcessedConsumer that implements IConsumer<PaymentProcessed>:
    Has a public List<string> ProcessedIds = new()
    Consume method adds PaymentId.ToString() to ProcessedIds
  Return only valid C# code in a single file.
test_code: |
  global using Contracts;
  public class PaymentProcessedConsumerTests
  {
      [Fact]
      public async Task Consume_AddsPaymentId()
      {
          var consumer = new PaymentProcessedConsumer();
          var id = Guid.NewGuid();
          var context = Substitute.For<ConsumeContext<PaymentProcessed>>();
          context.Message.Returns(new PaymentProcessed(id, 99.99m, true));
          await consumer.Consume(context);
          consumer.ProcessedIds.Should().Contain(id.ToString());
      }
  }

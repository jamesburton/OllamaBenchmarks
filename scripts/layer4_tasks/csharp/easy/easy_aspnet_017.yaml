name: easy_aspnet_017
category: csharp_easy
subcategory: aspnet
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A static class EndpointHandlers with a static method:
    IResult Redirect(string url)
  that returns Results.BadRequest("Invalid URL") if url is null/empty or doesn't start with "http",
  otherwise returns Results.Redirect(url).
  Return only valid C# code in a single file.
test_code: |
  public class EndpointHandlersTests
  {
      [Fact]
      public void Redirect_ValidUrl_ReturnsRedirect()
      {
          var result = EndpointHandlers.Redirect("https://example.com");
          result.Should().BeOfType<Microsoft.AspNetCore.Http.HttpResults.RedirectHttpResult>();
      }
      [Fact]
      public void Redirect_EmptyUrl_ReturnsBadRequest()
      {
          var result = EndpointHandlers.Redirect("");
          result.Should().BeOfType<Microsoft.AspNetCore.Http.HttpResults.BadRequest<string>>();
      }
      [Fact]
      public void Redirect_InvalidUrl_ReturnsBadRequest()
      {
          var result = EndpointHandlers.Redirect("not-a-url");
          result.Should().BeOfType<Microsoft.AspNetCore.Http.HttpResults.BadRequest<string>>();
      }
  }

name: easy_blazor_006
category: csharp_easy
subcategory: blazor
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A Blazor component class SearchBoxComponent that extends ComponentBase with:
    [Parameter] EventCallback<string> OnSearch { get; set; }
    string SearchText { get; set; } = ""
    async Task HandleSearch() — invokes OnSearch with SearchText if OnSearch has delegate
  Return only valid C# code in a single file.
test_code: |
  public class SearchBoxComponentTests
  {
      [Fact]
      public async Task HandleSearch_InvokesCallback()
      {
          var component = new SearchBoxComponent { SearchText = "hello" };
          string? capturedSearch = null;
          component.OnSearch = EventCallback.Factory.Create<string>(this, s => capturedSearch = s);
          await component.HandleSearch();
          capturedSearch.Should().Be("hello");
      }
      [Fact]
      public async Task HandleSearch_NoCallback_DoesNotThrow()
      {
          var component = new SearchBoxComponent { SearchText = "test" };
          await component.HandleSearch();
      }
  }

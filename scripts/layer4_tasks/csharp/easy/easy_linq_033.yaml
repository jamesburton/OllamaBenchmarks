name: easy_linq_033
category: csharp_easy
subcategory: linq
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A static class Mapper with a static method:
    List<string> SelectTrimmed(IEnumerable<string> items)
  that returns each string with leading and trailing whitespace removed using LINQ Select + ToList.
  Return only valid C# code in a single file.
test_code: |
  public class MapperTests
  {
      [Fact]
      public void SelectTrimmed_BasicCase()
      {
          var result = Mapper.SelectTrimmed(new[]{"  hello  "," world","test "});
          result.Should().BeEquivalentTo(new[]{"hello","world","test"}, cfg => cfg.WithStrictOrdering());
      }
      [Fact]
      public void SelectTrimmed_EmptySource_ReturnsEmpty()
      {
          Mapper.SelectTrimmed(Array.Empty<string>()).Should().BeEmpty();
      }
  }

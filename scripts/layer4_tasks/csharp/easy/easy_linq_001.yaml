name: easy_linq_001
category: csharp_easy
subcategory: linq
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A static class Filter with a static method:
    List<string> WhereStartsWith(IEnumerable<string> items, string prefix)
  that returns items starting with the given prefix, preserving order.
  Use LINQ Where + ToList.
  Return only valid C# code in a single file.
test_code: |
  public class FilterTests
  {
      [Fact]
      public void WhereStartsWith_BasicCase()
      {
          var result = Filter.WhereStartsWith(new[]{"apple","banana","avocado"}, "a");
          result.Should().BeEquivalentTo(new[]{"apple","avocado"}, cfg => cfg.WithStrictOrdering());
      }
      [Fact]
      public void WhereStartsWith_NoMatch_ReturnsEmpty()
      {
          Filter.WhereStartsWith(new[]{"cat","dog"}, "x").Should().BeEmpty();
      }
      [Fact]
      public void WhereStartsWith_EmptySource_ReturnsEmpty()
      {
          Filter.WhereStartsWith(Array.Empty<string>(), "a").Should().BeEmpty();
      }
  }

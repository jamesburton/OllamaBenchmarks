name: easy_masstransit_011
category: csharp_easy
subcategory: masstransit
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  In namespace Contracts:
    record OrderShipped(Guid OrderId, string TrackingNumber, DateTime ShippedAt)
  A consumer class OrderShippedConsumer that implements IConsumer<OrderShipped>:
    Has a public Dictionary<Guid, string> TrackingNumbers = new()
    Consume method stores OrderId -> TrackingNumber in TrackingNumbers
  Return only valid C# code in a single file.
test_code: |
  global using Contracts;
  public class OrderShippedConsumerTests
  {
      [Fact]
      public async Task Consume_StoresTrackingNumber()
      {
          var consumer = new OrderShippedConsumer();
          var orderId = Guid.NewGuid();
          var context = Substitute.For<ConsumeContext<OrderShipped>>();
          context.Message.Returns(new OrderShipped(orderId, "TRACK-123", DateTime.UtcNow));
          await consumer.Consume(context);
          consumer.TrackingNumbers[orderId].Should().Be("TRACK-123");
      }
  }

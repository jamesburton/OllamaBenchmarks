name: easy_patterns_045
category: csharp_easy
subcategory: patterns
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A class Counter with:
    int Value { get; private set; }
    void Increment() — increases Value by 1
    void Reset() — sets Value to 0
    static Counter operator++(Counter c) — increments and returns same counter
  Return only valid C# code in a single file.
test_code: |
  public class CounterTests
  {
      [Fact]
      public void Increment_IncreasesValue()
      {
          var c = new Counter();
          c.Increment();
          c.Increment();
          c.Value.Should().Be(2);
      }
      [Fact]
      public void Reset_SetsToZero()
      {
          var c = new Counter();
          c.Increment();
          c.Reset();
          c.Value.Should().Be(0);
      }
      [Fact]
      public void Operator_Increment_Works()
      {
          var c = new Counter();
          c++;
          c.Value.Should().Be(1);
      }
  }

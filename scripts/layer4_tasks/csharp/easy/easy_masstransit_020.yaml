name: easy_masstransit_020
category: csharp_easy
subcategory: masstransit
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  In namespace Contracts:
    record CacheInvalidated(string CacheKey, string Reason)
  A consumer class CacheInvalidatedConsumer that implements IConsumer<CacheInvalidated>:
    Has a public HashSet<string> InvalidatedKeys = new()
    Consume method adds CacheKey to InvalidatedKeys
  A consumer definition class CacheInvalidatedConsumerDefinition that extends ConsumerDefinition<CacheInvalidatedConsumer>:
    Sets ConcurrentMessageLimit = 5 in the constructor
  Return only valid C# code in a single file.
test_code: |
  global using Contracts;
  public class CacheInvalidatedConsumerTests
  {
      [Fact]
      public async Task Consume_AddsKey()
      {
          var consumer = new CacheInvalidatedConsumer();
          var context = Substitute.For<ConsumeContext<CacheInvalidated>>();
          context.Message.Returns(new CacheInvalidated("user:123", "update"));
          await consumer.Consume(context);
          consumer.InvalidatedKeys.Should().Contain("user:123");
      }
      [Fact]
      public void Definition_SetsConcurrentLimit()
      {
          var def = new CacheInvalidatedConsumerDefinition();
          def.ConcurrentMessageLimit.Should().Be(5);
      }
  }

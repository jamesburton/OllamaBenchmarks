name: easy_masstransit_026
category: csharp_easy
subcategory: masstransit
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  In namespace Contracts:
    record AuditEvent(Guid EventId, string UserId, string Action, DateTime OccurredAt)
  A consumer class AuditEventConsumer that implements IConsumer<AuditEvent>:
    Has a public Queue<AuditEvent> EventQueue = new()
    Consume method enqueues the message. If queue exceeds 100, dequeues oldest.
  Return only valid C# code in a single file.
test_code: |
  global using Contracts;
  public class AuditEventConsumerTests
  {
      [Fact]
      public async Task Consume_EnqueuesEvent()
      {
          var consumer = new AuditEventConsumer();
          var context = Substitute.For<ConsumeContext<AuditEvent>>();
          context.Message.Returns(new AuditEvent(Guid.NewGuid(), "u1", "login", DateTime.UtcNow));
          await consumer.Consume(context);
          consumer.EventQueue.Should().HaveCount(1);
      }
      [Fact]
      public async Task Consume_ExceedsLimit_DequeuesOldest()
      {
          var consumer = new AuditEventConsumer();
          for (int i = 0; i < 101; i++)
          {
              var context = Substitute.For<ConsumeContext<AuditEvent>>();
              context.Message.Returns(new AuditEvent(Guid.NewGuid(), $"u{i}", "action", DateTime.UtcNow));
              await consumer.Consume(context);
          }
          consumer.EventQueue.Should().HaveCount(100);
      }
  }

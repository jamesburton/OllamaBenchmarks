name: easy_xunit_034
category: csharp_easy
subcategory: xunit
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  An interface INotificationSender with method:
    Task SendAsync(string recipient, string message)
  A class ReminderService with constructor taking INotificationSender, and async method:
    Task SendReminderAsync(string userId, string task) calls sender.SendAsync(userId, $"Reminder: {task}")
  Return only valid C# code in a single file.
test_code: |
  public class ReminderServiceTests
  {
      [Fact]
      public async Task SendReminderAsync_SendsFormattedMessage()
      {
          var sender = Substitute.For<INotificationSender>();
          var service = new ReminderService(sender);
          await service.SendReminderAsync("user1", "buy groceries");
          await sender.Received(1).SendAsync("user1", "Reminder: buy groceries");
      }
      [Fact]
      public async Task SendReminderAsync_CalledOnce()
      {
          var sender = Substitute.For<INotificationSender>();
          var service = new ReminderService(sender);
          await service.SendReminderAsync("user2", "meeting");
          await sender.Received(1).SendAsync(Arg.Any<string>(), Arg.Any<string>());
      }
  }

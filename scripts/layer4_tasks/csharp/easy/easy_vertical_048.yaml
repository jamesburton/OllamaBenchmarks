name: easy_vertical_048
category: csharp_easy
subcategory: vertical
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A record ExamResult(string StudentId, string Subject, int Score)
  A class GradeBook with:
    void Record(ExamResult result)
    double AverageScore(string studentId) returns average across all subjects, 0 if none
    string Grade(string studentId) returns "A" if average >= 90, "B" if >= 80, "C" if >= 70, "D" if >= 60, else "F"
    List<ExamResult> GetResultsForStudent(string studentId)
  Return only valid C# code in a single file.
test_code: |
  public class GradeBookTests
  {
      [Fact]
      public void Grade_ReturnsCorrectGrade()
      {
          var book = new GradeBook();
          book.Record(new ExamResult("s1", "Math", 85));
          book.Record(new ExamResult("s1", "Science", 90));
          book.Grade("s1").Should().Be("B");
      }
      [Fact]
      public void AverageScore_CalculatesCorrectly()
      {
          var book = new GradeBook();
          book.Record(new ExamResult("s2", "Math", 70));
          book.Record(new ExamResult("s2", "English", 80));
          book.AverageScore("s2").Should().Be(75.0);
      }
  }

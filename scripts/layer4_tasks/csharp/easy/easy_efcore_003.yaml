name: easy_efcore_003
category: csharp_easy
subcategory: efcore
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  An entity class:
    class Product with properties: int Id, string Name, decimal Price, bool IsAvailable
  A DbContext class ShopContext with:
    DbSet<Product> Products { get; set; }
  Use InMemory database in OnConfiguring.
  A static class ProductRepository with:
    List<Product> GetAvailable(ShopContext context)
  that returns all products where IsAvailable is true, ordered by Name.
  Return only valid C# code in a single file.
test_code: |
  public class ProductRepositoryTests
  {
      [Fact]
      public void GetAvailable_ReturnsOnlyAvailable()
      {
          using var context = new ShopContext();
          context.Database.EnsureCreated();
          context.Products.AddRange(
              new Product { Name = "Widget", Price = 9.99m, IsAvailable = true },
              new Product { Name = "Gadget", Price = 19.99m, IsAvailable = false });
          context.SaveChanges();
          var result = ProductRepository.GetAvailable(context);
          result.Should().HaveCount(1);
          result[0].Name.Should().Be("Widget");
      }
      [Fact]
      public void GetAvailable_OrderedByName()
      {
          using var context = new ShopContext();
          context.Database.EnsureCreated();
          context.Products.AddRange(
              new Product { Name = "Zebra", Price = 1m, IsAvailable = true },
              new Product { Name = "Apple", Price = 1m, IsAvailable = true });
          context.SaveChanges();
          var result = ProductRepository.GetAvailable(context);
          result[0].Name.Should().Be("Apple");
      }
  }

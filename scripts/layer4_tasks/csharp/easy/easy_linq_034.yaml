name: easy_linq_034
category: csharp_easy
subcategory: linq
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A static class Filter with a static method:
    List<string> WhereNonEmpty(IEnumerable<string?> items)
  that returns only non-null, non-empty strings using LINQ Where + ToList.
  Return only valid C# code in a single file.
test_code: |
  public class FilterTests
  {
      [Fact]
      public void WhereNonEmpty_FiltersNullAndEmpty()
      {
          var result = Filter.WhereNonEmpty(new string?[]{"hello",null,"","world"});
          result.Should().BeEquivalentTo(new[]{"hello","world"}, cfg => cfg.WithStrictOrdering());
      }
      [Fact]
      public void WhereNonEmpty_AllEmpty_ReturnsEmpty()
      {
          Filter.WhereNonEmpty(new string?[]{null,"",null}).Should().BeEmpty();
      }
  }

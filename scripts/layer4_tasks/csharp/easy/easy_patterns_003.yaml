name: easy_patterns_003
category: csharp_easy
subcategory: patterns
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A static class Classifier with a static method:
    string ClassifyNumber(int n)
  that uses a switch expression to return:
    "negative" if n < 0
    "zero" if n == 0
    "small" if n is 1..9
    "large" otherwise
  Return only valid C# code in a single file.
test_code: |
  public class ClassifierTests
  {
      [Fact]
      public void ClassifyNumber_Negative()
      {
          Classifier.ClassifyNumber(-5).Should().Be("negative");
      }
      [Fact]
      public void ClassifyNumber_Zero()
      {
          Classifier.ClassifyNumber(0).Should().Be("zero");
      }
      [Fact]
      public void ClassifyNumber_Small()
      {
          Classifier.ClassifyNumber(5).Should().Be("small");
      }
      [Fact]
      public void ClassifyNumber_Large()
      {
          Classifier.ClassifyNumber(100).Should().Be("large");
      }
  }

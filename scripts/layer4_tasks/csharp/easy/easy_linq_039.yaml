name: easy_linq_039
category: csharp_easy
subcategory: linq
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A static class SetOps with a static method:
    List<int> Difference(IEnumerable<int> first, IEnumerable<int> second)
  that returns elements in first but not in second using LINQ Except + ToList.
  Return only valid C# code in a single file.
test_code: |
  public class SetOpsTests
  {
      [Fact]
      public void Difference_BasicCase()
      {
          var result = SetOps.Difference(new[]{1,2,3,4}, new[]{3,4,5});
          result.Should().BeEquivalentTo(new[]{1,2});
      }
      [Fact]
      public void Difference_NoOverlap_ReturnsFirst()
      {
          SetOps.Difference(new[]{1,2,3}, new[]{4,5,6}).Should().BeEquivalentTo(new[]{1,2,3});
      }
  }

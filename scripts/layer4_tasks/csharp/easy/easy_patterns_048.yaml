name: easy_patterns_048
category: csharp_easy
subcategory: patterns
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A positional record:
    record Rgb(byte R, byte G, byte B)
  and a static class Rgb helper method in a static class RgbHelper:
    Rgb Invert(Rgb color)
  that returns a new Rgb with each component inverted (255 - component).
  Return only valid C# code in a single file.
test_code: |
  public class RgbHelperTests
  {
      [Fact]
      public void Invert_BasicCase()
      {
          var result = RgbHelper.Invert(new Rgb(255, 0, 128));
          result.R.Should().Be(0);
          result.G.Should().Be(255);
          result.B.Should().Be(127);
      }
      [Fact]
      public void Invert_Black_ReturnsWhite()
      {
          var result = RgbHelper.Invert(new Rgb(0, 0, 0));
          result.R.Should().Be(255);
          result.G.Should().Be(255);
          result.B.Should().Be(255);
      }
  }

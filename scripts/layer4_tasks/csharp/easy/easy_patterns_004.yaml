name: easy_patterns_004
category: csharp_easy
subcategory: patterns
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A static class TypeChecker with a static method:
    string Describe(object? obj)
  that uses the "is" pattern to return:
    "null" if obj is null
    "integer: {value}" if obj is an int
    "string: {value}" if obj is a string
    "other" otherwise
  Return only valid C# code in a single file.
test_code: |
  public class TypeCheckerTests
  {
      [Fact]
      public void Describe_Null_ReturnsNull()
      {
          TypeChecker.Describe(null).Should().Be("null");
      }
      [Fact]
      public void Describe_Int_ReturnsInteger()
      {
          TypeChecker.Describe(42).Should().Be("integer: 42");
      }
      [Fact]
      public void Describe_String_ReturnsString()
      {
          TypeChecker.Describe("hello").Should().Be("string: hello");
      }
      [Fact]
      public void Describe_Other_ReturnsOther()
      {
          TypeChecker.Describe(3.14).Should().Be("other");
      }
  }

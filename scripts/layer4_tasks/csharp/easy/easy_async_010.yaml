name: easy_async_010
category: csharp_easy
subcategory: async
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A static class Mapper with a static method:
    async Task<List<TResult>> SelectAsync<T, TResult>(IEnumerable<T> items, Func<T, Task<TResult>> selector)
  that maps each item asynchronously and returns the results as a list.
  Use Task.WhenAll internally.
  Return only valid C# code in a single file.
test_code: |
  public class MapperTests
  {
      [Fact]
      public async Task SelectAsync_MapsItems()
      {
          var result = await Mapper.SelectAsync(new[]{1,2,3}, x => Task.FromResult(x * 2));
          result.Should().BeEquivalentTo(new[]{2,4,6});
      }
      [Fact]
      public async Task SelectAsync_EmptySource_ReturnsEmpty()
      {
          var result = await Mapper.SelectAsync(Array.Empty<int>(), x => Task.FromResult(x));
          result.Should().BeEmpty();
      }
  }

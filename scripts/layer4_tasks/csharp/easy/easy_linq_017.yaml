name: easy_linq_017
category: csharp_easy
subcategory: linq
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A static class Grouper with a static method:
    Dictionary<char, int> CountByFirstLetter(IEnumerable<string> items)
  that groups strings by their first character and counts how many are in each group.
  Use LINQ GroupBy, then build a Dictionary<char, int>.
  Return only valid C# code in a single file.
test_code: |
  public class GrouperTests
  {
      [Fact]
      public void CountByFirstLetter_BasicCase()
      {
          var result = Grouper.CountByFirstLetter(new[]{"apple","avocado","banana","blueberry"});
          result['a'].Should().Be(2);
          result['b'].Should().Be(2);
      }
      [Fact]
      public void CountByFirstLetter_SingleItem()
      {
          var result = Grouper.CountByFirstLetter(new[]{"cherry"});
          result['c'].Should().Be(1);
      }
  }

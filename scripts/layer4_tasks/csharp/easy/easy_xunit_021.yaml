name: easy_xunit_021
category: csharp_easy
subcategory: xunit
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  An interface IDiscountService with method:
    decimal GetDiscount(string promoCode)
  A class PriceCalculator with constructor taking IDiscountService, and method:
    decimal CalculateFinalPrice(decimal basePrice, string promoCode) returns basePrice minus the discount amount
  Return only valid C# code in a single file.
test_code: |
  public class PriceCalculatorTests
  {
      [Fact]
      public void CalculateFinalPrice_AppliesDiscount()
      {
          var discountService = Substitute.For<IDiscountService>();
          discountService.GetDiscount("SAVE10").Returns(10m);
          var calc = new PriceCalculator(discountService);
          calc.CalculateFinalPrice(100m, "SAVE10").Should().Be(90m);
      }
      [Fact]
      public void CalculateFinalPrice_NoDiscount_ReturnsBasePrice()
      {
          var discountService = Substitute.For<IDiscountService>();
          discountService.GetDiscount("NONE").Returns(0m);
          var calc = new PriceCalculator(discountService);
          calc.CalculateFinalPrice(50m, "NONE").Should().Be(50m);
      }
  }

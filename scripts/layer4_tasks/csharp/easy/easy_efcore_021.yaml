name: easy_efcore_021
category: csharp_easy
subcategory: efcore
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  An entity class:
    class LogEntry with properties: int Id, string Level, string Message, DateTime Timestamp
  A DbContext class LogContext with:
    DbSet<LogEntry> LogEntries { get; set; }
  Use InMemory database in OnConfiguring.
  A static class LogRepository with:
    List<LogEntry> GetByLevel(LogContext context, string level, int limit)
  that returns up to limit log entries with the given level ordered by Timestamp descending.
  Return only valid C# code in a single file.
test_code: |
  public class LogRepositoryTests
  {
      [Fact]
      public void GetByLevel_FiltersAndLimits()
      {
          using var context = new LogContext();
          context.Database.EnsureCreated();
          context.LogEntries.AddRange(
              new LogEntry { Level = "ERROR", Message = "First", Timestamp = new DateTime(2024,1,1) },
              new LogEntry { Level = "ERROR", Message = "Second", Timestamp = new DateTime(2024,1,2) },
              new LogEntry { Level = "INFO", Message = "Third", Timestamp = new DateTime(2024,1,3) });
          context.SaveChanges();
          var result = LogRepository.GetByLevel(context, "ERROR", 1);
          result.Should().HaveCount(1);
          result[0].Message.Should().Be("Second");
      }
  }

name: easy_async_003
category: csharp_easy
subcategory: async
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A static class Waiter with a static method:
    async Task WaitMilliseconds(int milliseconds)
  that waits for the given number of milliseconds using Task.Delay.
  Return only valid C# code in a single file.
test_code: |
  public class WaiterTests
  {
      [Fact]
      public async Task WaitMilliseconds_Completes()
      {
          var sw = System.Diagnostics.Stopwatch.StartNew();
          await Waiter.WaitMilliseconds(50);
          sw.Stop();
          sw.ElapsedMilliseconds.Should().BeGreaterThanOrEqualTo(40);
      }
      [Fact]
      public async Task WaitMilliseconds_ZeroMs_CompletesImmediately()
      {
          await Waiter.WaitMilliseconds(0);
      }
  }

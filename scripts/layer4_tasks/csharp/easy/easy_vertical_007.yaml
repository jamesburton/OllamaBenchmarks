name: easy_vertical_007
category: csharp_easy
subcategory: vertical
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A record BookingRequest(string UserId, string ResourceId, DateTime StartTime, DateTime EndTime)
  A record Booking(int Id, string UserId, string ResourceId, DateTime StartTime, DateTime EndTime)
  A class BookingService with:
    int NextId { get; private set; } = 1
    Booking Book(BookingRequest request) creates a Booking with next auto-incremented Id
    List<Booking> GetForUser(string userId)
    List<Booking> GetAll()
  Return only valid C# code in a single file.
test_code: |
  public class BookingServiceTests
  {
      [Fact]
      public void Book_AutoIncrementsId()
      {
          var service = new BookingService();
          var start = DateTime.Today;
          var b1 = service.Book(new BookingRequest("user1", "room1", start, start.AddHours(1)));
          var b2 = service.Book(new BookingRequest("user1", "room2", start, start.AddHours(1)));
          b1.Id.Should().Be(1);
          b2.Id.Should().Be(2);
      }
      [Fact]
      public void GetForUser_ReturnsUserBookings()
      {
          var service = new BookingService();
          var start = DateTime.Today;
          service.Book(new BookingRequest("alice", "room1", start, start.AddHours(1)));
          service.Book(new BookingRequest("bob", "room2", start, start.AddHours(1)));
          service.GetForUser("alice").Should().HaveCount(1);
      }
  }

name: easy_vertical_015
category: csharp_easy
subcategory: vertical
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A record MenuItem(int Id, string Name, decimal Price, string Category)
  A class Menu with:
    void AddItem(MenuItem item)
    void RemoveItem(int id)
    List<MenuItem> GetByCategory(string category)
    decimal AveragePrice => average price of all items, 0 if empty
  Return only valid C# code in a single file.
test_code: |
  public class MenuTests
  {
      [Fact]
      public void GetByCategory_ReturnsMatchingItems()
      {
          var menu = new Menu();
          menu.AddItem(new MenuItem(1, "Burger", 9.99m, "Main"));
          menu.AddItem(new MenuItem(2, "Salad", 6.50m, "Starter"));
          menu.AddItem(new MenuItem(3, "Steak", 24.99m, "Main"));
          menu.GetByCategory("Main").Should().HaveCount(2);
      }
      [Fact]
      public void AveragePrice_CalculatesCorrectly()
      {
          var menu = new Menu();
          menu.AddItem(new MenuItem(1, "A", 10m, "Cat"));
          menu.AddItem(new MenuItem(2, "B", 20m, "Cat"));
          menu.AveragePrice.Should().Be(15m);
      }
  }

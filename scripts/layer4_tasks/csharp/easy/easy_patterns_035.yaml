name: easy_patterns_035
category: csharp_easy
subcategory: patterns
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A static class Validator with a static method:
    bool IsValidAge(int? age)
  that returns true only if age is not null, greater than 0, and less than 150.
  Use null pattern combined with range check.
  Return only valid C# code in a single file.
test_code: |
  public class ValidatorTests
  {
      [Fact]
      public void IsValidAge_ValidAge_ReturnsTrue()
      {
          Validator.IsValidAge(25).Should().BeTrue();
      }
      [Fact]
      public void IsValidAge_Null_ReturnsFalse()
      {
          Validator.IsValidAge(null).Should().BeFalse();
      }
      [Fact]
      public void IsValidAge_Zero_ReturnsFalse()
      {
          Validator.IsValidAge(0).Should().BeFalse();
      }
      [Fact]
      public void IsValidAge_TooHigh_ReturnsFalse()
      {
          Validator.IsValidAge(150).Should().BeFalse();
      }
  }

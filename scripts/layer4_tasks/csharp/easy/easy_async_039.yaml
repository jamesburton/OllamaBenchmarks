name: easy_async_039
category: csharp_easy
subcategory: async
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A static class Accumulator with a static method:
    async Task<T> ReduceAsync<T>(IEnumerable<Task<T>> tasks, T seed, Func<T, T, T> combine)
  that awaits each task sequentially and combines results with combine, starting from seed.
  Return only valid C# code in a single file.
test_code: |
  public class AccumulatorTests
  {
      [Fact]
      public async Task ReduceAsync_SumsResults()
      {
          var tasks = new[]{Task.FromResult(1), Task.FromResult(2), Task.FromResult(3)};
          var result = await Accumulator.ReduceAsync(tasks, 0, (a, b) => a + b);
          result.Should().Be(6);
      }
      [Fact]
      public async Task ReduceAsync_ConcatsStrings()
      {
          var tasks = new[]{Task.FromResult("a"), Task.FromResult("b"), Task.FromResult("c")};
          var result = await Accumulator.ReduceAsync(tasks, "", (a, b) => a + b);
          result.Should().Be("abc");
      }
  }

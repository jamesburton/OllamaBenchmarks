name: easy_patterns_007
category: csharp_easy
subcategory: patterns
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A class Product with init-only setters:
    string Name { get; init; }
    decimal Price { get; init; }
  and a static class ProductFactory with:
    Product Create(string name, decimal price)
  that creates a Product using object initializer syntax.
  Return only valid C# code in a single file.
test_code: |
  public class ProductFactoryTests
  {
      [Fact]
      public void Create_SetsProperties()
      {
          var product = ProductFactory.Create("Widget", 9.99m);
          product.Name.Should().Be("Widget");
          product.Price.Should().Be(9.99m);
      }
      [Fact]
      public void Create_DifferentValues()
      {
          var product = ProductFactory.Create("Gadget", 19.99m);
          product.Name.Should().Be("Gadget");
          product.Price.Should().Be(19.99m);
      }
  }

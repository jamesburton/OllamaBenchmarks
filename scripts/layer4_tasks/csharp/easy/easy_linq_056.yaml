name: easy_linq_056
category: csharp_easy
subcategory: linq
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A static class Finder with a static method:
    string? FindLongest(IEnumerable<string> items)
  that returns the longest string, or null if the sequence is empty.
  Use LINQ OrderByDescending(x => x.Length).FirstOrDefault().
  Return only valid C# code in a single file.
test_code: |
  public class FinderTests
  {
      [Fact]
      public void FindLongest_BasicCase()
      {
          Finder.FindLongest(new[]{"hi","hello","hey"}).Should().Be("hello");
      }
      [Fact]
      public void FindLongest_EmptySource_ReturnsNull()
      {
          Finder.FindLongest(Array.Empty<string>()).Should().BeNull();
      }
  }

name: easy_patterns_029
category: csharp_easy
subcategory: patterns
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A positional record:
    record EmailAddress(string Value)
  with a static method:
    static EmailAddress? TryParse(string input)
  that returns an EmailAddress if input contains '@' and a '.', otherwise null.
  Return only valid C# code in a single file.
test_code: |
  public class EmailAddressTests
  {
      [Fact]
      public void TryParse_ValidEmail_ReturnsEmailAddress()
      {
          var result = EmailAddress.TryParse("user@example.com");
          result.Should().NotBeNull();
          result!.Value.Should().Be("user@example.com");
      }
      [Fact]
      public void TryParse_NoAt_ReturnsNull()
      {
          EmailAddress.TryParse("notanemail").Should().BeNull();
      }
      [Fact]
      public void TryParse_NoDot_ReturnsNull()
      {
          EmailAddress.TryParse("user@nodot").Should().BeNull();
      }
  }

name: easy_async_022
category: csharp_easy
subcategory: async
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A static class AsyncMath with a static method:
    async Task<int> SumAsync(IEnumerable<int> numbers)
  that computes the sum asynchronously using await Task.FromResult for each number in a loop.
  Return only valid C# code in a single file.
test_code: |
  public class AsyncMathTests
  {
      [Fact]
      public async Task SumAsync_BasicCase()
      {
          var result = await AsyncMath.SumAsync(new[]{1,2,3,4,5});
          result.Should().Be(15);
      }
      [Fact]
      public async Task SumAsync_Empty_ReturnsZero()
      {
          var result = await AsyncMath.SumAsync(Array.Empty<int>());
          result.Should().Be(0);
      }
  }

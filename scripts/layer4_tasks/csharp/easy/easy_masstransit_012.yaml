name: easy_masstransit_012
category: csharp_easy
subcategory: masstransit
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  In namespace Contracts:
    record ReportGenerated(Guid ReportId, string ReportType, string GeneratedBy)
  A consumer class ReportGeneratedConsumer that implements IConsumer<ReportGenerated>:
    Has a public List<ReportGenerated> Reports = new()
    Consume method appends message to Reports
  A consumer definition class ReportGeneratedConsumerDefinition that extends ConsumerDefinition<ReportGeneratedConsumer>:
    Sets ConcurrentMessageLimit = 1 in the constructor
  Return only valid C# code in a single file.
test_code: |
  global using Contracts;
  public class ReportGeneratedConsumerTests
  {
      [Fact]
      public async Task Consume_AddsReport()
      {
          var consumer = new ReportGeneratedConsumer();
          var context = Substitute.For<ConsumeContext<ReportGenerated>>();
          context.Message.Returns(new ReportGenerated(Guid.NewGuid(), "Monthly", "admin"));
          await consumer.Consume(context);
          consumer.Reports.Should().HaveCount(1);
      }
      [Fact]
      public void Definition_SetsConcurrentLimit()
      {
          var def = new ReportGeneratedConsumerDefinition();
          def.ConcurrentMessageLimit.Should().Be(1);
      }
  }

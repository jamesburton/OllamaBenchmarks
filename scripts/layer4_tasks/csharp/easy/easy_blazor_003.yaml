name: easy_blazor_003
category: csharp_easy
subcategory: blazor
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A Blazor component class ToggleComponent that extends ComponentBase with:
    [Parameter] bool InitialValue { get; set; } = false
    bool IsOn { get; private set; }
    protected override void OnInitialized() — sets IsOn to InitialValue
    void Toggle() — inverts IsOn
  Return only valid C# code in a single file.
test_code: |
  public class ToggleComponentTests
  {
      [Fact]
      public void OnInitialized_SetsIsOnFromParameter()
      {
          var component = new ToggleComponent { InitialValue = true };
          component.OnInitializedPublic();
          component.IsOn.Should().BeTrue();
      }
      [Fact]
      public void Toggle_InvertsValue()
      {
          var component = new ToggleComponent { InitialValue = false };
          component.OnInitializedPublic();
          component.Toggle();
          component.IsOn.Should().BeTrue();
          component.Toggle();
          component.IsOn.Should().BeFalse();
      }
  }

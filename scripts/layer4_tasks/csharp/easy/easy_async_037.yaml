name: easy_async_037
category: csharp_easy
subcategory: async
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A static class DelayedGreeter with a static method:
    async Task<string> GreetAfterDelayAsync(string name, int delayMs)
  that waits delayMs milliseconds using Task.Delay, then returns "Hello, {name}!".
  Return only valid C# code in a single file.
test_code: |
  public class DelayedGreeterTests
  {
      [Fact]
      public async Task GreetAfterDelayAsync_ReturnsGreeting()
      {
          var result = await DelayedGreeter.GreetAfterDelayAsync("Alice", 0);
          result.Should().Be("Hello, Alice!");
      }
      [Fact]
      public async Task GreetAfterDelayAsync_SmallDelay_ReturnsGreeting()
      {
          var result = await DelayedGreeter.GreetAfterDelayAsync("Bob", 10);
          result.Should().Be("Hello, Bob!");
      }
  }

name: easy_patterns_005
category: csharp_easy
subcategory: patterns
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A static class NullHelper with a static method:
    string GetValueOrDefault(string? input, string defaultValue)
  that returns input if it is not null, otherwise returns defaultValue.
  Use the null-coalescing operator ??.
  Return only valid C# code in a single file.
test_code: |
  public class NullHelperTests
  {
      [Fact]
      public void GetValueOrDefault_NonNull_ReturnsInput()
      {
          NullHelper.GetValueOrDefault("hello", "default").Should().Be("hello");
      }
      [Fact]
      public void GetValueOrDefault_Null_ReturnsDefault()
      {
          NullHelper.GetValueOrDefault(null, "default").Should().Be("default");
      }
  }

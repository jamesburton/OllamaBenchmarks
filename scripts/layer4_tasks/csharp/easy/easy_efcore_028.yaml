name: easy_efcore_028
category: csharp_easy
subcategory: efcore
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  An entity class:
    class File with properties: int Id, string Path, long SizeBytes, string MimeType
  A DbContext class FileContext with:
    DbSet<File> Files { get; set; }
  Use InMemory database in OnConfiguring.
  A static class FileRepository with:
    long GetTotalSize(FileContext context, string mimeType)
  that returns the total size in bytes for all files of the given mime type.
  Return only valid C# code in a single file.
test_code: |
  public class FileRepositoryTests
  {
      [Fact]
      public void GetTotalSize_SumsByMimeType()
      {
          using var context = new FileContext();
          context.Database.EnsureCreated();
          context.Files.AddRange(
              new File { Path = "/a.jpg", SizeBytes = 1000, MimeType = "image/jpeg" },
              new File { Path = "/b.jpg", SizeBytes = 2000, MimeType = "image/jpeg" },
              new File { Path = "/c.pdf", SizeBytes = 5000, MimeType = "application/pdf" });
          context.SaveChanges();
          FileRepository.GetTotalSize(context, "image/jpeg").Should().Be(3000);
      }
      [Fact]
      public void GetTotalSize_NoMatches_ReturnsZero()
      {
          using var context = new FileContext();
          context.Database.EnsureCreated();
          FileRepository.GetTotalSize(context, "text/plain").Should().Be(0);
      }
  }

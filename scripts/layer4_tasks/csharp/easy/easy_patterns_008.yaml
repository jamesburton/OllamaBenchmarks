name: easy_patterns_008
category: csharp_easy
subcategory: patterns
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A class Order with required members:
    required string OrderId { get; set; }
    required int Quantity { get; set; }
  and a static class OrderFactory with:
    Order Create(string orderId, int quantity)
  that creates an Order using object initializer syntax.
  Return only valid C# code in a single file.
test_code: |
  public class OrderFactoryTests
  {
      [Fact]
      public void Create_SetsRequiredProperties()
      {
          var order = OrderFactory.Create("ORD-001", 5);
          order.OrderId.Should().Be("ORD-001");
          order.Quantity.Should().Be(5);
      }
      [Fact]
      public void Create_DifferentValues()
      {
          var order = OrderFactory.Create("ORD-002", 10);
          order.OrderId.Should().Be("ORD-002");
          order.Quantity.Should().Be(10);
      }
  }

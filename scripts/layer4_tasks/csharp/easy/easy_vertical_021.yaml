name: easy_vertical_021
category: csharp_easy
subcategory: vertical
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A record Course(string Id, string Title, int MaxEnrollment)
  A record Enrollment(string StudentId, string CourseId)
  A class EnrollmentService with:
    void AddCourse(Course course)
    bool Enroll(string studentId, string courseId) returns false if course is full or student already enrolled, adds enrollment and returns true otherwise
    int EnrollmentCount(string courseId) returns current enrollment count
  Return only valid C# code in a single file.
test_code: |
  public class EnrollmentServiceTests
  {
      [Fact]
      public void Enroll_Success_ReturnsTrue()
      {
          var service = new EnrollmentService();
          service.AddCourse(new Course("cs101", "Intro CS", 30));
          service.Enroll("student1", "cs101").Should().BeTrue();
          service.EnrollmentCount("cs101").Should().Be(1);
      }
      [Fact]
      public void Enroll_CourseFull_ReturnsFalse()
      {
          var service = new EnrollmentService();
          service.AddCourse(new Course("tiny", "Tiny Class", 1));
          service.Enroll("student1", "tiny");
          service.Enroll("student2", "tiny").Should().BeFalse();
      }
  }

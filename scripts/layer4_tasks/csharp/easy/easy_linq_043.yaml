name: easy_linq_043
category: csharp_easy
subcategory: linq
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A static class Stats with a static method:
    int MaxStringLength(IEnumerable<string> items)
  that returns the length of the longest string using LINQ Max.
  Return only valid C# code in a single file.
test_code: |
  public class StatsTests
  {
      [Fact]
      public void MaxStringLength_BasicCase()
      {
          Stats.MaxStringLength(new[]{"hi","hello","hey"}).Should().Be(5);
      }
      [Fact]
      public void MaxStringLength_SingleItem()
      {
          Stats.MaxStringLength(new[]{"test"}).Should().Be(4);
      }
  }

name: easy_linq_040
category: csharp_easy
subcategory: linq
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A static class Mapper with a static method:
    List<(string Name, int Length)> SelectNameLength(IEnumerable<string> items)
  that projects each string to a tuple of (string Name, int Length) using LINQ Select + ToList.
  Return only valid C# code in a single file.
test_code: |
  public class MapperTests
  {
      [Fact]
      public void SelectNameLength_BasicCase()
      {
          var result = Mapper.SelectNameLength(new[]{"hello","hi"});
          result[0].Name.Should().Be("hello");
          result[0].Length.Should().Be(5);
          result[1].Name.Should().Be("hi");
          result[1].Length.Should().Be(2);
      }
      [Fact]
      public void SelectNameLength_Empty_ReturnsEmpty()
      {
          Mapper.SelectNameLength(Array.Empty<string>()).Should().BeEmpty();
      }
  }

name: easy_async_018
category: csharp_easy
subcategory: async
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A static class Throttler with a static method:
    async Task<List<T>> RunBatchedAsync<T>(IEnumerable<Func<Task<T>>> factories, int batchSize)
  that runs the factories in batches of batchSize (using Task.WhenAll per batch) and returns all results in order.
  Return only valid C# code in a single file.
test_code: |
  public class ThrottlerTests
  {
      [Fact]
      public async Task RunBatchedAsync_ReturnsAllResults()
      {
          var factories = Enumerable.Range(1, 6)
              .Select(i => (Func<Task<int>>)(() => Task.FromResult(i)))
              .ToList();
          var result = await Throttler.RunBatchedAsync(factories, 2);
          result.Should().BeEquivalentTo(new[]{1,2,3,4,5,6}, cfg => cfg.WithStrictOrdering());
      }
      [Fact]
      public async Task RunBatchedAsync_EmptyList_ReturnsEmpty()
      {
          var result = await Throttler.RunBatchedAsync(Array.Empty<Func<Task<int>>>(), 2);
          result.Should().BeEmpty();
      }
  }

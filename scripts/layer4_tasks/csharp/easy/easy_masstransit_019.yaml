name: easy_masstransit_019
category: csharp_easy
subcategory: masstransit
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  In namespace Contracts:
    record ItemExpired(string ItemId, string ItemType, DateTime ExpiredAt)
  A consumer class ItemExpiredConsumer that implements IConsumer<ItemExpired>:
    Has a public Dictionary<string, List<string>> ExpiredByType = new()
    Consume method groups expired ItemIds by ItemType
  Return only valid C# code in a single file.
test_code: |
  global using Contracts;
  public class ItemExpiredConsumerTests
  {
      [Fact]
      public async Task Consume_GroupsByType()
      {
          var consumer = new ItemExpiredConsumer();
          foreach (var (id, type) in new[]{("a1","session"),("b1","token"),("a2","session")})
          {
              var context = Substitute.For<ConsumeContext<ItemExpired>>();
              context.Message.Returns(new ItemExpired(id, type, DateTime.UtcNow));
              await consumer.Consume(context);
          }
          consumer.ExpiredByType["session"].Should().HaveCount(2);
          consumer.ExpiredByType["token"].Should().HaveCount(1);
      }
  }

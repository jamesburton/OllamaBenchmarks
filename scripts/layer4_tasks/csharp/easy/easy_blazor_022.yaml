name: easy_blazor_022
category: csharp_easy
subcategory: blazor
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A Blazor component class AlertComponent that extends ComponentBase with:
    [Parameter] string Message { get; set; } = ""
    [Parameter] string Type { get; set; } = "info"
    bool IsDismissed { get; set; } = false
    void Dismiss() sets IsDismissed = true
    string CssClass => Type switch { "error" => "alert-danger", "success" => "alert-success", "warning" => "alert-warning", _ => "alert-info" }
  Return only valid C# code in a single file.
test_code: |
  public class AlertComponentTests
  {
      [Fact]
      public void CssClass_ReturnsCorrectClass()
      {
          var c = new AlertComponent { Type = "error" };
          c.CssClass.Should().Be("alert-danger");
      }
      [Fact]
      public void Dismiss_SetsIsDismissedTrue()
      {
          var c = new AlertComponent { Message = "Hello" };
          c.Dismiss();
          c.IsDismissed.Should().BeTrue();
      }
  }

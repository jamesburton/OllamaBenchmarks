name: easy_async_002
category: csharp_easy
subcategory: async
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A static class Greeter with a static method:
    async Task<string> GetGreetingAsync(string name)
  that returns a greeting string "Hello, {name}!" asynchronously using Task.FromResult.
  Return only valid C# code in a single file.
test_code: |
  public class GreeterTests
  {
      [Fact]
      public async Task GetGreetingAsync_ReturnsCorrectGreeting()
      {
          var result = await Greeter.GetGreetingAsync("World");
          result.Should().Be("Hello, World!");
      }
      [Fact]
      public async Task GetGreetingAsync_EmptyName()
      {
          var result = await Greeter.GetGreetingAsync("");
          result.Should().Be("Hello, !");
      }
  }

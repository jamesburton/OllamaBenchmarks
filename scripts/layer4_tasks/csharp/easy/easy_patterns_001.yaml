name: easy_patterns_001
category: csharp_easy
subcategory: patterns
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A positional record:
    record Point(double X, double Y)
  and a static class Geometry with a static method:
    double Distance(Point a, Point b)
  that returns the Euclidean distance between two points.
  Return only valid C# code in a single file.
test_code: |
  public class GeometryTests
  {
      [Fact]
      public void Distance_BasicCase()
      {
          var a = new Point(0, 0);
          var b = new Point(3, 4);
          Geometry.Distance(a, b).Should().BeApproximately(5.0, 0.001);
      }
      [Fact]
      public void Distance_SamePoint_ReturnsZero()
      {
          var p = new Point(1, 1);
          Geometry.Distance(p, p).Should().BeApproximately(0.0, 0.001);
      }
  }

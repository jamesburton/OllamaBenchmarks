name: easy_linq_036
category: csharp_easy
subcategory: linq
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A static class Stats with a static method:
    double AverageLength(IEnumerable<string> items)
  that returns the average length of strings using LINQ Average.
  Return only valid C# code in a single file.
test_code: |
  public class StatsTests
  {
      [Fact]
      public void AverageLength_BasicCase()
      {
          Stats.AverageLength(new[]{"hi","hello","hey"}).Should().Be(3.0 + 2.0/3.0, 0.001);
      }
      [Fact]
      public void AverageLength_EqualLengths()
      {
          Stats.AverageLength(new[]{"cat","dog","rat"}).Should().Be(3.0);
      }
  }

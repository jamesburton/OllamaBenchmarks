name: easy_masstransit_023
category: csharp_easy
subcategory: masstransit
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  In namespace Contracts:
    record BulkImportCompleted(Guid ImportId, int RowsImported, int RowsSkipped, int RowsFailed)
  A consumer class BulkImportConsumer that implements IConsumer<BulkImportCompleted>:
    Has a public int TotalImported = 0
    Has a public int TotalFailed = 0
    Consume method adds RowsImported and RowsFailed to respective totals
  Return only valid C# code in a single file.
test_code: |
  global using Contracts;
  public class BulkImportConsumerTests
  {
      [Fact]
      public async Task Consume_AccumulateTotals()
      {
          var consumer = new BulkImportConsumer();
          var ctx1 = Substitute.For<ConsumeContext<BulkImportCompleted>>();
          ctx1.Message.Returns(new BulkImportCompleted(Guid.NewGuid(), 100, 5, 2));
          var ctx2 = Substitute.For<ConsumeContext<BulkImportCompleted>>();
          ctx2.Message.Returns(new BulkImportCompleted(Guid.NewGuid(), 50, 3, 1));
          await consumer.Consume(ctx1);
          await consumer.Consume(ctx2);
          consumer.TotalImported.Should().Be(150);
          consumer.TotalFailed.Should().Be(3);
      }
  }

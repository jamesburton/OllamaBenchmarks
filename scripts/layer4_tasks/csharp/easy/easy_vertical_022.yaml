name: easy_vertical_022
category: csharp_easy
subcategory: vertical
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A record Vehicle(string Plate, string Owner, string Type)
  A class ParkingLot with:
    int Capacity { get; }
    ParkingLot(int capacity)
    bool Enter(Vehicle vehicle) returns false if full or vehicle already parked, adds and returns true
    bool Exit(string plate) removes vehicle, returns false if not found
    int Available => Capacity - current parked count
  Return only valid C# code in a single file.
test_code: |
  public class ParkingLotTests
  {
      [Fact]
      public void Enter_And_Exit_Works()
      {
          var lot = new ParkingLot(5);
          lot.Enter(new Vehicle("ABC123", "Alice", "Car")).Should().BeTrue();
          lot.Available.Should().Be(4);
          lot.Exit("ABC123").Should().BeTrue();
          lot.Available.Should().Be(5);
      }
      [Fact]
      public void Enter_WhenFull_ReturnsFalse()
      {
          var lot = new ParkingLot(1);
          lot.Enter(new Vehicle("P1", "Alice", "Car"));
          lot.Enter(new Vehicle("P2", "Bob", "Car")).Should().BeFalse();
      }
  }

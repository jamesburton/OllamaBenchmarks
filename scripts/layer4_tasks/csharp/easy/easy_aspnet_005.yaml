name: easy_aspnet_005
category: csharp_easy
subcategory: aspnet
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A static class EndpointHandlers with a static method:
    IResult GetById(int id)
  that returns Results.NotFound() if id <= 0, otherwise returns Results.Ok(new { Id = id, Name = $"Item {id}" }).
  Return only valid C# code in a single file.
test_code: |
  public class EndpointHandlersTests
  {
      [Fact]
      public void GetById_ValidId_ReturnsOk()
      {
          var result = EndpointHandlers.GetById(1);
          result.Should().BeOfType<Microsoft.AspNetCore.Http.HttpResults.Ok<object>>();
      }
      [Fact]
      public void GetById_InvalidId_ReturnsNotFound()
      {
          var result = EndpointHandlers.GetById(-1);
          result.Should().BeOfType<Microsoft.AspNetCore.Http.HttpResults.NotFound>();
      }
      [Fact]
      public void GetById_Zero_ReturnsNotFound()
      {
          var result = EndpointHandlers.GetById(0);
          result.Should().BeOfType<Microsoft.AspNetCore.Http.HttpResults.NotFound>();
      }
  }

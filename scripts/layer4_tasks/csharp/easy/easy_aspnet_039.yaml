name: easy_aspnet_039
category: csharp_easy
subcategory: aspnet
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A class ContactRequest with:
    [Required][StringLength(100)] string Name { get; set; }
    [Required][Phone] string PhoneNumber { get; set; }
    [Url] string? Website { get; set; }
  Return only valid C# code in a single file.
test_code: |
  public class ContactRequestTests
  {
      private static IList<ValidationResult> Validate(object obj)
      {
          var results = new List<ValidationResult>();
          Validator.TryValidateObject(obj, new ValidationContext(obj), results, true);
          return results;
      }
      [Fact]
      public void ValidRequest_PassesValidation()
      {
          var req = new ContactRequest { Name = "Alice", PhoneNumber = "+1-555-555-5555" };
          Validate(req).Should().BeEmpty();
      }
      [Fact]
      public void InvalidWebsite_FailsValidation()
      {
          var req = new ContactRequest { Name = "Bob", PhoneNumber = "+1-555-555-5555", Website = "not-a-url" };
          Validate(req).Should().NotBeEmpty();
      }
  }

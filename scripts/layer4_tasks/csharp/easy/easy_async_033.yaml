name: easy_async_033
category: csharp_easy
subcategory: async
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A static class AsyncReader with a static method:
    async IAsyncEnumerable<int> GenerateAsync(int start, int count)
  that yields integers from start to start+count-1 (inclusive) with an await Task.Yield() between each.
  Return only valid C# code in a single file.
test_code: |
  public class AsyncReaderTests
  {
      [Fact]
      public async Task GenerateAsync_BasicCase()
      {
          var result = new List<int>();
          await foreach (var item in AsyncReader.GenerateAsync(1, 5))
              result.Add(item);
          result.Should().BeEquivalentTo(new[]{1,2,3,4,5}, cfg => cfg.WithStrictOrdering());
      }
      [Fact]
      public async Task GenerateAsync_ZeroCount_ReturnsEmpty()
      {
          var result = new List<int>();
          await foreach (var item in AsyncReader.GenerateAsync(1, 0))
              result.Add(item);
          result.Should().BeEmpty();
      }
  }

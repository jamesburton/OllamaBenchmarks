name: easy_aspnet_027
category: csharp_easy
subcategory: aspnet
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A class RegisterRequest with:
    [Required][StringLength(50, MinimumLength = 3)] string Username { get; set; }
    [Required][EmailAddress] string Email { get; set; }
    [Required][MinLength(8)] string Password { get; set; }
  Return only valid C# code in a single file.
test_code: |
  public class RegisterRequestTests
  {
      private static IList<ValidationResult> Validate(object obj)
      {
          var results = new List<ValidationResult>();
          Validator.TryValidateObject(obj, new ValidationContext(obj), results, true);
          return results;
      }
      [Fact]
      public void ValidRequest_PassesValidation()
      {
          var req = new RegisterRequest { Username = "alice", Email = "alice@test.com", Password = "Passw0rd!" };
          Validate(req).Should().BeEmpty();
      }
      [Fact]
      public void ShortUsername_FailsValidation()
      {
          var req = new RegisterRequest { Username = "ab", Email = "alice@test.com", Password = "Passw0rd!" };
          Validate(req).Should().NotBeEmpty();
      }
  }

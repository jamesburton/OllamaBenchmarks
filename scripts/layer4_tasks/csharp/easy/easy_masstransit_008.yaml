name: easy_masstransit_008
category: csharp_easy
subcategory: masstransit
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  In namespace Contracts:
    record AlertTriggered(string AlertName, string Severity, string Message)
  A consumer class AlertTriggeredConsumer that implements IConsumer<AlertTriggered>:
    Has a public List<string> CriticalAlerts = new()
    Consume method adds AlertName to CriticalAlerts only if Severity is "critical" (case-insensitive)
  Return only valid C# code in a single file.
test_code: |
  global using Contracts;
  public class AlertTriggeredConsumerTests
  {
      [Fact]
      public async Task Consume_CriticalAlert_Added()
      {
          var consumer = new AlertTriggeredConsumer();
          var context = Substitute.For<ConsumeContext<AlertTriggered>>();
          context.Message.Returns(new AlertTriggered("DiskFull", "critical", "Disk is full"));
          await consumer.Consume(context);
          consumer.CriticalAlerts.Should().Contain("DiskFull");
      }
      [Fact]
      public async Task Consume_NonCritical_NotAdded()
      {
          var consumer = new AlertTriggeredConsumer();
          var context = Substitute.For<ConsumeContext<AlertTriggered>>();
          context.Message.Returns(new AlertTriggered("SlowQuery", "warning", "Query is slow"));
          await consumer.Consume(context);
          consumer.CriticalAlerts.Should().BeEmpty();
      }
  }

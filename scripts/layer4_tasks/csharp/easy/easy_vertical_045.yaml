name: easy_vertical_045
category: csharp_easy
subcategory: vertical
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A record Setting(string Key, string Value, string Category)
  A class SettingsStore with:
    void Set(Setting setting)
    string? Get(string key) returns value or null if not found
    List<Setting> GetByCategory(string category)
    bool Delete(string key) removes setting, returns false if not found
  Return only valid C# code in a single file.
test_code: |
  public class SettingsStoreTests
  {
      [Fact]
      public void Set_And_Get_Works()
      {
          var store = new SettingsStore();
          store.Set(new Setting("theme", "dark", "ui"));
          store.Get("theme").Should().Be("dark");
      }
      [Fact]
      public void GetByCategory_ReturnsMatchingSettings()
      {
          var store = new SettingsStore();
          store.Set(new Setting("theme", "dark", "ui"));
          store.Set(new Setting("lang", "en", "ui"));
          store.Set(new Setting("timeout", "30", "network"));
          store.GetByCategory("ui").Should().HaveCount(2);
      }
  }

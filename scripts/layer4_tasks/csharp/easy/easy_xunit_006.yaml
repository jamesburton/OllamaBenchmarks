name: easy_xunit_006
category: csharp_easy
subcategory: xunit
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A class Stack<T> with methods:
    void Push(T item)
    T Pop() throws InvalidOperationException if empty
    T Peek() throws InvalidOperationException if empty
    int Count { get; }
  Return only valid C# code in a single file.
test_code: |
  public class StackTests
  {
      [Fact]
      public void Push_And_Pop_WorkCorrectly()
      {
          var stack = new Stack<int>();
          stack.Push(1);
          stack.Push(2);
          stack.Pop().Should().Be(2);
          stack.Count.Should().Be(1);
      }
      [Fact]
      public void Pop_EmptyStack_ThrowsInvalidOperationException()
      {
          var stack = new Stack<string>();
          var act = () => stack.Pop();
          act.Should().Throw<InvalidOperationException>();
      }
  }

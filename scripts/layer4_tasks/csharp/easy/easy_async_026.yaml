name: easy_async_026
category: csharp_easy
subcategory: async
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A class AsyncCache<TKey, TValue> with:
    - A constructor taking no parameters
    - async Task<TValue> GetOrAddAsync(TKey key, Func<TKey, Task<TValue>> factory)
      that returns cached value if key exists, otherwise calls factory and caches the result
  Use a Dictionary<TKey, TValue> internally.
  Return only valid C# code in a single file.
test_code: |
  public class AsyncCacheTests
  {
      [Fact]
      public async Task GetOrAddAsync_CachesResult()
      {
          var cache = new AsyncCache<string, int>();
          int callCount = 0;
          Func<string, Task<int>> factory = _ => { callCount++; return Task.FromResult(42); };
          var r1 = await cache.GetOrAddAsync("key", factory);
          var r2 = await cache.GetOrAddAsync("key", factory);
          r1.Should().Be(42);
          r2.Should().Be(42);
          callCount.Should().Be(1);
      }
      [Fact]
      public async Task GetOrAddAsync_DifferentKeys_CallsFactoryEachTime()
      {
          var cache = new AsyncCache<string, string>();
          var r1 = await cache.GetOrAddAsync("a", k => Task.FromResult(k + "1"));
          var r2 = await cache.GetOrAddAsync("b", k => Task.FromResult(k + "2"));
          r1.Should().Be("a1");
          r2.Should().Be("b2");
      }
  }

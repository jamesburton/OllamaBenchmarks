name: easy_linq_023
category: csharp_easy
subcategory: linq
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A static class Stats with a static method:
    int SumPositives(IEnumerable<int> numbers)
  that returns the sum of only the positive numbers using LINQ Where + Sum.
  Return only valid C# code in a single file.
test_code: |
  public class StatsTests
  {
      [Fact]
      public void SumPositives_BasicCase()
      {
          Stats.SumPositives(new[]{1,-2,3,-4,5}).Should().Be(9);
      }
      [Fact]
      public void SumPositives_AllNegative_ReturnsZero()
      {
          Stats.SumPositives(new[]{-1,-2,-3}).Should().Be(0);
      }
  }

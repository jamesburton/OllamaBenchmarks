name: easy_vertical_037
category: csharp_easy
subcategory: vertical
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A record Asset(string Id, string Name, string OwnerId, decimal Value)
  An interface IAssetRepository with methods:
    Task AddAsync(Asset asset)
    Task<List<Asset>> GetByOwnerAsync(string ownerId)
    Task<decimal> GetTotalValueAsync(string ownerId)
  A class InMemoryAssetRepository implementing IAssetRepository using a List<Asset>
  Return only valid C# code in a single file.
test_code: |
  public class InMemoryAssetRepositoryTests
  {
      [Fact]
      public async Task GetByOwner_ReturnsOwnerAssets()
      {
          var repo = new InMemoryAssetRepository();
          await repo.AddAsync(new Asset("a1", "Car", "u1", 15000m));
          await repo.AddAsync(new Asset("a2", "Bike", "u2", 500m));
          var assets = await repo.GetByOwnerAsync("u1");
          assets.Should().HaveCount(1);
      }
      [Fact]
      public async Task GetTotalValue_SumsOwnerAssets()
      {
          var repo = new InMemoryAssetRepository();
          await repo.AddAsync(new Asset("a1", "Car", "u1", 15000m));
          await repo.AddAsync(new Asset("a2", "Watch", "u1", 2000m));
          var total = await repo.GetTotalValueAsync("u1");
          total.Should().Be(17000m);
      }
  }

name: easy_linq_042
category: csharp_easy
subcategory: linq
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A static class Flattener with a static method:
    List<string> FlattenWords(IEnumerable<string> sentences)
  that splits each sentence by spaces and returns a flat list of all words using LINQ SelectMany + ToList.
  Return only valid C# code in a single file.
test_code: |
  public class FlattenerTests
  {
      [Fact]
      public void FlattenWords_BasicCase()
      {
          var result = Flattener.FlattenWords(new[]{"hello world","foo bar"});
          result.Should().BeEquivalentTo(new[]{"hello","world","foo","bar"}, cfg => cfg.WithStrictOrdering());
      }
      [Fact]
      public void FlattenWords_SingleWord_ReturnsSingleItem()
      {
          Flattener.FlattenWords(new[]{"hello"}).Should().BeEquivalentTo(new[]{"hello"}, cfg => cfg.WithStrictOrdering());
      }
  }

name: easy_blazor_020
category: csharp_easy
subcategory: blazor
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A Blazor component class ProgressBarComponent that extends ComponentBase with:
    [Parameter] double Min { get; set; } = 0
    [Parameter] double Max { get; set; } = 100
    [Parameter] double Value { get; set; } = 0
    double Percentage => Max == Min ? 0 : Math.Clamp((Value - Min) / (Max - Min) * 100, 0, 100)
  Return only valid C# code in a single file.
test_code: |
  public class ProgressBarComponentTests
  {
      [Fact]
      public void Percentage_CalculatesCorrectly()
      {
          var c = new ProgressBarComponent { Min = 0, Max = 200, Value = 100 };
          c.Percentage.Should().Be(50);
      }
      [Fact]
      public void Percentage_ClampsToHundred()
      {
          var c = new ProgressBarComponent { Min = 0, Max = 100, Value = 150 };
          c.Percentage.Should().Be(100);
      }
  }

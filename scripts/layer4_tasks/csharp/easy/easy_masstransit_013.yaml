name: easy_masstransit_013
category: csharp_easy
subcategory: masstransit
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  In namespace Contracts:
    record CustomerDeleted(Guid CustomerId, string Reason)
  A consumer class CustomerDeletedConsumer that implements IConsumer<CustomerDeleted>:
    Has a public HashSet<Guid> DeletedIds = new()
    Consume method adds CustomerId to DeletedIds
  Return only valid C# code in a single file.
test_code: |
  global using Contracts;
  public class CustomerDeletedConsumerTests
  {
      [Fact]
      public async Task Consume_AddsCustomerId()
      {
          var consumer = new CustomerDeletedConsumer();
          var id = Guid.NewGuid();
          var context = Substitute.For<ConsumeContext<CustomerDeleted>>();
          context.Message.Returns(new CustomerDeleted(id, "User request"));
          await consumer.Consume(context);
          consumer.DeletedIds.Should().Contain(id);
      }
      [Fact]
      public async Task Consume_DuplicateId_OnlyStoresOnce()
      {
          var consumer = new CustomerDeletedConsumer();
          var id = Guid.NewGuid();
          var context = Substitute.For<ConsumeContext<CustomerDeleted>>();
          context.Message.Returns(new CustomerDeleted(id, "reason"));
          await consumer.Consume(context);
          await consumer.Consume(context);
          consumer.DeletedIds.Should().HaveCount(1);
      }
  }

name: easy_linq_007
category: csharp_easy
subcategory: linq
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A static class Checker with a static method:
    bool AnyNegative(IEnumerable<int> numbers)
  that returns true if any number is negative using LINQ Any.
  Return only valid C# code in a single file.
test_code: |
  public class CheckerTests
  {
      [Fact]
      public void AnyNegative_HasNegative_ReturnsTrue()
      {
          Checker.AnyNegative(new[]{1,-2,3}).Should().BeTrue();
      }
      [Fact]
      public void AnyNegative_NoNegative_ReturnsFalse()
      {
          Checker.AnyNegative(new[]{1,2,3}).Should().BeFalse();
      }
      [Fact]
      public void AnyNegative_Empty_ReturnsFalse()
      {
          Checker.AnyNegative(Array.Empty<int>()).Should().BeFalse();
      }
  }

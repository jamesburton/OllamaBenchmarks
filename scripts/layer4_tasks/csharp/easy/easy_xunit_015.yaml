name: easy_xunit_015
category: csharp_easy
subcategory: xunit
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A static class TemperatureConverter with static methods:
    double CelsiusToFahrenheit(double celsius) returns celsius * 9/5 + 32
    double FahrenheitToCelsius(double fahrenheit) returns (fahrenheit - 32) * 5/9
  Return only valid C# code in a single file.
test_code: |
  public class TemperatureConverterTests
  {
      [Theory]
      [InlineData(0, 32)]
      [InlineData(100, 212)]
      [InlineData(-40, -40)]
      public void CelsiusToFahrenheit_ConvertsCorrectly(double celsius, double expectedF)
      {
          TemperatureConverter.CelsiusToFahrenheit(celsius).Should().BeApproximately(expectedF, 0.001);
      }
      [Fact]
      public void FahrenheitToCelsius_ConvertsBoilingPoint()
      {
          TemperatureConverter.FahrenheitToCelsius(212).Should().BeApproximately(100, 0.001);
      }
  }

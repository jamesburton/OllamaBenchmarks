name: easy_linq_049
category: csharp_easy
subcategory: linq
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A static class Combiner with a static method:
    List<string> ConcatDistinct(IEnumerable<string> first, IEnumerable<string> second)
  that concatenates two string sequences and removes duplicates (case-sensitive), preserving order of first occurrence using LINQ Concat + Distinct + ToList.
  Return only valid C# code in a single file.
test_code: |
  public class CombinerTests
  {
      [Fact]
      public void ConcatDistinct_RemovesDuplicates()
      {
          var result = Combiner.ConcatDistinct(new[]{"a","b","c"}, new[]{"b","c","d"});
          result.Should().BeEquivalentTo(new[]{"a","b","c","d"}, cfg => cfg.WithStrictOrdering());
      }
      [Fact]
      public void ConcatDistinct_NoDuplicates_ReturnsCombined()
      {
          Combiner.ConcatDistinct(new[]{"a"}, new[]{"b"}).Should().BeEquivalentTo(new[]{"a","b"}, cfg => cfg.WithStrictOrdering());
      }
  }

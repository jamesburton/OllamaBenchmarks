name: easy_linq_031
category: csharp_easy
subcategory: linq
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A static class Sorter with a static method:
    List<int> SortDescending(IEnumerable<int> numbers)
  that returns numbers sorted in descending order using LINQ OrderByDescending + ToList.
  Return only valid C# code in a single file.
test_code: |
  public class SorterTests
  {
      [Fact]
      public void SortDescending_BasicCase()
      {
          var result = Sorter.SortDescending(new[]{3,1,4,1,5});
          result.Should().BeEquivalentTo(new[]{5,4,3,1,1}, cfg => cfg.WithStrictOrdering());
      }
      [Fact]
      public void SortDescending_SingleElement_ReturnsSame()
      {
          Sorter.SortDescending(new[]{42}).Should().BeEquivalentTo(new[]{42}, cfg => cfg.WithStrictOrdering());
      }
  }

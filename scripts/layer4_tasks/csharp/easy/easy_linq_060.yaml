name: easy_linq_060
category: csharp_easy
subcategory: linq
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A static class Pager with a static method:
    List<T> TakeLast<T>(IEnumerable<T> items, int count)
  that returns the last count items using LINQ TakeLast + ToList.
  Return only valid C# code in a single file.
test_code: |
  public class PagerTests
  {
      [Fact]
      public void TakeLast_BasicCase()
      {
          var result = Pager.TakeLast(new[]{1,2,3,4,5}, 2);
          result.Should().BeEquivalentTo(new[]{4,5}, cfg => cfg.WithStrictOrdering());
      }
      [Fact]
      public void TakeLast_CountExceedsLength_ReturnsAll()
      {
          Pager.TakeLast(new[]{1,2,3}, 10).Should().BeEquivalentTo(new[]{1,2,3}, cfg => cfg.WithStrictOrdering());
      }
  }

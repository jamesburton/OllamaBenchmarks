name: easy_vertical_038
category: csharp_easy
subcategory: vertical
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A record TeamMember(string Id, string Name, string Role)
  A class Team with:
    string Name { get; }
    Team(string name)
    void AddMember(TeamMember member)
    void RemoveMember(string memberId)
    List<TeamMember> GetByRole(string role)
    int Size => total number of members
  Return only valid C# code in a single file.
test_code: |
  public class TeamTests
  {
      [Fact]
      public void AddMember_IncreasesSize()
      {
          var team = new Team("Dev Team");
          team.AddMember(new TeamMember("m1", "Alice", "Developer"));
          team.Size.Should().Be(1);
      }
      [Fact]
      public void GetByRole_FiltersCorrectly()
      {
          var team = new Team("Product Team");
          team.AddMember(new TeamMember("m1", "Alice", "Developer"));
          team.AddMember(new TeamMember("m2", "Bob", "Designer"));
          team.AddMember(new TeamMember("m3", "Carol", "Developer"));
          team.GetByRole("Developer").Should().HaveCount(2);
      }
  }

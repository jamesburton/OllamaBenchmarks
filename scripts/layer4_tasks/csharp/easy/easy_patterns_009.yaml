name: easy_patterns_009
category: csharp_easy
subcategory: patterns
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A static class CollectionHelper with a static method:
    List<int> CreateList(params int[] values)
  that creates a List<int> from the values using a collection expression [..values].
  Return only valid C# code in a single file.
test_code: |
  public class CollectionHelperTests
  {
      [Fact]
      public void CreateList_BasicCase()
      {
          var result = CollectionHelper.CreateList(1, 2, 3, 4, 5);
          result.Should().BeEquivalentTo(new[]{1,2,3,4,5}, cfg => cfg.WithStrictOrdering());
      }
      [Fact]
      public void CreateList_Empty_ReturnsEmptyList()
      {
          CollectionHelper.CreateList().Should().BeEmpty();
      }
  }

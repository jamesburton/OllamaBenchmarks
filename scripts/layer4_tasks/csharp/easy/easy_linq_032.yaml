name: easy_linq_032
category: csharp_easy
subcategory: linq
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A static class Aggregator with a static method:
    string JoinWithComma(IEnumerable<string> items)
  that concatenates all strings separated by commas using string.Join (not LINQ Aggregate but using LINQ ToArray internally is fine).
  Return only valid C# code in a single file.
test_code: |
  public class AggregatorTests
  {
      [Fact]
      public void JoinWithComma_BasicCase()
      {
          Aggregator.JoinWithComma(new[]{"a","b","c"}).Should().Be("a,b,c");
      }
      [Fact]
      public void JoinWithComma_SingleItem()
      {
          Aggregator.JoinWithComma(new[]{"hello"}).Should().Be("hello");
      }
      [Fact]
      public void JoinWithComma_Empty_ReturnsEmpty()
      {
          Aggregator.JoinWithComma(Array.Empty<string>()).Should().Be("");
      }
  }

name: easy_patterns_041
category: csharp_easy
subcategory: patterns
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A static class NullAssign with a static method:
    string EnsureValue(ref string? field, string defaultValue)
  that uses the null-coalescing assignment operator (??=) to assign defaultValue to field if null, then returns field.
  Return only valid C# code in a single file.
test_code: |
  public class NullAssignTests
  {
      [Fact]
      public void EnsureValue_Null_AssignsDefault()
      {
          string? field = null;
          var result = NullAssign.EnsureValue(ref field, "default");
          result.Should().Be("default");
          field.Should().Be("default");
      }
      [Fact]
      public void EnsureValue_NonNull_KeepsOriginal()
      {
          string? field = "original";
          var result = NullAssign.EnsureValue(ref field, "default");
          result.Should().Be("original");
          field.Should().Be("original");
      }
  }

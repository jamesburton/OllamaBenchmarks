name: easy_linq_048
category: csharp_easy
subcategory: linq
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A static class Stats with a static method:
    int SumOfSquares(IEnumerable<int> numbers)
  that returns the sum of all numbers squared using LINQ Select + Sum.
  Return only valid C# code in a single file.
test_code: |
  public class StatsTests
  {
      [Fact]
      public void SumOfSquares_BasicCase()
      {
          Stats.SumOfSquares(new[]{1,2,3,4}).Should().Be(30);
      }
      [Fact]
      public void SumOfSquares_EmptySource_ReturnsZero()
      {
          Stats.SumOfSquares(Array.Empty<int>()).Should().Be(0);
      }
  }

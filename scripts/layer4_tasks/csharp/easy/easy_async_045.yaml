name: easy_async_045
category: csharp_easy
subcategory: async
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A static class AsyncMapper with a static method:
    async Task<Dictionary<TKey, TValue>> ToDictionaryAsync<TKey, TValue>(
        IEnumerable<TKey> keys,
        Func<TKey, Task<TValue>> valueFactory)
    where TKey : notnull
  that creates a dictionary by calling the factory for each key sequentially.
  Return only valid C# code in a single file.
test_code: |
  public class AsyncMapperTests
  {
      [Fact]
      public async Task ToDictionaryAsync_BuildsDictionary()
      {
          var result = await AsyncMapper.ToDictionaryAsync(
              new[]{"a","b","c"},
              k => Task.FromResult(k.Length));
          result["a"].Should().Be(1);
          result["b"].Should().Be(1);
          result["c"].Should().Be(1);
      }
      [Fact]
      public async Task ToDictionaryAsync_Empty_ReturnsEmpty()
      {
          var result = await AsyncMapper.ToDictionaryAsync(
              Array.Empty<string>(),
              k => Task.FromResult(k.Length));
          result.Should().BeEmpty();
      }
  }

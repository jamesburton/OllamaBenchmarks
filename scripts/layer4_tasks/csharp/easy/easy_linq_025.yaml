name: easy_linq_025
category: csharp_easy
subcategory: linq
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A static class Pager with a static method:
    List<T> SkipFirst<T>(IEnumerable<T> items, int count)
  that skips the first count items and returns the rest using LINQ Skip + ToList.
  Return only valid C# code in a single file.
test_code: |
  public class PagerTests
  {
      [Fact]
      public void SkipFirst_BasicCase()
      {
          var result = Pager.SkipFirst(new[]{1,2,3,4,5}, 2);
          result.Should().BeEquivalentTo(new[]{3,4,5}, cfg => cfg.WithStrictOrdering());
      }
      [Fact]
      public void SkipFirst_SkipAll_ReturnsEmpty()
      {
          Pager.SkipFirst(new[]{1,2,3}, 10).Should().BeEmpty();
      }
  }

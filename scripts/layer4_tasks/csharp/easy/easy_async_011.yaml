name: easy_async_011
category: csharp_easy
subcategory: async
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A static class SafeRunner with a static method:
    async Task<bool> TryRunAsync(Func<Task> action)
  that runs the action; returns true if it completes without exception, false if it throws.
  Return only valid C# code in a single file.
test_code: |
  public class SafeRunnerTests
  {
      [Fact]
      public async Task TryRunAsync_Success_ReturnsTrue()
      {
          var result = await SafeRunner.TryRunAsync(() => Task.CompletedTask);
          result.Should().BeTrue();
      }
      [Fact]
      public async Task TryRunAsync_Throws_ReturnsFalse()
      {
          var result = await SafeRunner.TryRunAsync(() => Task.FromException(new Exception("oops")));
          result.Should().BeFalse();
      }
  }

name: easy_aspnet_006
category: csharp_easy
subcategory: aspnet
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A class EmailRequest with:
    [Required][EmailAddress] string To { get; set; }
    [Required][MinLength(1)] string Subject { get; set; }
    [Required] string Body { get; set; }
  Return only valid C# code in a single file.
test_code: |
  public class EmailRequestTests
  {
      private static IList<ValidationResult> Validate(object obj)
      {
          var results = new List<ValidationResult>();
          Validator.TryValidateObject(obj, new ValidationContext(obj), results, true);
          return results;
      }
      [Fact]
      public void ValidRequest_PassesValidation()
      {
          var req = new EmailRequest { To = "user@test.com", Subject = "Hello", Body = "World" };
          Validate(req).Should().BeEmpty();
      }
      [Fact]
      public void InvalidEmail_FailsValidation()
      {
          var req = new EmailRequest { To = "notvalid", Subject = "Hello", Body = "World" };
          Validate(req).Should().NotBeEmpty();
      }
  }

name: easy_aspnet_010
category: csharp_easy
subcategory: aspnet
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A static class EndpointHandlers with a static method:
    IResult DeleteItem(int id, bool exists)
  that returns Results.NoContent() if exists is true, otherwise Results.NotFound().
  Return only valid C# code in a single file.
test_code: |
  public class EndpointHandlersTests
  {
      [Fact]
      public void DeleteItem_Exists_ReturnsNoContent()
      {
          var result = EndpointHandlers.DeleteItem(1, true);
          result.Should().BeOfType<Microsoft.AspNetCore.Http.HttpResults.NoContent>();
      }
      [Fact]
      public void DeleteItem_NotExists_ReturnsNotFound()
      {
          var result = EndpointHandlers.DeleteItem(1, false);
          result.Should().BeOfType<Microsoft.AspNetCore.Http.HttpResults.NotFound>();
      }
  }

name: easy_async_001
category: csharp_easy
subcategory: async
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A static class Runner with a static method:
    async Task<int> RunOnThreadPool(Func<int> func)
  that runs the given function on the thread pool using Task.Run and returns the result.
  Return only valid C# code in a single file.
test_code: |
  public class RunnerTests
  {
      [Fact]
      public async Task RunOnThreadPool_ReturnsResult()
      {
          var result = await Runner.RunOnThreadPool(() => 42);
          result.Should().Be(42);
      }
      [Fact]
      public async Task RunOnThreadPool_ExecutesFunc()
      {
          var result = await Runner.RunOnThreadPool(() => 1 + 1);
          result.Should().Be(2);
      }
  }

name: easy_async_019
category: csharp_easy
subcategory: async
difficulty: easy
weight: 1
template: test_project
max_tokens: 2048
num_ctx: 8192
validator_type: dotnet
references: []
prompt: |
  Create a single C# file containing:
  A static class ConfigureAwaitHelper with a static method:
    async Task<string> FetchDataAsync()
  that awaits Task.FromResult("data").ConfigureAwait(false) and returns the result.
  Return only valid C# code in a single file.
test_code: |
  public class ConfigureAwaitHelperTests
  {
      [Fact]
      public async Task FetchDataAsync_ReturnsData()
      {
          var result = await ConfigureAwaitHelper.FetchDataAsync();
          result.Should().Be("data");
      }
  }

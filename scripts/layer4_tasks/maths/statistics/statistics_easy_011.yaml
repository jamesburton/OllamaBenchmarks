name: statistics_easy_011
category: maths
subcategory: statistics
difficulty: easy
weight: 1
validator_type: numeric
max_tokens: 128
prompt: |
  A bag has 3 red and 7 blue marbles. What is the probability of drawing a red marble? Reply with only the decimal.
expected_answer: "0.3"
validator_config:
  tolerance: 0.01
  extract_pattern: '(-?\d+(?:\.\d+)?)'

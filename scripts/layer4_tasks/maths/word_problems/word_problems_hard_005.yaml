name: word_problems_hard_005
category: maths
subcategory: word_problems
difficulty: hard
weight: 3
validator_type: numeric
max_tokens: 256
prompt: |
  Person A can do a job in 12 days. Person B is 50% more efficient than A. How many days does B take to finish the same job?
  Reply with only the number.
expected_answer: "8"
validator_config:
  tolerance: 0
  extract_pattern: '(-?\d+(?:\.\d+)?)'

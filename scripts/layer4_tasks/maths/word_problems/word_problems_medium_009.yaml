prompt: |
  Two cars leave the same point in opposite directions. Car A goes at 55 mph and Car B at 65 mph. After 3 hours, how far apart are they?
  Reply with only the number.
expected_answer: "360"
validator_config:
  tolerance: 0
  extract_pattern: '(-?\d+(?:\.\d+)?)'

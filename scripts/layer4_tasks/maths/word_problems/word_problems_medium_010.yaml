name: word_problems_medium_010
category: maths
subcategory: word_problems
difficulty: medium
weight: 2
validator_type: numeric
max_tokens: 256
prompt: |
  A train travels from A to B at 90 km/h and returns at 60 km/h. What is the average speed for the round trip?
  Reply with only the number.
expected_answer: "72"
validator_config:
  tolerance: 0
  extract_pattern: '(-?\d+(?:\.\d+)?)'

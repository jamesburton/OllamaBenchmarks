name: technical_hard_071
category: english
subcategory: technical
difficulty: hard
weight: 1
validator_type: regex
max_tokens: 160
prompt: |
  Write a notice informing business customers of a planned API deprecation, including the deprecation date and migration path.
  Keep it under 80 words.
expected_answer: null
validator_config:
  must_contain_any:
    - "deprecated"
    - "API"
    - "migration"
    - "endpoint"
    - "version"
    - "date"
    - "upgrade"
    - "breaking"
  min_words: 12
  max_words: 80

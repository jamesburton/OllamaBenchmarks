name: technical_medium_051
category: english
subcategory: technical
difficulty: medium
weight: 1
validator_type: regex
max_tokens: 160
prompt: |
  Write a developer-facing error message for an API rate limit being exceeded.
  Include the rate limit and a retry suggestion.
  Keep it under 40 words.
expected_answer: null
validator_config:
  must_contain_any:
    - "rate limit"
    - "429"
    - "requests"
    - "retry"
    - "exceeded"
    - "seconds"
    - "wait"
    - "limit"
  min_words: 8
  max_words: 40

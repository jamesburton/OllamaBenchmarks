name: technical_medium_010
category: english
subcategory: technical
difficulty: medium
weight: 1
validator_type: regex
max_tokens: 160
prompt: |
  Write a README 'Configuration' section for a web application that reads settings from environment variables.
  List at least three example variables.
  Keep it under 100 words.
expected_answer: null
validator_config:
  must_contain_any:
    - "environment"
    - "variable"
    - "config"
    - "DATABASE_URL"
    - "SECRET_KEY"
    - "PORT"
    - "set"
  min_words: 12
  max_words: 100

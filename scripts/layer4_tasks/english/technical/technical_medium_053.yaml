name: technical_medium_053
category: english
subcategory: technical
difficulty: medium
weight: 1
validator_type: regex
max_tokens: 160
prompt: |
  Write a developer-facing error message for a null pointer or undefined reference exception.
  Include the variable name placeholder and a suggestion.
  Keep it under 40 words.
expected_answer: null
validator_config:
  must_contain_any:
    - "null"
    - "undefined"
    - "reference"
    - "value"
    - "check"
    - "variable"
    - "error"
    - "cannot"
  min_words: 8
  max_words: 40

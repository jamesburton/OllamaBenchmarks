name: technical_medium_054
category: english
subcategory: technical
difficulty: medium
weight: 1
validator_type: regex
max_tokens: 160
prompt: |
  Write a user-facing error message for when two-factor authentication fails.
  Include a suggestion and keep it under 30 words.
expected_answer: null
validator_config:
  must_contain_any:
    - "code"
    - "incorrect"
    - "expired"
    - "try again"
    - "two-factor"
    - "authentication"
    - "new"
    - "resend"
  min_words: 8
  max_words: 30

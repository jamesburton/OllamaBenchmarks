name: rewriting_easy_101
category: english
subcategory: rewriting
difficulty: easy
weight: 1
validator_type: regex
max_tokens: 128
prompt: |
  Rewrite more concisely:
  'The meeting will be held on the date of the fifteenth of March.'
  Write only the rewritten sentence.
expected_answer: null
validator_config:
  must_contain_any:
    - "March"
    - "15"
    - "meeting"
    - "on"
  min_words: 4
  max_words: 12

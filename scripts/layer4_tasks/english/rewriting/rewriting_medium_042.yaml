name: rewriting_medium_042
category: english
subcategory: rewriting
difficulty: medium
weight: 1
validator_type: regex
max_tokens: 128
prompt: |
  Rewrite in informal English:
  'We regret to inform you that your application has been unsuccessful on this occasion.'
  Write only the rewritten sentence.
expected_answer: null
validator_config:
  must_contain_any:
    - "sorry"
    - "didn't"
    - "unsuccessful"
    - "not this time"
    - "application"
  min_words: 5
  max_words: 20

name: rewriting_hard_054
category: english
subcategory: rewriting
difficulty: hard
weight: 1
validator_type: regex
max_tokens: 128
prompt: |
  Rewrite in informal English:
  'Pursuant to our earlier correspondence, kindly remit the outstanding balance at your earliest convenience.'
  Write only the rewritten sentence.
expected_answer: null
validator_config:
  must_contain_any:
    - "owe"
    - "please pay"
    - "balance"
    - "soon"
    - "as discussed"
  min_words: 5
  max_words: 20

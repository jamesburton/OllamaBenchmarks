name: rewriting_medium_047
category: english
subcategory: rewriting
difficulty: medium
weight: 1
validator_type: regex
max_tokens: 128
prompt: |
  Rewrite in informal English:
  'Should you have any objections to the proposed schedule, please advise us accordingly.'
  Write only the rewritten sentence.
expected_answer: null
validator_config:

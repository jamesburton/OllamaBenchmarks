name: rewriting_easy_103
category: english
subcategory: rewriting
difficulty: easy
weight: 1
validator_type: regex
max_tokens: 128
prompt: |
  Rewrite more concisely:
  'It is important that employees give consideration to the new policy.'
  Write only the rewritten sentence.
expected_answer: null
validator_config:
  must_contain_any:
    - "consider"
    - "employees"
    - "policy"
    - "must"
    - "should"
  min_words: 4
  max_words: 12

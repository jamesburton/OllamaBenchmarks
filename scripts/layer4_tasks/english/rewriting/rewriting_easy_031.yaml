name: rewriting_easy_031
category: english
subcategory: rewriting
difficulty: easy
weight: 1
validator_type: regex
max_tokens: 128
prompt: |
  Rewrite in informal English:
  'I would like to inform you that your application has been received.'
  Write only the rewritten sentence.
expected_answer: null

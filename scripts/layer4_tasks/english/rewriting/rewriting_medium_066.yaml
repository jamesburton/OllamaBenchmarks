name: rewriting_medium_066
category: english
subcategory: rewriting
difficulty: medium
weight: 1
validator_type: regex
max_tokens: 128
prompt: |
  Split this compound sentence into two shorter sentences:
  'The project was already delayed due to supply issues, but the team completed it within budget despite the setbacks.'
  Write only the two rewritten sentences.
expected_answer: null
validator_config:
  must_contain_any:

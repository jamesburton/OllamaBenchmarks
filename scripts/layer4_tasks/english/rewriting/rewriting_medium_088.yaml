name: rewriting_medium_088
category: english
subcategory: rewriting
difficulty: medium
weight: 1
validator_type: regex
max_tokens: 128
prompt: |
  Combine into one fluent sentence:
  'The experiment failed twice. The team identified the error. They modified the procedure.'
  Write only the combined sentence.
expected_answer: null
validator_config:
  must_contain_any:
    - "failed"
    - "error"
    - "modified"
    - "procedure"
    - "identified"
  min_words: 8
  max_words: 30

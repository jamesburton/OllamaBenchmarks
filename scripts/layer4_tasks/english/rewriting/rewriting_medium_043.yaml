name: rewriting_medium_043
category: english
subcategory: rewriting
difficulty: medium
weight: 1
validator_type: regex
max_tokens: 128
prompt: |
  Rewrite in informal English:
  'I would be grateful if you could provide clarification at your earliest convenience.'
  Write only the rewritten sentence.
expected_answer: null
validator_config:

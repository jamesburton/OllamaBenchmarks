name: rewriting_medium_115
category: english
subcategory: rewriting
difficulty: medium
weight: 1
validator_type: regex
max_tokens: 128
prompt: |
  Rewrite more concisely:
  'In the absence of further instructions, please proceed in accordance with standard operating procedures.'
  Write only the rewritten sentence.
expected_answer: null
validator_config:
  must_contain_any:
    - "proceed"
    - "standard"
    - "procedures"
    - "unless"
    - "instructions"
  min_words: 4
  max_words: 15

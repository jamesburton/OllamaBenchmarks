name: rewriting_easy_056
category: english
subcategory: rewriting
difficulty: easy
weight: 1
validator_type: regex
max_tokens: 128
prompt: |
  Split this compound sentence into two shorter sentences:
  'She bought a new laptop and she installed all the software.'
  Write only the two rewritten sentences.
expected_answer: null
validator_config:
  must_contain_any:
    - "laptop"
    - "software"

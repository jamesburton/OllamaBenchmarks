prompt: |
  Read the following passage carefully.
  
  The Industrial Revolution, which began in Britain in the mid-eighteenth century and spread across Europe and North America over the following century, fundamentally transformed human society. The transition from agrarian economies to mechanised manufacturing created new forms of labour, wealth, and social organisation. Steam power, initially harnessed by James Watt's improved steam engine, drove factories, railways, and ships. Urbanisation accelerated as workers migrated from rural areas to industrial cities. Living and working conditions in early industrial towns were often appalling, with overcrowding, child labour, and dangerous workplaces commonplace. However, over time, industrialisation generated enough wealth to raise living standards, fund public health improvements, and expand access to education. Historians continue to debate whether the long-term benefits of industrialisation outweigh its early human costs.
  
  Answer in one sentence:
  What does the phrase 'new forms of labour' suggest about pre-industrial work?
expected_answer: null

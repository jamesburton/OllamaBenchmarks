name: comprehension_hard_119
category: english
subcategory: comprehension
difficulty: hard
weight: 1
validator_type: regex
max_tokens: 128
prompt: |
  Read the following passage carefully.
  
  Climate change, driven primarily by human-generated greenhouse gas emissions, is altering weather patterns, sea levels, and ecosystems around the world. The Intergovernmental Panel on Climate Change (IPCC) has concluded with high confidence that global average temperatures have already risen by approximately 1.1 degrees Celsius above pre-industrial levels. The impacts are already visible: more frequent and intense heatwaves, rising sea levels threatening coastal communities, and shifts in species distribution. Scientists warn that limiting warming to 1.5 degrees Celsius above pre-industrial levels — the goal of the Paris Agreement — requires rapid and deep reductions in emissions by 2030. Renewable energy, electrification of transport, and changes in agricultural practices are central to decarbonisation strategies. However, the transition faces political, economic, and behavioural obstacles. The concept of climate justice highlights that vulnerable and low-income nations contribute least to emissions but bear the greatest consequences.
  
  Answer in one sentence:
  How does the concept of climate justice complicate straightforward calls for global action?
expected_answer: null
validator_config:
  must_contain_any:
    - "unequal"
    - "burden"
    - "least responsible"
    - "most affected"
    - "equity"
    - "fairness"
    - "complicated"
  min_words: 8
  max_words: 40

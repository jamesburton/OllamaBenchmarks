name: sequences_easy_001
category: logic
subcategory: sequences
difficulty: easy
weight: 1
validator_type: numeric
max_tokens: 64
prompt: |
  What is the next number in the sequence: 2, 4, 6, 8, ...?
  Reply with only the number.
expected_answer: "10"
validator_config:
  tolerance: 0
  extract_pattern: '(-?\d+(?:\.\d+)?)'

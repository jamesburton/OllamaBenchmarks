name: sequences_medium_013
category: logic
subcategory: sequences
difficulty: medium
weight: 2
validator_type: numeric
max_tokens: 64
prompt: |
  What is the next number in the sequence: 1, 3, 7, 15, 31, ...? (Each term = 2 * previous + 1)
  Reply with only the number.
expected_answer: "63"
validator_config:
  tolerance: 0
  extract_pattern: '(-?\d+(?:\.\d+)?)'
